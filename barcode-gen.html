<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الباركود - التاجر برو</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-barcode"></i> توليد باركود المنتجات</h2>
        <div class="form-group">
            <select id="p-select" class="form-control">
                <!-- تسحب المنتجات من Firebase هنا -->
            </select>
        </div>
        <div style="text-align:center; background:white; padding:20px;">
            <svg id="barcode-output"></svg>
        </div>
        <button class="btn-main" onclick="window.print()">طباعة الملصق</button>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
