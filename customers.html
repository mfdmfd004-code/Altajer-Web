<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العملاء - التاجر برو</title>
    
    <!-- إعدادات التطبيق للجوال -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="التاجر برو">
    <meta name="theme-color" content="#0077b6">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --sea-blue: #0077b6; --light-green: #90be6d; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .card { background: var(--white); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; border-top: 5px solid var(--sea-blue); }
        h2 { color: var(--sea-blue); text-align: center; }

        /* ستايل المربع الموحد المطور */
        .customer-card-unit { border: 2px solid var(--sea-blue); border-radius: 10px; padding: 10px; background: #fff; margin-bottom: 20px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .input-row:last-child { border-bottom: none; }
        .label-text { font-weight: bold; color: var(--sea-blue); flex: 1; font-size: 0.9rem; }
        .input-field { flex: 2; padding: 10px; border: 1px solid #ccc; border-radius: 6px; text-align: center; font-size: 1rem; }

        /* الأزرار بنظام التاجر */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1rem; }
        .btn-save { background-color: var(--sea-blue); grid-column: span 2; }
        .btn-find { background-color: #6c757d; }
        .btn-edit { background-color: var(--light-green); color: #000; }
        .btn-remove { background-color: #d32f2f; }
    </style>
</head>
<body>

    <div class="card">
        <h2><i class="fas fa-users"></i> إدارة العملاء (التاجر برو)</h2>

        <div class="customer-card-unit">
            <div class="input-row">
                <span class="label-text">كود العميل</span>
                <input type="text" id="c-id" class="input-field" placeholder="أدخل كود للبحث أو الحفظ">
            </div>
            <div class="input-row">
                <span class="label-text">اسم العميل</span>
                <input type="text" id="c-name" class="input-field" placeholder="الاسم الكامل">
            </div>
            <div class="input-row">
                <span class="label-text">رقم الجوال</span>
                <input type="tel" id="c-phone" class="input-field" placeholder="05xxxxxxxx">
            </div>
            <div class="input-row">
                <span class="label-text">العنوان</span>
                <input type="text" id="c-address" class="input-field" placeholder="المدينة / المنطقة">
            </div>
        </div>

        <div class="btn-grid">
            <button class="btn btn-save" id="btn-save-cust"><i class="fas fa-save"></i> حفظ العميل في السحابة</button>
            <button class="btn btn-find" id="btn-find-cust"><i class="fas fa-search"></i> بحث</button>
            <button class="btn btn-edit" id="btn-edit-cust"><i class="fas fa-edit"></i> تعديل</button>
            <button class="btn btn-remove" id="btn-remove-cust"><i class="fas fa-trash-alt"></i> حذف</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // إعدادات Firebase (سيتم سحبها تلقائياً من مشروعك "تاجر برو المحاسبي")
        const firebaseConfig = { /* بياناتك هنا */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // وظيفة الحفظ المباشر
        document.getElementById('btn-save-cust').onclick = async () => {
            const id = document.getElementById('c-id').value || Date.now().toString();
            const data = {
                name: document.getElementById('c-name').value,
                phone: document.getElementById('c-phone').value,
                address: document.getElementById('c-address').value
            };
            await setDoc(doc(db, "customers", id), data);
            alert("تم الحفظ بنجاح يا فايز");
        };

        // وظيفة البحث المباشر
        document.getElementById('btn-find-cust').onclick = async () => {
            const id = document.getElementById('c-id').value;
            const snap = await getDoc(doc(db, "customers", id));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('c-name').value = d.name;
                document.getElementById('c-phone').value = d.phone;
                document.getElementById('c-address').value = d.address;
            } else { alert("العميل غير مسجل"); }
        };

        // وظيفة الحذف
        document.getElementById('btn-remove-cust').onclick = async () => {
            const id = document.getElementById('c-id').value;
            await deleteDoc(doc(db, "customers", id));
            alert("تم حذف العميل");
            location.reload();
        };
    </script>
</body>
</html>
