<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>تاجر برو - سجل العملاء والامتثال الضريبي ZATCA</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0c3f65">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root, [data-theme="winter"] {
            --dark-bg: #0d1b2a;
            --card-bg: #1b263b;
            --sea-blue: #0077b6;
            --light-green: #38b000;
            --neon-cyan: #00b4d8;
            --neon-pink: #e81cff;
            --text-white: #ffffff;
            --danger-red: #e63946;
            --warning-orange: #ffb703;
            --glow-soft: 0 0 6px rgba(0, 180, 216, 0.35);
        }

        [data-theme="spring"] {
            --dark-bg: #1a2f16;
            --card-bg: #243e1e;
            --sea-blue: #52b788;
            --light-green: #74c69d;
            --neon-cyan: #95d5b2;
            --neon-pink: #ff70a6;
            --text-white: #f4f9f4;
            --danger-red: #ff4d6d;
            --warning-orange: #ff9f1c;
            --glow-soft: 0 0 6px rgba(149, 213, 178, 0.35);
        }

        [data-theme="summer"] {
            --dark-bg: #0f2a35;
            --card-bg: #173f5f;
            --sea-blue: #20639b;
            --light-green: #3caea3;
            --neon-cyan: #2a9d8f;
            --neon-pink: #f4a261;
            --text-white: #f8f9fa;
            --danger-red: #e76f51;
            --warning-orange: #f4a261;
            --glow-soft: 0 0 6px rgba(42, 157, 143, 0.35);
        }

        [data-theme="autumn"] {
            --dark-bg: #2b1810;
            --card-bg: #3e261d;
            --sea-blue: #b07d62;
            --light-green: #9e2a2b;
            --neon-cyan: #e36414;
            --neon-pink: #ffb703;
            --text-white: #fff8f5;
            --danger-red: #6f1d1b;
            --warning-orange: #ff9f1c;
            --glow-soft: 0 0 6px rgba(227, 100, 20, 0.35);
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            margin: 0;
            padding: 20px 10px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .customer-container {
            max-width: 850px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 2px solid var(--sea-blue);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0, 180, 216, 0.15);
            position: relative;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .customer-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--sea-blue), var(--neon-pink));
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
        }

        .customer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px dashed rgba(0, 180, 216, 0.25);
            padding-bottom: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .customer-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: var(--glow-soft);
        }

        .section-subtitle {
            font-size: 15px;
            color: var(--neon-cyan);
            margin-top: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 180, 216, 0.15);
            padding-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-container {
            position: relative;
            margin-bottom: 25px;
        }

        .input-container input {
            border: 0;
            border-bottom: 2px solid #4a5568;
            background: transparent;
            width: 100%;
            padding: 8px 5px 4px 5px;
            font-size: 15px;
            color: #fff;
            transition: border-color 0.3s;
        }

        .input-container input:focus {
            outline: none;
            border-bottom: 2px solid var(--neon-cyan);
        }

        .input-container label {
            position: absolute;
            top: 8px;
            right: 5px;
            font-size: 14px;
            color: #a0aec0;
            pointer-events: none;
            transition: all 0.2s ease-in-out;
        }

        .input-container input:focus ~ label,
        .input-container input:not(:placeholder-shown) ~ label {
            top: -14px;
            font-size: 12px;
            color: var(--neon-cyan);
        }

        .national-address-box {
            background: rgba(0, 0, 0, 0.15);
            border: 1px dashed rgba(0, 180, 216, 0.2);
            border-radius: 12px;
            padding: 25px 15px 5px 15px;
            margin-bottom: 20px;
        }

        .btn-neon {
            background: #2d3748;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-neon:hover {
            background: var(--clr);
            box-shadow: 0 0 12px var(--clr);
            color: #fff;
            transform: translateY(-2px);
        }

        .table-responsive-custom {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-top: 30px;
            border: 1px solid rgba(0, 180, 216, 0.2);
        }

        .table-custom {
            background-color: rgba(0, 0, 0, 0.15) !important;
            color: white !important;
            margin-bottom: 0;
            font-size: 14px;
        }

        .table-custom th {
            background-color: rgba(0, 0, 0, 0.3) !important;
            color: var(--neon-cyan) !important;
            font-weight: 600;
        }

        .table-custom td {
            vertical-align: middle;
            border-color: rgba(255, 255, 255, 0.04) !important;
        }

        .action-icon {
            cursor: pointer;
            font-size: 17px;
            transition: transform 0.2s;
            margin: 0 5px;
        }
        .action-icon:hover { transform: scale(1.2); }
        .icon-edit { color: var(--warning-orange); }
        .icon-delete { color: var(--danger-red); }

        .api-toast {
            position: fixed;
            top: 30px;
            right: 20px;
            z-index: 2000;
            padding: 12px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
        }
    </style>
</head>
<body>

<div id="apiToast" class="api-toast"></div>

<div class="customer-container">
    <div class="customer-header">
        <div class="customer-title">
            <i class='bx bx-user-pin bx-flashing'></i>
            <span>سجل العملاء وإدارة الامتثال لـ ZATCA</span>
        </div>
        <div>
            <a href="index.html" class="btn-neon" style="--clr:var(--sea-blue)">
                <i class="fas fa-home"></i> <span>الرئيسية</span>
            </a>
        </div>
    </div>

    <form id="customerForm">
        
        <div class="section-subtitle">
            <i class="fas fa-id-card"></i> <span>المعرفات الهيكلية للعميل</span>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="input-container">
                    <input id="custInvoiceId" type="text" required placeholder=" " autofocus>
                    <label>كود العميل / الرقم المرجعي</label>
                </div>
            </div>
            <div class="col-md-8">
                <div class="input-container">
                    <input id="custVatNumber" type="text" maxlength="15" inputmode="numeric" placeholder=" ">
                    <label>الرقم الضريبي للمنشأة (15 خانة لامتثال الشركات B2B)</label>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-7">
                <div class="input-container">
                    <input id="custName" type="text" required placeholder=" ">
                    <label>اسم العميل المعتمد / المنشأة</label>
                </div>
            </div>
            <div class="col-md-5">
                <div class="input-container">
                    <input id="custPhone" type="tel" required placeholder=" ">
                    <label>رقم الجوال / التواصل</label>
                </div>
            </div>
        </div>

        <div class="section-subtitle">
            <i class="fas fa-map-marker-alt"></i> <span>تفاصيل العنوان الوطني (معيار إلزامي لـ ZATCA في فواتير B2B)</span>
        </div>

        <div class="national-address-box">
            <div class="row">
                <div class="col-6 col-md-4">
                    <div class="input-container">
                        <input id="custCity" type="text" required placeholder=" ">
                        <label>المدينة</label>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="input-container">
                        <input id="custDistrict" type="text" required placeholder=" ">
                        <label>الحي</label>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="input-container">
                        <input id="custStreet" type="text" required placeholder=" ">
                        <label>اسم الشارع</label>
                    </div>
                </div>
                <div class="col-4 col-md-4">
                    <div class="input-container">
                        <input id="custBuildingNo" type="text" maxlength="4" inputmode="numeric" required placeholder=" ">
                        <label>رقم المبنى</label>
                    </div>
                </div>
                <div class="col-4 col-md-4">
                    <div class="input-container">
                        <input id="custPostalCode" type="text" maxlength="5" inputmode="numeric" required placeholder=" ">
                        <label>الرمز البريدي</label>
                    </div>
                </div>
                <div class="col-4 col-md-4">
                    <div class="input-container">
                        <input id="custAdditionalNo" type="text" maxlength="4" inputmode="numeric" required placeholder=" ">
                        <label>الرقم الإضافي (4 أرقام)</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex flex-wrap gap-2 justify-content-between mt-3">
            <div class="d-flex gap-2 w-100 justify-content-between justify-content-md-start">
                <button type="submit" id="btnSubmitAction" class="btn-neon" style="--clr:var(--light-green)">
                    <i class="fas fa-user-plus"></i> <span id="lblSubmitBtn">حفظ وتأمين الملف الضريبي</span>
                </button>
                <button type="button" onclick="clearCustomerForm()" class="btn-neon" style="--clr:var(--warning-orange)">
                    <i class="fas fa-redo"></i> <span>تفريغ الحقول</span>
                </button>
            </div>
        </div>
    </form>

    <div class="table-responsive-custom">
        <table class="table table-dark table-striped table-custom text-center">
            <thead>
                <tr>
                    <th>الكود المرجعي</th>
                    <th>اسم المنشأة</th>
                    <th>الرقم الضريبي</th>
                    <th>رقم الجوال</th>
                    <th>العنوان الوطني المعتمد</th>
                    <th>العمليات</th>
                </tr>
            </thead>
            <tbody id="customersTableBody">
            </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // إعدادات مشروع الـ Firebase الخاص بك (Altajer Pro)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "altajer-pro-accountant.firebaseapp.com",
        databaseURL: "https://altajer-pro-accountant-default-rtdb.firebaseio.com",
        projectId: "altajer-pro-accountant",
        storageBucket: "altajer-pro-accountant.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // تهيئة السيرفر وقاعدة البيانات سحابياً
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let editModeCustomerId = null;

    // تطبيق السمات المفضلة المخزنة في النظام التراكمي
    function applySavedTheme() {
        const activeTheme = localStorage.getItem('altajer_preferred_theme') || 'winter';
        document.documentElement.setAttribute('data-theme', activeTheme);
    }

    // تشغيل العمليات فور تحميل مستندات الصفحة
    document.addEventListener("DOMContentLoaded", function() {
        applySavedTheme();
        syncFromFirebase(); 
    });

    // إشعارات النظام المخصصة (Toast)
    function showToast(message, isSuccess = true) {
        const toast = document.getElementById('apiToast'); 
        if (!toast) return;
        toast.innerText = message;
        toast.style.backgroundColor = isSuccess ? 'var(--light-green)' : 'var(--danger-red)';
        toast.style.display = 'block'; 
        setTimeout(() => { toast.style.display = 'none'; }, 3500);
    }

    // دالة المزامنة وجلب البيانات حياً من Firebase وتحديث الـ LocalStorage الموحد
    function syncFromFirebase() {
        const customersRef = ref(db, 'altajer_customers');
        onValue(customersRef, (snapshot) => {
            const data = snapshot.val();
            const customersList = [];
            
            if (data) {
                Object.keys(data).forEach(key => {
                    customersList.push(data[key]);
                });
            }
            
            // مزامنة الذاكرة المحلية بالتوازي مع السحابة لتغذية الفواتير والمبيعات
            localStorage.setItem('altajer_customers', JSON.stringify(customersList));
            renderCustomersTable(customersList);
        }, (error) => {
            console.warn("جاري العمل في وضع التخزين المحلي الاحتياطي:", error);
            const localData = JSON.parse(localStorage.getItem('altajer_customers')) || [];
            renderCustomersTable(localData);
        });
    }

    // بناء وعرض جدول سجل المنشآت والعملاء
    function renderCustomersTable(customers) {
        const tbody = document.getElementById('customersTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';

        if (customers.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-muted text-center p-3">لا توجد سجلات مطابقة في الذاكرة السحابية أو المحلية حالياً.</td></tr>`;
            return;
        }

        customers.forEach(cust => {
            const fullAddr = `مبنى ${cust.building_no || '---'}، شارع ${cust.street_name || '---'}، حي ${cust.district || '---'}، ${cust.city || '---'} (${cust.postal_code || '---'}) | إضافي: ${cust.additional_no || '---'}`;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${cust.id}</td>
                <td class="fw-bold text-info">${cust.name}</td>
                <td class="text-warning">${cust.vat_number || '---'}</td>
                <td>${cust.phone}</td>
                <td class="small text-white-50">${fullAddr}</td>
                <td>
                    <i class="fas fa-edit action-icon icon-edit" title="تعديل"></i>
                    <i class="fas fa-trash-alt action-icon icon-delete" title="حذف"></i>
                </td>
            `;

            // الأحداث الآمنة للأيقونات تفادياً لمشاكل نطاقات الـ Modules
            tr.querySelector('.icon-edit').addEventListener('click', () => loadCustomerToEdit(cust.id));
            tr.querySelector('.icon-delete').addEventListener('click', () => deleteCustomer(cust.id));

            tbody.appendChild(tr);
        });
    }

    // معالجة حفظ وتأمين الملف الضريبي في قاعدة البيانات السحابية
    window.handleCustomerSubmit = function(e) {
        e.preventDefault();

        const idField = document.getElementById('custInvoiceId');
        const nameField = document.getElementById('custName');
        const phoneField = document.getElementById('custPhone');
        const vatField = document.getElementById('custVatNumber');
        
        const cityField = document.getElementById('custCity');
        const districtField = document.getElementById('custDistrict');
        const streetField = document.getElementById('custStreet');
        const buildingField = document.getElementById('custBuildingNo');
        const postalField = document.getElementById('custPostalCode');
        const additionalField = document.getElementById('custAdditionalNo');

        const vatNumberValue = vatField.value.trim();

        // مطابقة قيود ومعايير هيئة الزكاة والضريبة والجمارك لـ B2B
        if (vatNumberValue !== "") {
            if (vatNumberValue.length !== 15 || isNaN(vatNumberValue)) {
                showToast("خطأ تدقيق ZATCA: الرقم الضريبي يجب أن يكون 15 خانة رقمية تماماً!", false);
                return;
            }
            if (!vatNumberValue.startsWith('3') || !vatNumberValue.endsWith('3')) {
                showToast("خطأ تدقيق ZATCA: الأرقام الضريبية بالمملكة يجب أن تبدأ وتنتهي بالرقم 3!", false);
                return;
            }
        }

        if (additionalField.value.trim().length !== 4 || isNaN(additionalField.value.trim())) {
            showToast("خطأ في العنوان: الرقم الإضافي للعنوان الوطني يجب أن يتكون من 4 أرقام!", false);
            return;
        }

        const payload = {
            id: idField.value.trim(),
            vat_number: vatNumberValue,
            name: nameField.value.trim(),
            phone: phoneField.value.trim(),
            city: cityField.value.trim(),
            district: districtField.value.trim(),
            street_name: streetField.value.trim(), 
            building_no: buildingField.value.trim(),
            postal_code: postalField.value.trim(),
            additional_no: additionalField.value.trim(),
            updated_at: new Date().toISOString()
        };

        if (editModeCustomerId) {
            update(ref(db, `altajer_customers/${editModeCustomerId}`), payload)
            .then(() => {
                showToast("تم تحديث الملف الضريبي في السحابة بنجاح.");
                clearCustomerForm();
            })
            .catch((err) => showToast("فشل التحديث السحابي: " + err.message, false));
        } else {
            const localCusts = JSON.parse(localStorage.getItem('altajer_customers')) || [];
            if (localCusts.some(c => c.id === payload.id)) {
                showToast("خطأ تدقيق: كود العميل هذا مسجل مسبقاً في الدليل!", false);
                return;
            }

            set(ref(db, `altajer_customers/${payload.id}`), payload)
            .then(() => {
                showToast("تم تسجيل العميل بنجاح وتأمينه في الـ Firebase.");
                clearCustomerForm();
            })
            .catch((err) => showToast("فشل الحفظ السحابي: " + err.message, false));
        }
    };

    // تحميل بيانات العميل إلى حقول الإدخال لتعديلها
    function loadCustomerToEdit(id) {
        const localCusts = JSON.parse(localStorage.getItem('altajer_customers')) || [];
        const cust = localCusts.find(c => c.id === id);
        if (!cust) return;

        editModeCustomerId = cust.id;
        
        const idInput = document.getElementById('custInvoiceId');
        idInput.value = cust.id;
        idInput.disabled = true; 

        document.getElementById('custVatNumber').value = cust.vat_number || '';
        document.getElementById('custName').value = cust.name || '';
        document.getElementById('custPhone').value = cust.phone || '';
        
        document.getElementById('custCity').value = cust.city || '';
        document.getElementById('custDistrict').value = cust.district || '';
        document.getElementById('custStreet').value = cust.street_name || '';
        document.getElementById('custBuildingNo').value = cust.building_no || '';
        document.getElementById('custPostalCode').value = cust.postal_code || '';
        document.getElementById('custAdditionalNo').value = cust.additional_no || '';

        document.getElementById('lblSubmitBtn').innerText = "تعديل الملف المعتمد سحابياً";
        document.getElementById('btnSubmitAction').style.setProperty('--clr', 'var(--warning-orange)');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // حذف المنشأة من قاعدة البيانات السحابية نهائياً
    function deleteCustomer(id) {
        if (confirm("هل أنت متأكد من رغبتك في حذف هذه المنشأة نهائياً من قاعدة البيانات السحابية؟")) {
            remove(ref(db, `altajer_customers/${id}`))
            .then(() => {
                showToast("تمت إزالة العميل من السجلات السحابية والمحلية.", false);
                if (editModeCustomerId === id) clearCustomerForm();
            })
            .catch((err) => showToast("حدث خطأ أثناء الحذف: " + err.message, false));
        }
    }

    // إعادة تهيئة النموذج وتفريغ حقول المدخلات
    window.clearCustomerForm = function() {
        editModeCustomerId = null;
        const form = document.getElementById('customerForm');
        if (form) form.reset();
        
        const idInput = document.getElementById('custInvoiceId');
        if (idInput) {
            idInput.disabled = false;
            idInput.focus();
        }
        
        document.getElementById('lblSubmitBtn').innerText = "حفظ وتأمين الملف الضريبي";
        document.getElementById('btnSubmitAction').style.setProperty('--clr', 'var(--light-green)');
    };

    // ربط الحدث بالنموذج
    document.getElementById('customerForm').onsubmit = window.handleCustomerSubmit;
</script>
</body>
</html>
