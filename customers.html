<!-- التاجر برو المحاسبي - إدارة العملاء -->
<div class="card" id="manageCustomer">
    <h2 style="text-align: center; color: #0077b6;"><i class="fas fa-user-plus"></i> إدارة بيانات العملاء</h2>

    <!-- المربع الموحد المطور -->
    <div style="border: 2px solid #0077b6; border-radius: 10px; padding: 15px; background: #fff; margin-bottom: 20px;">
        <div style="display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee;">
            <span style="flex: 1; font-weight: bold; color: #0077b6;">رقم العميل (ID)</span>
            <input type="text" id="id" style="flex: 2; padding: 10px; border: 1px solid #ccc; border-radius: 6px; text-align: center;" placeholder="للبحث أو التعديل">
        </div>
        <div style="display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee;">
            <span style="flex: 1; font-weight: bold; color: #0077b6;">اسم العميل</span>
            <input type="text" id="name" style="flex: 2; padding: 10px; border: 1px solid #ccc; border-radius: 6px; text-align: center;">
        </div>
        <div style="display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee;">
            <span style="flex: 1; font-weight: bold; color: #0077b6;">رقم الجوال</span>
            <input type="tel" id="contact" style="flex: 2; padding: 10px; border: 1px solid #ccc; border-radius: 6px; text-align: center;">
        </div>
    </div>

    <!-- أزرار التحكم -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button onclick="addCustomer()" style="grid-column: span 2; background: #0077b6; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold;">إضافة عميل</button>
        <button onclick="searchCustomer()" style="background: #6c757d; color: white; padding: 12px; border: none; border-radius: 8px;">بحث</button>
        <button onclick="updateCustomer()" style="background: #90be6d; color: #000; padding: 12px; border: none; border-radius: 8px;">تعديل</button>
    </div>
</div>
