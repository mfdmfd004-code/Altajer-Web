<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>تاجر برو المحاسبي - إدارة حسابات العملاء والامتثال الضريبي</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0c3f65">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --dark-bg: #0d1b2a;
            --card-bg: #1b263b;
            --sea-blue: #0077b6;
            --light-green: #38b000;
            --neon-cyan: #00b4d8;
            --neon-pink: #e81cff;
            --text-white: #ffffff;
            --danger-red: #e63946;
            --warning-orange: #ffb703;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            margin: 0;
            padding: 20px 10px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .customer-container {
            max-width: 850px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 2px solid var(--sea-blue);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0, 180, 216, 0.2);
            position: relative;
        }

        .customer-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--sea-blue), var(--neon-pink));
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
        }

        .customer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px dashed rgba(0, 180, 216, 0.3);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .customer-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(0, 180, 216, 0.4);
        }

        .section-subtitle {
            font-size: 15px;
            color: var(--neon-cyan);
            margin-top: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 180, 216, 0.15);
            padding-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* حاويات المدخلات المحدثة هندسياً */
        .input-container {
            position: relative;
            margin-bottom: 25px;
        }

        .input-container input {
            border: 0;
            border-bottom: 2px solid #4a5568;
            background: transparent;
            width: 100%;
            padding: 8px 5px 4px 5px;
            font-size: 15px;
            color: #fff;
            transition: border-color 0.3s;
        }

        .input-container input:focus {
            outline: none;
            border-bottom: 2px solid var(--neon-cyan);
        }

        .input-container label {
            position: absolute;
            top: -12px;
            right: 5px;
            font-size: 13px;
            color: #a0aec0;
            pointer-events: none;
            transition: all 0.3s ease-in-out;
        }

        html[dir="ltr"] .input-container label {
            left: 5px;
            right: auto;
        }

        .national-address-box {
            background: rgba(13, 27, 42, 0.4);
            border: 1px dashed rgba(0, 180, 216, 0.2);
            border-radius: 12px;
            padding: 20px 15px 5px 15px;
            margin-bottom: 20px;
        }

        .btn-neon {
            background: #2d3748;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-neon:hover {
            background: var(--clr);
            box-shadow: 0 0 15px var(--clr);
            color: #fff;
            transform: translateY(-2px);
        }

        .table-responsive-custom {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-top: 30px;
            border: 1px solid rgba(0, 180, 216, 0.2);
        }

        .table-custom {
            background-color: #0d1b2a !important;
            color: white !important;
            margin-bottom: 0;
            font-size: 14px;
        }

        .table-custom th {
            background-color: #0c3f65 !important;
            color: var(--neon-cyan) !important;
            font-weight: 600;
        }

        .table-custom td {
            vertical-align: middle;
            border-color: rgba(255, 255, 255, 0.05) !important;
        }

        .action-icon {
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.2s;
            margin: 0 5px;
        }
        .action-icon:hover { transform: scale(1.2); }
        .icon-edit { color: var(--warning-orange); }
        .icon-delete { color: var(--danger-red); }

        .lang-selector {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--neon-cyan);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            outline: none;
        }

        .api-toast {
            position: fixed;
            top: 30px;
            right: 20px;
            z-index: 2000;
            padding: 12px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
        }
        html[dir="ltr"] .api-toast { right: auto; left: 20px; }
    </style>
</head>
<body>

<div id="apiToast" class="api-toast"></div>

<div class="customer-container">
    <div class="customer-header">
        <div class="customer-title">
            <i class='bx bx-user-pin bx-flashing'></i>
            <span data-i18n="cust-main-title">إدارة حسابات العملاء والامتثال الضريبي</span>
        </div>
        <div>
            <select class="lang-selector" onchange="changeLanguage(this.value)" id="langSelect">
                <option value="ar">العربية (AR)</option>
                <option value="en">English (EN)</option>
            </select>
        </div>
    </div>

    <form id="customerForm" onsubmit="handleCustomerSubmit(event)">
        
        <div class="section-subtitle">
            <i class="fas fa-id-card"></i> <span data-i18n="sub-cust-identity">المعرّفات الهيكلية للعميل</span>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="input-container">
                    <input id="custInvoiceId" type="text" required placeholder=" ">
                    <label data-i18n="lbl-cust-id">معرّف العميل (ID)</label>
                </div>
            </div>
            <div class="col-md-8">
                <div class="input-container">
                    <input id="custVatNumber" type="text" placeholder=" ">
                    <label data-i18n="lbl-cust-vat">الرقم الضريبي للعميل (15 خانة لـ B2B)</label>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-7">
                <div class="input-container">
                    <input id="custName" type="text" required placeholder=" ">
                    <label data-i18n="lbl-cust-name">اسم العميل المعتمد / المنشأة المستهدفة</label>
                </div>
            </div>
            <div class="col-md-5">
                <div class="input-container">
                    <input id="custPhone" type="text" required placeholder=" ">
                    <label data-i18n="lbl-cust-phone">رقم الجوال / الاتصال</label>
                </div>
            </div>
        </div>

        <div class="section-subtitle">
            <i class="fas fa-map-marker-alt"></i> <span data-i18n="sub-cust-address">تفاصيل العنوان الوطني للعميل</span>
        </div>

        <div class="national-address-box">
            <div class="row">
                <div class="col-6 col-md-4">
                    <div class="input-container">
                        <input id="custCity" type="text" required placeholder=" ">
                        <label data-i18n="lbl-c-city">المدينة</label>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="input-container">
                        <input id="custDistrict" type="text" required placeholder=" ">
                        <label data-i18n="lbl-c-district">الحي</label>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="input-container">
                        <input id="custStreet" type="text" required placeholder=" ">
                        <label data-i18n="lbl-c-street">اسم الشارع</label>
                    </div>
                </div>
                <div class="col-6">
                    <div class="input-container">
                        <input id="custBuildingNo" type="text" required placeholder=" ">
                        <label data-i18n="lbl-c-building">رقم المبنى</label>
                    </div>
                </div>
                <div class="col-6">
                    <div class="input-container">
                        <input id="custPostalCode" type="text" required placeholder=" ">
                        <label data-i18n="lbl-c-postal">الرمز البريدي</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex flex-wrap gap-2 justify-content-between mt-3">
            <div class="d-flex gap-2">
                <button type="submit" id="btnSubmitAction" class="btn-neon" style="--clr:var(--light-green)">
                    <i class="fas fa-user-plus"></i> <span id="lblSubmitBtn" data-i18n="btn-add-cust">إضافة وحفظ لحسابك</span>
                </button>
                <button type="button" onclick="clearCustomerForm()" class="btn-neon" style="--clr:var(--warning-orange)">
                    <i class="fas fa-redo"></i> <span data-i18n="btn-clear-cust">عميل جديد</span>
                </button>
            </div>
            <button type="button" onclick="window.location.href='index.html'" class="btn-neon" style="--clr:var(--neon-cyan)">
                <i class="fas fa-home"></i> <span data-i18n="btn-dashboard">الرئيسية</span>
            </button>
        </div>
    </form>

    <div class="table-responsive-custom">
        <table class="table table-dark table-striped table-custom text-center">
            <thead>
                <tr>
                    <th data-i18n="th-c-id">المعرّف</th>
                    <th data-i18n="th-c-name">الاسم</th>
                    <th data-i18n="th-c-vat">الرقم الضريبي</th>
                    <th data-i18n="th-c-phone">الجوال</th>
                    <th data-i18n="th-c-addr">العنوان</th>
                    <th data-i18n="th-c-actions">العمليات</th>
                </tr>
            </thead>
            <tbody id="customersTableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

<script>
    const API_ENDPOINT = 'api/save_customer.php';
    let editModeCustomerId = null;

    const translations = {
        ar: {
            "cust-main-title": "إدارة حسابات العملاء والامتثال الضريبي", "sub-cust-identity": "المعرّفات الهيكلية للعميل",
            "lbl-cust-id": "معرّف العميل (ID)", "lbl-cust-vat": "الرقم الضريبي للعميل (15 خانة لـ B2B)",
            "lbl-cust-name": "اسم العميل المعتمد / المنشأة المستهدفة", "lbl-cust-phone": "رقم الجوال / الاتصال",
            "sub-cust-address": "تفاصيل العنوان الوطني للعميل", "lbl-c-city": "المدينة", "lbl-c-district": "الحي",
            "lbl-c-street": "اسم الشارع", "lbl-c-building": "رقم المبنى", "lbl-c-postal": "الرمز البريدي",
            "btn-add-cust": "إضافة وحفظ لحسابك", "btn-clear-cust": "عميل جديد", "btn-dashboard": "الرئيسية",
            "th-c-id": "المعرّف", "th-c-name": "الاسم", "th-c-vat": "الرقم الضريبي", "th-c-phone": "الجوال",
            "th-c-addr": "العنوان", "th-c-actions": "العمليات", "btn-update-cust": "تحديث بيانات العميل"
        },
        en: {
            "cust-main-title": "Customer Management & Tax Compliance", "sub-cust-identity": "Customer Structural Identifiers",
            "lbl-cust-id": "Customer ID", "lbl-cust-vat": "Customer VAT Number (15 Digits for B2B)",
            "lbl-cust-name": "Certified Customer Name / Target Enterprise", "lbl-cust-phone": "Mobile / Contact Number",
            "sub-cust-address": "Customer National Address Details", "lbl-c-city": "City", "lbl-c-district": "District",
            "lbl-c-street": "Street Name", "lbl-c-building": "Building No", "lbl-c-postal": "Postal Code",
            "btn-add-cust": "Add & Save Customer", "btn-clear-cust": "New Customer", "btn-dashboard": "Dashboard",
            "th-c-id": "ID", "th-c-name": "Name", "th-c-vat": "VAT Number", "th-c-phone": "Mobile",
            "th-c-addr": "Address", "th-c-actions": "Actions", "btn-update-cust": "Update Customer Info"
        }
    };

    document.addEventListener("DOMContentLoaded", function() {
        renderCustomersTable();
        const currentLang = localStorage.getItem('altajer_lang') || 'ar';
        document.getElementById('langSelect').value = currentLang;
        changeLanguage(currentLang);
    });

    function changeLanguage(lang) {
        localStorage.setItem('altajer_lang', lang);
        document.documentElement.lang = lang; 
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        
        $('[data-i18n]').each(function() { 
            const key = $(this).data('i18n'); 
            if (translations[lang] && translations[lang][key]) { 
                $(this).text(translations[lang][key]); 
            } 
        });
    }

    function showToast(message, isSuccess = true) {
        const toast = document.getElementById('apiToast'); 
        toast.innerText = message;
        toast.style.backgroundColor = isSuccess ? 'var(--light-green)' : 'var(--danger-red)';
        toast.style.display = 'block'; 
        setTimeout(() => { toast.style.display = 'none'; }, 3500);
    }

    function getCustomersList() {
        return JSON.parse(localStorage.getItem('altajer_customers_list')) || [];
    }

    function renderCustomersTable() {
        const customers = getCustomersList();
        const tbody = document.getElementById('customersTableBody');
        tbody.innerHTML = '';

        if(customers.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-muted text-center">لا يوجد عملاء مسجلين حالياً</td></tr>`;
            return;
        }

        customers.forEach(cust => {
            const fullAddr = `${cust.building_no}، ${cust.street}، ${cust.district}، ${cust.city}`;
            tbody.innerHTML += `
                <tr>
                    <td>${cust.id}</td>
                    <td class="fw-bold text-info">${cust.name}</td>
                    <td>${cust.vat_number || '---'}</td>
                    <td>${cust.phone}</td>
                    <td class="small text-white-50">${fullAddr}</td>
                    <td>
                        <i class="fas fa-edit action-icon icon-edit" onclick="loadCustomerToEdit('${cust.id}')"></i>
                        <i class="fas fa-trash-alt action-icon icon-delete" onclick="deleteCustomer('${cust.id}')"></i>
                    </td>
                </tr>
            `;
        });
    }

    function handleCustomerSubmit(e) {
        e.preventDefault();

        const payload = {
            id: document.getElementById('custInvoiceId').value,
            vat_number: document.getElementById('custVatNumber').value,
            name: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            city: document.getElementById('custCity').value,
            district: document.getElementById('custDistrict').value,
            street: document.getElementById('custStreet').value,
            building_no: document.getElementById('custBuildingNo').value,
            postal_code: document.getElementById('custPostalCode').value
        };

        let customers = getCustomersList();

        if (editModeCustomerId) {
            // تحديث بيانات عميل موجود تعديلياً
            customers = customers.map(c => c.id === editModeCustomerId ? payload : c);
            showToast("تم تحديث بيانات العميل بنجاح");
        } else {
            // منع تكرار نفس المعرّف حماية للبيانات
            if (customers.some(c => c.id === payload.id)) {
                showToast("عذراً، معرّف العميل هذا مسجل مسبقاً!", false);
                return;
            }
            customers.push(payload);
            showToast("تم إضافة العميل الجديد وتأمين حسابه");
        }

        localStorage.setItem('altajer_customers_list', JSON.stringify(customers));
        clearCustomerForm();
        renderCustomersTable();

        // ترحيل ومزامنة مع السيرفر وقاعدة البيانات الموحدة InfinityFree
        fetch(API_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).catch(() => {});
    }

    function loadCustomerToEdit(id) {
        const customers = getCustomersList();
        const cust = customers.find(c => c.id === id);
        if(!cust) return;

        editModeCustomerId = cust.id;
        document.getElementById('custInvoiceId').value = cust.id;
        document.getElementById('custInvoiceId').disabled = true; // قفل الحقل أثناء التعديل لحماية المفتاح الأساسي
        document.getElementById('custVatNumber').value = cust.vat_number || '';
        document.getElementById('custName').value = cust.name;
        document.getElementById('custPhone').value = cust.phone;
        document.getElementById('custCity').value = cust.city;
        document.getElementById('custDistrict').value = cust.district;
        document.getElementById('custStreet').value = cust.street;
        document.getElementById('custBuildingNo').value = cust.building_no;
        document.getElementById('custPostalCode').value = cust.postal_code;

        const currentLang = localStorage.getItem('altajer_lang') || 'ar';
        const btnLabel = document.getElementById('lblSubmitBtn');
        if (btnLabel) { btnLabel.setAttribute('data-i18n', 'btn-update-cust'); btnLabel.innerText = translations[currentLang]['btn-update-cust']; }
        document.getElementById('btnSubmitAction').style.setProperty('--clr', 'var(--warning-orange)');
    }

    function deleteCustomer(id) {
        if(confirm("هل أنت متأكد من حذف هذا العميل نهائياً من سجلاتك المحاسبية؟")) {
            let customers = getCustomersList();
            customers = customers.filter(c => c.id !== id);
            localStorage.setItem('altajer_customers_list', JSON.stringify(customers));
            showToast("تم إزالة العميل من القائمة المحاسبية");
            renderCustomersTable();
            if(editModeCustomerId === id) clearCustomerForm();
        }
    }

    function clearCustomerForm() {
        editModeCustomerId = null;
        document.getElementById('customerForm').reset();
        document.getElementById('custInvoiceId').disabled = false;
        
        const currentLang = localStorage.getItem('altajer_lang') || 'ar';
        const btnLabel = document.getElementById('lblSubmitBtn');
        if (btnLabel) { btnLabel.setAttribute('data-i18n', 'btn-add-cust'); btnLabel.innerText = translations[currentLang]['btn-add-cust']; }
        document.getElementById('btnSubmitAction').style.setProperty('--clr', 'var(--light-green)');
    }
</script>
</body>
</html>
