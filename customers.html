<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>تاجر برو المحاسبي - إدارة حسابات العملاء والامتثال الضريبي</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0c3f65">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* نظام التاجر الاحترافي الكامل: دعم فصول السنة الأربعة المتناسق وتخفيف حدة التوهج لحماية أعين المستخدمين */
        :root, [data-theme="winter"] {
            --dark-bg: #0d1b2a;
            --card-bg: #1b263b;
            --sea-blue: #0077b6;
            --light-green: #38b000;
            --neon-cyan: #00b4d8;
            --neon-pink: #e81cff;
            --text-white: #ffffff;
            --danger-red: #e63946;
            --warning-orange: #ffb703;
            --glow-soft: 0 0 6px rgba(0, 180, 216, 0.35);
        }

        /* قالب الربيع (Spring Theme) */
        [data-theme="spring"] {
            --dark-bg: #1a2f16;
            --card-bg: #243e1e;
            --sea-blue: #52b788;
            --light-green: #74c69d;
            --neon-cyan: #95d5b2;
            --neon-pink: #ff70a6;
            --text-white: #f4f9f4;
            --danger-red: #ff4d6d;
            --warning-orange: #ff9f1c;
            --glow-soft: 0 0 6px rgba(149, 213, 178, 0.35);
        }

        /* قالب الصيف (Summer Theme) */
        [data-theme="summer"] {
            --dark-bg: #0f2a35;
            --card-bg: #173f5f;
            --sea-blue: #20639b;
            --light-green: #3caea3;
            --neon-cyan: #2a9d8f;
            --neon-pink: #f4a261;
            --text-white: #f8f9fa;
            --danger-red: #e76f51;
            --warning-orange: #f4a261;
            --glow-soft: 0 0 6px rgba(42, 157, 143, 0.35);
        }

        /* قالب الخريف (Autumn Theme) */
        [data-theme="autumn"] {
            --dark-bg: #2b1810;
            --card-bg: #3e261d;
            --sea-blue: #b07d62;
            --light-green: #9e2a2b;
            --neon-cyan: #e36414;
            --neon-pink: #ffb703;
            --text-white: #fff8f5;
            --danger-red: #6f1d1b;
            --warning-orange: #ff9f1c;
            --glow-soft: 0 0 6px rgba(227, 100, 20, 0.35);
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            margin: 0;
            padding: 20px 10px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .customer-container {
            max-width: 850px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 2px solid var(--sea-blue);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0, 180, 216, 0.15);
            position: relative;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .customer-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--sea-blue), var(--neon-pink));
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
        }

        .customer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px dashed rgba(0, 180, 216, 0.25);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .customer-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: var(--glow-soft);
        }

        .section-subtitle {
            font-size: 15px;
            color: var(--neon-cyan);
            margin-top: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 180, 216, 0.15);
            padding-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-container {
            position: relative;
            margin-bottom: 25px;
        }

        .input-container input {
            border: 0;
            border-bottom: 2px solid #4a5568;
            background: transparent;
            width: 100%;
            padding: 8px 5px 4px 5px;
            font-size: 15px;
            color: #fff;
            transition: border-color 0.3s;
        }

        .input-container input:focus {
            outline: none;
            border-bottom: 2px solid var(--neon-cyan);
        }

        .input-container label {
            position: absolute;
            top: -12px;
            right: 5px;
            font-size: 13px;
            color: #a0aec0;
            pointer-events: none;
            transition: all 0.3s ease-in-out;
        }

        html[dir="ltr"] .input-container label {
            left: 5px;
            right: auto;
        }

        .national-address-box {
            background: rgba(0, 0, 0, 0.15);
            border: 1px dashed rgba(0, 180, 216, 0.2);
            border-radius: 12px;
            padding: 20px 15px 5px 15px;
            margin-bottom: 20px;
        }

        .btn-neon {
            background: #2d3748;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-neon:hover {
            background: var(--clr);
            box-shadow: 0 0 12px var(--clr);
            color: #fff;
            transform: translateY(-2px);
        }

        .table-responsive-custom {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-top: 30px;
            border: 1px solid rgba(0, 180, 216, 0.2);
        }

        .table-custom {
            background-color: rgba(0, 0, 0, 0.15) !important;
            color: white !important;
            margin-bottom: 0;
            font-size: 14px;
        }

        .table-custom th {
            background-color: rgba(0, 0, 0, 0.3) !important;
            color: var(--neon-cyan) !important;
            font-weight: 600;
        }

        .table-custom td {
            vertical-align: middle;
            border-color: rgba(255, 255, 255, 0.04) !important;
        }

        .action-icon {
            cursor: pointer;
            font-size: 17px;
            transition: transform 0.2s;
            margin: 0 5px;
        }
        .action-icon:hover { transform: scale(1.2); }
        .icon-edit { color: var(--warning-orange); }
        .icon-delete { color: var(--danger-red); }

        .lang-selector {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--neon-cyan);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            outline: none;
        }

        .api-toast {
            position: fixed;
            top: 30px;
            right: 20px;
            z-index: 2000;
            padding: 12px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
        }
        html[dir="ltr"] .api-toast { right: auto; left: 20px; }
    </style>
</head>
<body>

<div id="apiToast" class="api-toast"></div>

<div class="customer-container">
    <div class="customer-header">
        <div class="customer-title">
            <i class='bx bx-user-pin bx-flashing'></i>
            <span data-i18n="cust-main-title">إدارة حسابات العملاء والامتثال الضريبي</span>
        </div>
        <div>
            <select class="lang-selector" onchange="changeLanguage(this.value)" id="langSelect">
                <option value="ar">العربية (AR)</option>
                <option value="en">English (EN)</option>
            </select>
        </div>
    </div>

    <form id="customerForm" onsubmit="handleCustomerSubmit(event)">
        
        <div class="section-subtitle">
            <i class="fas fa-id-card"></i> <span data-i18n="sub-cust-identity">المعرّفات الهيكلية للعميل</span>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="input-container">
                    <input id="custInvoiceId" type="text" required placeholder=" " autofocus>
                    <label data-i18n="lbl-cust-id">معرّف العميل (ID)</label>
                </div>
            </div>
            <div class="col-md-8">
                <div class="input-container">
                    <input id="custVatNumber" type="text" maxlength="15" placeholder=" ">
                    <label data-i18n="lbl-cust-vat">الرقم الضريبي للعميل (15 خانة لـ B2B)</label>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-7">
                <div class="input-container">
                    <input id="custName" type="text" required placeholder=" ">
                    <label data-i18n="lbl-cust-name">اسم العميل المعتمد / المنشأة المستهدفة</label>
                </div>
            </div>
            <div class="col-md-5">
                <div class="input-container">
                    <input id="custPhone" type="tel" required placeholder=" ">
                    <label data-i18n="lbl-cust-phone">رقم الجوال / الاتصال</label>
                </div>
            </div>
        </div>

        <div class="section-subtitle">
            <i class="fas fa-map-marker-alt"></i> <span data-i18n="sub-cust-address">تفاصيل العنوان الوطني للعميل (المطابقة الضريبية لـ ZATCA)</span>
        </div>

        <div class="national-address-box">
            <div class="row">
                <div class="col-6 col-md-4">
                    <div class="input-container">
                        <input id="custCity" type="text" required placeholder=" ">
                        <label data-i18n="lbl-c-city">المدينة</label>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="input-container">
                        <input id="custDistrict" type="text" required placeholder=" ">
                        <label data-i18n="lbl-c-district">الحي</label>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="input-container">
                        <input id="custStreet" type="text" required placeholder=" ">
                        <label data-i18n="lbl-c-street">اسم الشارع</label>
                    </div>
                </div>
                <div class="col-6 col-md-6">
                    <div class="input-container">
                        <input id="custBuildingNo" type="text" required placeholder=" ">
                        <label data-i18n="lbl-c-building">رقم المبنى</label>
                    </div>
                </div>
                <div class="col-6 col-md-6">
                    <div class="input-container">
                        <input id="custPostalCode" type="number" required placeholder=" ">
                        <label data-i18n="lbl-c-postal">الرمز البريدي</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex flex-wrap gap-2 justify-content-between mt-3">
            <div class="d-flex gap-2 w-100 justify-content-between justify-content-md-start">
                <button type="submit" id="btnSubmitAction" class="btn-neon" style="--clr:var(--light-green)">
                    <i class="fas fa-user-plus"></i> <span id="lblSubmitBtn" data-i18n="btn-add-cust">إضافة وحفظ لحسابك</span>
                </button>
                <button type="button" onclick="clearCustomerForm()" class="btn-neon" style="--clr:var(--warning-orange)">
                    <i class="fas fa-redo"></i> <span data-i18n="btn-clear-cust">عميل جديد</span>
                </button>
            </div>
        </div>
    </form>

    <div class="table-responsive-custom">
        <table class="table table-dark table-striped table-custom text-center">
            <thead>
                <tr>
                    <th data-i18n="th-c-id">المعرّف</th>
                    <th data-i18n="th-c-name">الاسم</th>
                    <th data-i18n="th-c-vat">الرقم الضريبي</th>
                    <th data-i18n="th-c-phone">الجوال</th>
                    <th data-i18n="th-c-addr">العنوان الوطني</th>
                    <th data-i18n="th-c-actions">العمليات</th>
                </tr>
            </thead>
            <tbody id="customersTableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script>
    // الحفاظ على نقطة الاتصال ومفاتيح التحكم الأساسية بنظام التاجر
    const API_ENDPOINT = 'api/save_customer.php';
    let editModeCustomerId = null;

    // قاموس المصطلحات الكامل المزدوج للغات للامتثال المعتمد
    const translations = {
        ar: {
            "cust-main-title": "إدارة حسابات العملاء والامتثال الضريبي",
            "sub-cust-identity": "المعرّفات الهيكلية للعميل",
            "lbl-cust-id": "معرّف العميل (ID)",
            "lbl-cust-vat": "الرقم الضريبي للعميل (15 خانة لـ B2B)",
            "lbl-cust-name": "اسم العميل المعتمد / المنشأة المستهدفة",
            "lbl-cust-phone": "رقم الجوال / الاتصال",
            "sub-cust-address": "تفاصيل العنوان الوطني للعميل (المطابقة الضريبية لـ ZATCA)",
            "lbl-c-city": "المدينة",
            "lbl-c-district": "الحي",
            "lbl-c-street": "اسم الشارع",
            "lbl-c-building": "رقم المبنى",
            "lbl-c-postal": "الرمز البريدي",
            "btn-add-cust": "إضافة وحفظ لحسابك",
            "btn-clear-cust": "عميل جديد",
            "th-c-id": "المعرّف",
            "th-c-name": "الاسم",
            "th-c-vat": "الرقم الضريبي",
            "th-c-phone": "الجوال",
            "th-c-addr": "العنوان الوطني",
            "th-c-actions": "العمليات",
            "btn-update-cust": "تحديث بيانات العميل"
        },
        en: {
            "cust-main-title": "Customer Management & Tax Compliance",
            "sub-cust-identity": "Customer Structural Identifiers",
            "lbl-cust-id": "Customer ID",
            "lbl-cust-vat": "Customer VAT Number (15 Digits for B2B)",
            "lbl-cust-name": "Certified Customer Name / Target Enterprise",
            "lbl-cust-phone": "Mobile / Contact Number",
            "sub-cust-address": "Customer National Address Details (Tax Compliance)",
            "lbl-c-city": "City",
            "lbl-c-district": "District",
            "lbl-c-street": "Street Name",
            "lbl-c-building": "Building No",
            "lbl-c-postal": "Postal Code",
            "btn-add-cust": "Add & Save Customer",
            "btn-clear-cust": "New Customer",
            "th-c-id": "ID",
            "th-c-name": "Name",
            "th-c-vat": "VAT Number",
            "th-c-phone": "Mobile",
            "th-c-addr": "National Address",
            "th-c-actions": "Actions",
            "btn-update-cust": "Update Customer Info"
        }
    };

    // نظام المزامنة البصرية التلقائية للفصول الأربعة لحماية العين
    function applySavedTheme() {
        const activeTheme = localStorage.getItem('altajer_preferred_theme') || 'winter';
        document.documentElement.setAttribute('data-theme', activeTheme);
    }

    document.addEventListener("DOMContentLoaded", function() {
        applySavedTheme();
        renderCustomersTable();
        const currentLang = localStorage.getItem('altajer_lang') || 'ar';
        document.getElementById('langSelect').value = currentLang;
        changeLanguage(currentLang);
    });

    function changeLanguage(lang) {
        localStorage.setItem('altajer_lang', lang);
        document.documentElement.lang = lang; 
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        
        $('[data-i18n]').each(function() { 
            const key = $(this).data('i18n'); 
            if (translations[lang] && translations[lang][key]) { 
                $(this).text(translations[lang][key]); 
            } 
        });
    }

    function showToast(message, isSuccess = true) {
        const toast = document.getElementById('apiToast'); 
        if (!toast) return;
        toast.innerText = message;
        toast.style.backgroundColor = isSuccess ? 'var(--light-green)' : 'var(--danger-red)';
        toast.style.display = 'block'; 
        setTimeout(() => { toast.style.display = 'none'; }, 3500);
    }

    function getCustomersList() {
        try {
            return JSON.parse(localStorage.getItem('altajer_customers_list')) || [];
        } catch (e) {
            return [];
        }
    }

    // بناء وعرض جدول السجلات الشامل مع تركيب حقول العنوان الوطني بدقة
    function renderCustomersTable() {
        const customers = getCustomersList();
        const tbody = document.getElementById('customersTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';

        if (customers.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-muted text-center p-3">لا يوجد عملاء مسجلين حالياً في سجلات النظام المحلي</td></tr>`;
            return;
        }

        customers.forEach(cust => {
            // تركيب صياغة العنوان برسم وطني ممتثل للهيئة
            const fullAddr = `مبنى ${cust.building_no || '---'}، ش ${cust.street || '---'}، حي ${cust.district || '---'}، ${cust.city || '---'} (${cust.postal_code || '---'})`;
            tbody.innerHTML += `
                <tr>
                    <td>${cust.id}</td>
                    <td class="fw-bold text-info">${cust.name}</td>
                    <td class="text-warning">${cust.vat_number || '---'}</td>
                    <td>${cust.phone}</td>
                    <td class="small text-white-50">${fullAddr}</td>
                    <td>
                        <i class="fas fa-edit action-icon icon-edit" onclick="loadCustomerToEdit('${cust.id}')" title="تعديل"></i>
                        <i class="fas fa-trash-alt action-icon icon-delete" onclick="deleteCustomer('${cust.id}')" title="حذف"></i>
                    </td>
                </tr>
            `;
        });
    }

    function handleCustomerSubmit(e) {
        e.preventDefault();

        const idField = document.getElementById('custInvoiceId');
        const nameField = document.getElementById('custName');
        const phoneField = document.getElementById('custPhone');
        const vatField = document.getElementById('custVatNumber');
        
        const cityField = document.getElementById('custCity');
        const districtField = document.getElementById('custDistrict');
        const streetField = document.getElementById('custStreet');
        const buildingField = document.getElementById('custBuildingNo');
        const postalField = document.getElementById('custPostalCode');

        const vatNumberValue = vatField.value.trim();

        // تدقيق محاسبي صارم للرقم الضريبي للمنشآت B2B (يجب أن يكون 15 خانة رقمية)
        if (vatNumberValue !== "") {
            if (vatNumberValue.length !== 15 || isNaN(vatNumberValue)) {
                showToast("خطأ تدقيق: الرقم الضريبي للمنشأة يجب أن يتكون من 15 خانة رقمية صحيحة!", false);
                return;
            }
            if (!vatNumberValue.startsWith('3')) {
                showToast("تنبيه نظام: الأرقام الضريبية بالمملكة تبدأ عادةً بالرقم 3، يرجى تأكيد الرقم.", false);
            }
        }

        // بناء حزمة البيانات الهيكلية التراكمية الكاملة
        const payload = {
            id: idField.value.trim(),
            vat_number: vatNumberValue,
            name: nameField.value.trim(),
            phone: phoneField.value.trim(),
            city: cityField.value.trim(),
            district: districtField.value.trim(),
            street: streetField.value.trim(),
            building_no: buildingField.value.trim(),
            postal_code: postalField.value.trim()
        };

        let customers = getCustomersList();

        if (editModeCustomerId) {
            // تحديث العميل في الوضع التعديلي التراكمي
            customers = customers.map(c => c.id === editModeCustomerId ? payload : c);
            showToast("تم تحديث بيانات العميل بنجاح في قاعدة البيانات");
        } else {
            // حماية سلامة البيانات ومنع تكرار المعرّف الأساسي
            if (customers.some(c => c.id === payload.id)) {
                showToast("عذراً، معرّف العميل (ID) هذا مسجل مسبقاً في المستندات!", false);
                return;
            }
            customers.push(payload);
            showToast("تم إضافة العميل الجديد وتأمين بياناته الضريبية");
        }

        localStorage.setItem('altajer_customers_list', JSON.stringify(customers));
        clearCustomerForm();
        renderCustomersTable();

        // الترحيل المتزامن الفوري مع خادمك الخلفي الأصلي بقاعدة البيانات
        fetch(API_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (!response.ok) throw new Error();
            return response.json();
        })
        .then(data => {
            if(data && data.status === 'success') {
                console.log("تم التأكيد والمزامنة السحابية بنجاح");
            }
        })
        .catch(() => {
            console.warn("جاري العمل بالوضع المحلي الممتثل، سيتم المزامنة عند استقرار الشبكة");
        });
    }

    // توزيع بيانات العنوان المفصل داخل حقول التعديل
    function loadCustomerToEdit(id) {
        const customers = getCustomersList();
        const cust = customers.find(c => c.id === id);
        if (!cust) return;

        editModeCustomerId = cust.id;
        
        const idInput = document.getElementById('custInvoiceId');
        idInput.value = cust.id;
        idInput.disabled = true; // قفل المعرّف الفرعي لحماية القيود الدفترية

        document.getElementById('custVatNumber').value = cust.vat_number || '';
        document.getElementById('custName').value = cust.name || '';
        document.getElementById('custPhone').value = cust.phone || '';
        
        // تعبئة البيانات المفصلة للعنوان المطور
        document.getElementById('custCity').value = cust.city || '';
        document.getElementById('custDistrict').value = cust.district || '';
        document.getElementById('custStreet').value = cust.street || '';
        document.getElementById('custBuildingNo').value = cust.building_no || '';
        document.getElementById('custPostalCode').value = cust.postal_code || '';

        // تبديل حالة زر الإدخال بمرونة كاملة
        const currentLang = localStorage.getItem('altajer_lang') || 'ar';
        const btnLabel = document.getElementById('lblSubmitBtn');
        if (btnLabel) { 
            btnLabel.setAttribute('data-i18n', 'btn-update-cust'); 
            btnLabel.innerText = translations[currentLang]['btn-update-cust']; 
        }
        document.getElementById('btnSubmitAction').style.setProperty('--clr', 'var(--warning-orange)');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteCustomer(id) {
        if (confirm("هل أنت متأكد من حذف هذا العميل نهائياً من سجلاتك ومستنداتك المحاسبية؟")) {
            let customers = getCustomersList();
            customers = customers.filter(c => c.id !== id);
            localStorage.setItem('altajer_customers_list', JSON.stringify(customers));
            showToast("تم إزالة العميل من القائمة بنجاح", false);
            renderCustomersTable();
            if (editModeCustomerId === id) clearCustomerForm();
        }
    }

    function clearCustomerForm() {
        editModeCustomerId = null;
        const form = document.getElementById('customerForm');
        if (form) form.reset();
        
        const idInput = document.getElementById('custInvoiceId');
        if (idInput) {
            idInput.disabled = false;
            idInput.focus();
        }
        
        const currentLang = localStorage.getItem('altajer_lang') || 'ar';
        const btnLabel = document.getElementById('lblSubmitBtn');
        if (btnLabel) { 
            btnLabel.setAttribute('data-i18n', 'btn-add-cust'); 
            btnLabel.innerText = translations[currentLang]['btn-add-cust']; 
        }
        document.getElementById('btnSubmitAction').style.setProperty('--clr', 'var(--light-green)');
    }
</script>
</body>
</html>
