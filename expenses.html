<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المصاريف التشغيلية - التاجر برو</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        :root {
            --neon-cyan: #00b4d8;
            --sea-blue: #0077b6;
            --neon-pink: #ff007f;
            --light-green: #2ec4b6;
            --warning-orange: #ff9f1c;
            --danger-red: #e63946;
            --bg-dark-core: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glow-soft: 0 0 10px rgba(0, 180, 216, 0.3);
        }

        body {
            background-color: var(--bg-dark-core);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .expense-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 25px;
            margin: 0 auto 40px;
            max-width: 1100px;
            position: relative;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .expense-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--danger-red), var(--warning-orange), var(--neon-cyan));
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }

        .expense-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px dashed rgba(230, 57, 70, 0.2);
            padding-bottom: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .expense-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--danger-red);
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(230, 57, 70, 0.3);
        }

        .btn-neon {
            background: #1e293b;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-neon:hover {
            background: var(--clr);
            box-shadow: 0 0 15px var(--clr);
            color: #fff;
            transform: translateY(-2px);
            border-color: transparent;
        }

        .section-subtitle {
            font-size: 15px;
            color: var(--neon-cyan);
            margin-top: 5px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 180, 216, 0.15);
            padding-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-container {
            position: relative;
            margin-bottom: 25px;
        }

        .input-container input, .input-container select, .input-container textarea {
            border: 0;
            border-bottom: 2px solid #475569;
            background: transparent;
            width: 100%;
            padding: 8px max(5px) 4px 5px;
            font-size: 15px;
            color: #fff;
            transition: border-color 0.3s;
        }

        .input-container select option {
            background-color: #1e293b;
            color: #fff;
        }

        .input-container input:focus, .input-container select:focus, .input-container textarea:focus {
            outline: none;
            border-bottom: 2px solid var(--danger-red);
        }

        .input-container label {
            position: absolute;
            top: 8px;
            right: 5px;
            font-size: 14px;
            color: #94a3b8;
            pointer-events: none;
            transition: all 0.2s ease-in-out;
        }

        .input-container input:focus ~ label,
        .input-container input:not(:placeholder-shown) ~ label,
        .input-container select:focus ~ label,
        .input-container select:valid ~ label,
        .input-container textarea:focus ~ label,
        .input-container textarea:not(:placeholder-shown) ~ label {
            top: -14px;
            font-size: 12px;
            color: var(--danger-red);
        }
              .table-responsive-custom {
            border-radius: 12px;
            overflow: hidden;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .table-custom {
            background-color: transparent !important;
            color: #f1f5f9 !important;
            margin-bottom: 0;
            font-size: 14px;
        }

        .table-custom th {
            background-color: rgba(15, 23, 42, 0.6) !important;
            color: var(--danger-red) !important;
            font-weight: 600;
            border-bottom: 2px solid rgba(230, 57, 70, 0.3) !important;
        }

        .table-custom td {
            vertical-align: middle;
            border-color: rgba(255, 255, 255, 0.04) !important;
            background-color: rgba(30, 41, 59, 0.2) !important;
        }

        .action-icon {
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
            margin: 0 5px;
        }
        .action-icon:hover { transform: scale(1.2); }
        .icon-delete { color: var(--danger-red); }

        .api-toast {
            position: fixed;
            top: 30px;
            left: 20px;
            z-index: 2000;
            padding: 12px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
        }
    </style>
</head>
<body>

<div id="apiToast" class="api-toast"></div>

<div class="expense-container">
    <div class="expense-header">
        <div class="expense-title">
            <i class='bx bx-trending-down bx-flashing'></i>
            <span>قسم إدارة وتقييد المصاريف التشغيلية والتكاليف</span>
        </div>
        <div>
            <a href="index.html" class="btn-neon" style="--clr:var(--sea-blue)">
                <i class="fas fa-home"></i> <span>الرئيسية</span>
            </a>
        </div>
    </div>

    <form id="expenseForm">
        <div class="section-subtitle">
            <i class="fas fa-calculator"></i> <span>بيانات المصروف المباشر</span>
        </div>

        <div class="row">
            <div class="col-md-3">
                <div class="input-container">
                    <input id="expId" type="text" required placeholder=" " autofocus>
                    <label>رقم القيد السريع / الفاتورة</label>
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-container">
                    <select id="expCategory" required>
                        <option value="" disabled selected hidden></option>
                        <option value="مواد خام">مواد خام وتشغيل (مخبوزات/حلويات)</option>
                        <option value="إيجارات">إيجارات وفروع</option>
                        <option value="فواتير طاقة">فواتير (كهرباء / مياه / إنترنت)</option>
                        <option value="صيانة ومعدات">صيانة ومعدات وأدوات</option>
                        <option value="نقل وتوصيل">نقل وتوصيل وسلاسل إمداد</option>
                        <option value="مصاريف حكومية">رسوم ومصاريف حكومية / رخص</option>
                        <option value="أخرى">مصاريف عامة أخرى</option>
                    </select>
                    <label>تبويب وتصنيف المصروف</label>
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-container">
                    <input id="expDate" type="date" required placeholder=" ">
                    <label>تاريخ الاستحقاق / الصرف</label>
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-container">
                    <input id="expAmount" type="number" step="0.01" required placeholder=" ">
                    <label>قيمة المصروف (شامل الضريبة إن وجدت)</label>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="input-container">
                    <input id="expDetails" type="text" required placeholder=" ">
                    <label>تفاصيل وملاحظات المصروف المبرم (مثال: فاتورة الدقيق لشركة المراعي لشهر مايو)</label>
                </div>
            </div>
        </div>

        <div class="d-flex mt-2">
            <button type="submit" id="btnSubmitExpense" class="btn-neon" style="--clr:var(--danger-red)">
                <i class="fas fa-receipt"></i> <span>ترحيل وإثبات المصروف سحابياً</span>
            </button>
        </div>
    </form>

    <div class="table-responsive-custom">
        <table class="table table-custom text-center">
            <thead>
                <tr>
                    <th>رقم القيد</th>
                    <th>التصنيف التشغيلي</th>
                    <th>التاريخ</th>
                    <th>قيمة المصروف</th>
                    <th>التفاصيل والملاحظات</th>
                    <th>إجراءات التحكم</th>
                </tr>
            </thead>
            <tbody id="expensesTableBody">
                <tr>
                    <td colspan="6" class="text-muted p-3">جاري ربط الدليل المحاسبي وجلب التكاليف من Firebase...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // إعدادات مشروع الـ Firebase الحقيقية والمطابقة تماماً لـ Altajer Pro
    const firebaseConfig = {
        apiKey: "AIzaSyAdH8KorayFEiM3_N_I6v-m3A09uXqY4Q8", 
        authDomain: "altajer-pro-accountant.firebaseapp.com",
        databaseURL: "https://altajer-pro-accountant-default-rtdb.firebaseio.com",
        projectId: "altajer-pro-accountant",
        storageBucket: "altajer-pro-accountant.appspot.com",
        messagingSenderId: "982176278219", 
        appId: "1:982176278219:web:5fede7cef02cce60a35d4e" 
    };

    // تهيئة الاتصال بالسيرفر السحابي
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // تشغيل المزامنة وتعيين تاريخ اليوم تلقائياً لتسهيل العمل من الجوال
    document.addEventListener("DOMContentLoaded", function() {
        const dateInput = document.getElementById('expDate');
        if (dateInput) {
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
        }
        syncExpensesFromFirebase();
    });

    // إشعارات نظام التاجر المخصصة
    function showToast(message, isSuccess = true) {
        const toast = document.getElementById('apiToast');
        if (!toast) return;
        toast.innerText = message;
        toast.style.backgroundColor = isSuccess ? 'var(--light-green)' : 'var(--danger-red)';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3500);
    }

    // جلب المصاريف بشكل حي ومستمر من قاعدة البيانات
    function syncExpensesFromFirebase() {
        const expensesRef = ref(db, 'altajer_expenses');
        onValue(expensesRef, (snapshot) => {
            const data = snapshot.val();
            const expensesList = [];
            
            if (data) {
                Object.keys(data).forEach(key => {
                    expensesList.push(data[key]);
                });
            }
            // ترتيب المصاريف من الأحدث للأقدم
            expensesList.sort((a, b) => new Date(b.date) - new Date(a.date));
            renderExpensesTable(expensesList);
        }, (error) => {
            showToast("فشل جلب مصاريف السحابة: " + error.message, false);
        });
    }

    // بناء وعرض جدول المصاريف
    function renderExpensesTable(expenses) {
        const tbody = document.getElementById('expensesTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';

        if (expenses.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-muted text-center p-3">لا توجد تكاليف أو مصاريف مقيدة سحابياً حالياً.</td></tr>`;
            return;
        }

        expenses.forEach(exp => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="fw-bold text-info">${exp.id}</td>
                <td class="text-warning"><i class="fas fa-tags small me-1"></i>${exp.category}</td>
                <td>${exp.date}</td>
                <td class="fw-bold text-danger">${parseFloat(exp.amount).toFixed(2)} ر.س</td>
                <td class="small text-white-50 text-end">${exp.details}</td>
                <td>
                    <i class="fas fa-trash-alt action-icon icon-delete" title="شطب وإلغاء القيد"></i>
                </td>
            `;

            // ربط حذف المصروف لحماية ميزان المراجعة
            tr.querySelector('.icon-delete').addEventListener('click', () => deleteExpense(exp.id));
            tbody.appendChild(tr);
        });
    }

    // ترحيل المصروف للـ Firebase وقفل التكاليف
    document.getElementById('expenseForm').onsubmit = function(e) {
        e.preventDefault();

        const idField = document.getElementById('expId');
        const catField = document.getElementById('expCategory');
        const dateField = document.getElementById('expDate');
        const amountField = document.getElementById('expAmount');
        const detailsField = document.getElementById('expDetails');

        const payload = {
            id: idField.value.trim(),
            category: catField.value,
            date: dateField.value,
            amount: parseFloat(amountField.value),
            details: detailsField.value.trim(),
            created_at: new Date().toISOString()
        };

        set(ref(db, `altajer_expenses/${payload.id}`), payload)
        .then(() => {
            showToast("تم إثبات القيد وترحيل المصروف لقاعدة البيانات السحابية.");
            document.getElementById('expenseForm').reset();
            dateField.value = new Date().toISOString().split('T')[0];
            idField.focus();
        })
        .catch((err) => showToast("فشل ترحيل التكاليف: " + err.message, false));
    };

    // حذف وإلغاء قيد المصروف من السحابة
    function deleteExpense(id) {
        if (confirm("تحذير مالي: هل أنت متأكد من رغبتك في حذف قيد هذا المصروف نهائياً؟ سيؤثر هذا على صافي تقارير الأرباح.")) {
            remove(ref(db, `altajer_expenses/${id}`))
            .then(() => {
                showToast("تم شطب قيد المصروف وتحديث الحسابات السحابية.", false);
            })
            .catch((err) => showToast("حدث خطأ أثناء الشطب: " + err.message, false));
        }
    }
</script>
</body>
</html>
