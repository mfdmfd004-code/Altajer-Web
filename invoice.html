<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة المبيعات - التاجر برو</title>
    
    <!-- إعدادات التطبيق للجوال -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="التاجر برو">
    <meta name="theme-color" content="#0077b6">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --sea-blue: #0077b6; --light-green: #90be6d; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .card { background: var(--white); border-radius: 12px; padding: 20px; border-top: 5px solid var(--sea-blue); margin-bottom: 15px; }
        
        /* مربع إدخال العميل المطور */
        .search-box { position: relative; width: 100%; }
        .customer-results { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border: 1px solid #ccc; z-index: 100; 
            max-height: 150px; overflow-y: auto; display: none; 
            border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .customer-results div { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .customer-results div:hover { background-color: #f0f7ff; }

        .input-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .label-text { font-weight: bold; color: var(--sea-blue); flex: 1; }
        .input-field { flex: 2; padding: 10px; border: 1px solid #ccc; border-radius: 6px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align: center; color: var(--sea-blue);"><i class="fas fa-file-invoice-dollar"></i> فاتورة مبيعات جديدة</h2>
        
        <!-- نظام البحث في العملاء -->
        <div class="search-box">
            <div class="input-row">
                <span class="label-text">اسم العميل:</span>
                <input type="text" id="customer-search" class="input-field" placeholder="ابدأ بكتابة اسم العميل..." autocomplete="off">
            </div>
            <div id="customer-results" class="customer-results"></div>
        </div>

        <div class="input-row">
            <span class="label-text">رقم الجوال:</span>
            <input type="text" id="customer-phone" class="input-field" readonly style="background: #f9f9f9;">
        </div>
    </div>

    <!-- كود الربط البرمجي السحابي -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = { /* بياناتك هنا */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const searchInput = document.getElementById('customer-search');
        const resultsDiv = document.getElementById('customer-results');

        searchInput.oninput = async () => {
            const val = searchInput.value;
            if (val.length < 1) { resultsDiv.style.display = 'none'; return; }

            const querySnapshot = await getDocs(collection(db, "customers"));
            resultsDiv.innerHTML = '';
            let found = false;

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if (data.name.includes(val)) {
                    found = true;
                    const div = document.createElement('div');
                    div.innerText = data.name;
                    div.onclick = () => {
                        searchInput.value = data.name;
                        document.getElementById('customer-phone').value = data.phone;
                        resultsDiv.style.display = 'none';
                    };
                    resultsDiv.appendChild(div);
                }
            });

            resultsDiv.style.display = found ? 'block' : 'none';
        };
    </script>
</body>
</html>
