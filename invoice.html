<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فاتورة التاجر برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sea-blue: #0077b6; --light-green: #90be6d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 10px; margin: 0; }
        
        .card { background: white; border-radius: 12px; padding: 15px; border-top: 5px solid var(--sea-blue); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* نظام المربع الموحد للكاشير */
        .selection-unit { border: 2px solid var(--sea-blue); border-radius: 10px; padding: 10px; background: #fff; margin-bottom: 15px; }
        .row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        .row:last-child { border-bottom: none; }
        .label { flex: 1; font-weight: bold; color: var(--sea-blue); font-size: 0.9rem; }
        .input { flex: 2; padding: 10px; border: 1px solid #ccc; border-radius: 6px; text-align: center; font-size: 1rem; background: #fff; }

        /* جدول الفاتورة (السلة) */
        .bill-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .bill-table th { background: var(--sea-blue); color: white; padding: 10px; }
        .bill-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }

        .total-box { background: #333; color: white; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; }
        .btn-pay { background: var(--light-green); color: black; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align: center; color: var(--sea-blue);"><i class="fas fa-cash-register"></i> كاشير المبيعات</h2>

        <div class="selection-unit">
            <div class="row">
                <span class="label">اختيار العميل</span>
                <select id="cbCustomer" class="input">
                    <option>اختر عميل من المسجلين...</option>
                </select>
            </div>
            <div class="row">
                <span class="label">اسم المنتج</span>
                <select id="cbItem" class="input">
                    <option>اختر المنتج من المخزن...</option>
                </select>
            </div>
            <div class="row">
                <span class="label">الكمية</span>
                <input type="number" id="buyQty" class="input" value="1">
            </div>
        </div>

        <button onclick="addToCart()" style="background: var(--sea-blue); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold;">
            <i class="fas fa-cart-plus"></i> إضافة للسلة
        </button>

        <table class="bill-table">
            <thead>
                <tr>
                    <th>الصنف</th>
                    <th>السعر</th>
                    <th>الكمية</th>
                    <th>المجموع</th>
                </tr>
            </thead>
            <tbody id="cartTable">
                </tbody>
        </table>

        <div class="total-box">
            <div style="font-size: 0.9rem;">الإجمالي النهائي (شامل ضريبة 15%)</div>
            <div style="font-size: 1.8rem; font-weight: bold;" id="grandTotal">0.00 ر.س</div>
        </div>

        <button class="btn-pay" onclick="placeOrder()">
            <i class="fas fa-print"></i> حفظ وإصدار فاتورة
        </button>
    </div>

    <script type="module">
        // منطق التاجر برو للربط بين الملفات
        window.addToCart = function() {
            // كود إضافة الصنف المختار من القائمة للسلة
            alert("تمت الإضافة للسلة بنجاح");
        };

        window.placeOrder = function() {
            // كود حفظ الطلب في السحابة وإنقاص الكمية من المخزن
            alert("تم حفظ الطلب وتحديث المخزن");
            window.print(); // فتح نافذة الطباعة
        };
    </script>
</body>
</html>
