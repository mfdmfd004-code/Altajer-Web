<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تاجر برو — تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap">
    <style>
        * { box-sizing:border-box; margin:0; padding:0; font-family:'Cairo',sans-serif; }
        body {
            min-height:100vh;
            background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);
            display:flex; align-items:center; justify-content:center; padding:20px;
        }
        .login-card {
            background:rgba(255,255,255,0.05); backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1); border-radius:24px;
            width:100%; max-width:420px; padding:35px 25px;
            box-shadow:0 25px 50px rgba(0,0,0,0.4);
            animation:slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity:0; transform:translateY(30px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .logo-section { text-align:center; margin-bottom:28px; }
        .logo-circle {
            width:80px; height:80px;
            background:linear-gradient(135deg,#0077b6,#00b4d8);
            border-radius:50%; display:flex; align-items:center;
            justify-content:center; margin:0 auto 15px;
            box-shadow:0 0 30px rgba(0,180,216,0.4);
        }
        .logo-circle i { font-size:35px; color:white; }
        .logo-title { font-size:22px; font-weight:900; color:white; letter-spacing:1px; }
        .logo-sub { font-size:12px; color:rgba(255,255,255,0.5); margin-top:4px; }
        .tab-switcher {
            display:flex; background:rgba(255,255,255,0.05);
            border-radius:12px; padding:4px; margin-bottom:25px;
        }
        .tab-btn {
            flex:1; padding:10px; background:transparent; border:none;
            color:rgba(255,255,255,0.5); border-radius:10px; cursor:pointer;
            font-family:'Cairo',sans-serif; font-size:13px; font-weight:600; transition:0.3s;
        }
        .tab-btn.active {
            background:linear-gradient(135deg,#0077b6,#00b4d8);
            color:white; box-shadow:0 4px 15px rgba(0,119,182,0.4);
        }
        .field-group { margin-bottom:16px; }
        .field-group label {
            display:block; font-size:12px; color:rgba(255,255,255,0.6);
            margin-bottom:6px; font-weight:600;
        }
        .input-wrap { position:relative; }
        .input-wrap i.ico {
            position:absolute; right:14px; top:50%;
            transform:translateY(-50%); color:rgba(255,255,255,0.3); font-size:15px;
        }
        .input-wrap input {
            width:100%; padding:12px 42px;
            background:rgba(255,255,255,0.07);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:10px; color:white; font-size:14px;
            font-family:'Cairo',sans-serif; transition:0.3s; text-align:right;
        }
        .input-wrap input:focus {
            outline:none; border-color:#00b4d8;
            background:rgba(0,180,216,0.08);
            box-shadow:0 0 0 3px rgba(0,180,216,0.15);
        }
        .input-wrap input::placeholder { color:rgba(255,255,255,0.25); }
        .eye-toggle {
            position:absolute; left:14px; top:50%; transform:translateY(-50%);
            color:rgba(255,255,255,0.3); cursor:pointer; font-size:15px; transition:0.2s;
        }
        .eye-toggle:hover { color:#00b4d8; }
        .forgot-link { text-align:left; margin-top:-8px; margin-bottom:16px; }
        .forgot-link a { font-size:12px; color:#00b4d8; text-decoration:none; cursor:pointer; }
        .btn-main {
            width:100%; padding:14px;
            background:linear-gradient(135deg,#0077b6,#00b4d8);
            color:white; border:none; border-radius:12px;
            font-size:15px; font-weight:700; font-family:'Cairo',sans-serif;
            cursor:pointer; transition:0.3s;
            box-shadow:0 4px 20px rgba(0,119,182,0.4); margin-bottom:16px;
        }
        .btn-main:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,119,182,0.5); }
        .btn-main:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .divider {
            display:flex; align-items:center; gap:10px; margin-bottom:16px;
        }
        .divider::before, .divider::after {
            content:''; flex:1; height:1px; background:rgba(255,255,255,0.1);
        }
        .divider span { font-size:12px; color:rgba(255,255,255,0.3); white-space:nowrap; }
        .btn-google {
            width:100%; padding:12px;
            background:rgba(255,255,255,0.07);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:12px; color:white;
            font-size:14px; font-weight:600; font-family:'Cairo',sans-serif;
            cursor:pointer; transition:0.3s;
            display:flex; align-items:center; justify-content:center; gap:10px;
        }
        .btn-google:hover { background:rgba(255,255,255,0.12); }
        .btn-google img { width:20px; height:20px; }
        .toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            padding:12px 25px; border-radius:30px; color:white;
            font-weight:700; font-size:13px; box-shadow:0 5px 20px rgba(0,0,0,0.3);
            display:none; z-index:9999; text-align:center; max-width:90%;
            font-family:'Cairo',sans-serif;
        }
        .spinner {
            display:inline-block; width:18px; height:18px;
            border:2px solid rgba(255,255,255,0.3);
            border-top-color:white; border-radius:50%;
            animation:spin 0.7s linear infinite; vertical-align:middle; margin-left:8px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .country-select {
            width:100%; padding:12px 42px 12px 15px;
            background:rgba(255,255,255,0.07);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:10px; color:white; font-size:14px;
            font-family:'Cairo',sans-serif; transition:0.3s;
        }
        .country-select:focus { outline:none; border-color:#00b4d8; }
        .country-select option { background:#1e3a5f; color:white; }
        .signup-only { display:none; }
        .security-note {
            text-align:center; margin-top:20px; font-size:11px;
            color:rgba(255,255,255,0.25);
            display:flex; align-items:center; justify-content:center; gap:5px;
        }

        /* ===== زر الدعم الثابت ===== */
        .support-fab {
            position:fixed; bottom:20px; left:16px; z-index:9998;
            display:flex; flex-direction:column; align-items:flex-start; gap:8px;
        }
        .fab-main {
            width:52px; height:52px; border-radius:50%;
            background:linear-gradient(135deg,#0077b6,#00b4d8);
            border:none; color:white; font-size:20px;
            cursor:pointer; box-shadow:0 4px 15px rgba(0,119,182,0.5);
            display:flex; align-items:center; justify-content:center;
            transition:0.3s;
        }
        .fab-main:hover { transform:scale(1.1); }
        .support-menu {
            display:none; flex-direction:column; gap:8px;
            background:rgba(15,23,42,0.95);
            border:1px solid rgba(0,180,216,0.3);
            border-radius:14px; padding:14px;
            min-width:220px; box-shadow:0 8px 25px rgba(0,0,0,0.5);
        }
        .support-menu.show { display:flex; }
        .support-menu-title {
            font-size:12px; color:#00b4d8; font-weight:700;
            margin-bottom:6px; display:flex; align-items:center; gap:6px;
        }
        .support-item {
            display:flex; align-items:center; gap:10px;
            padding:10px 12px; border-radius:10px;
            text-decoration:none; color:white; font-size:13px; font-weight:600;
            transition:0.2s;
        }
        .support-item:hover { background:rgba(255,255,255,0.08); }
        .support-item i { font-size:16px; width:20px; text-align:center; }
        .s-whatsapp { color:#25d366; }
        .s-email    { color:#00b4d8; }
        .s-phone    { color:#ffb703; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="login-card">
    <div class="logo-section">
        <div class="logo-circle"><i class="fas fa-store"></i></div>
        <div class="logo-title">تاجر برو</div>
        <div class="logo-sub">النظام المحاسبي العالمي</div>
    </div>

    <div class="tab-switcher">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">
            <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
        </button>
        <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">
            <i class="fas fa-user-plus"></i> حساب جديد
        </button>
    </div>

    <div class="signup-only field-group" id="nameField">
        <label><i class="fas fa-building"></i> اسم المؤسسة / الشركة</label>
        <div class="input-wrap">

            <input type="text" id="regName" placeholder="اسم المؤسسة أو الشركة">
        </div>
    </div>

    <div class="signup-only field-group" id="countryField">
        <label><i class="fas fa-globe"></i> البلد</label>
        <div class="input-wrap">
            <i class="fas fa-globe ico"></i>
            <select id="regCountry" class="country-select">
                <option value="">-- اختر البلد --</option>
                <optgroup label="الخليج العربي">
                    <option value="SA">🇸🇦 المملكة العربية السعودية</option>
                    <option value="AE">🇦🇪 الإمارات العربية المتحدة</option>
                    <option value="KW">🇰🇼 الكويت</option>
                    <option value="QA">🇶🇦 قطر</option>
                    <option value="BH">🇧🇭 البحرين</option>
                    <option value="OM">🇴🇲 سلطنة عُمان</option>
                </optgroup>
                <optgroup label="أفريقيا">
                    <option value="EG">🇪🇬 مصر</option>
                    <option value="MA">🇲🇦 المغرب</option>
                    <option value="TN">🇹🇳 تونس</option>
                    <option value="DZ">🇩🇿 الجزائر</option>
                    <option value="LY">🇱🇾 ليبيا</option>
                    <option value="SD">🇸🇩 السودان</option>
                    <option value="NG">🇳🇬 نيجيريا</option>
                    <option value="KE">🇰🇪 كينيا</option>
                    <option value="ET">🇪🇹 إثيوبيا</option>
                    <option value="GH">🇬🇭 غانا</option>
                    <option value="TZ">🇹🇿 تنزانيا</option>
                    <option value="SN">🇸🇳 السنغال</option>
                </optgroup>
                <optgroup label="باقي العالم">
                    <option value="TR">🇹🇷 تركيا</option>
                    <option value="PK">🇵🇰 باكستان</option>
                    <option value="IN">🇮🇳 الهند</option>
                    <option value="US">🇺🇸 الولايات المتحدة</option>
                    <option value="GB">🇬🇧 المملكة المتحدة</option>
                    <option value="DE">🇩🇪 ألمانيا</option>
                    <option value="FR">🇫🇷 فرنسا</option>
                    <option value="OTHER">🌍 أخرى</option>
                </optgroup>
            </select>
        </div>
    </div>

    <div class="field-group">
        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
        <div class="input-wrap">
            <i class="fas fa-envelope ico"></i>
            <input type="email" id="authEmail" placeholder="name@example.com" required>
        </div>
    </div>

    <div class="field-group">
        <label><i class="fas fa-lock"></i> كلمة المرور</label>
        <div class="input-wrap">
            <i class="fas fa-lock ico"></i>
            <input type="password" id="authPassword" placeholder="••••••••" required>
            <i class="fas fa-eye eye-toggle" onclick="togglePass()"></i>
        </div>
    </div>

    <div class="forgot-link" id="forgotSection">
        <a onclick="resetPassword()">نسيت كلمة المرور؟</a>
    </div>

    <button class="btn-main" id="mainBtn" onclick="handleAuth()">
        <i class="fas fa-sign-in-alt"></i> دخول
    </button>

    <div class="divider"><span>أو</span></div>
    <button class="btn-google" onclick="handleGoogle()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
        الدخول بواسطة Google
    </button>

    <div class="security-note">
        <i class="fas fa-shield-alt"></i>
        بياناتك محمية ومشفرة بالكامل — Firebase Security
    </div>
</div>

<!-- ===== زر الدعم الثابت ===== -->
<div class="support-fab">
    <div class="support-menu" id="supportMenu">
        <div class="support-menu-title">
            <i class="fas fa-headset"></i> تواصل معنا
        </div>
        <a href="https://wa.me/966501662547?text=مرحباً،%20أحتاج%20مساعدة%20في%20تاجر%20برو"
           target="_blank" class="support-item">
            <i class="fab fa-whatsapp s-whatsapp"></i> واتساب مباشر
        </a>
        <a href="tel:+966501662547" class="support-item">
            <i class="fas fa-phone s-phone"></i> 00966501662547
        </a>
        <a href="mailto:mfdmfd004@gmail.com?subject=استفسار تاجر برو"
           class="support-item">
            <i class="fas fa-envelope s-email"></i> mfdmfd004@gmail.com
        </a>
    </div>
    <button class="fab-main" onclick="toggleSupport()" title="الدعم الفني">
        <i class="fas fa-headset" id="fabIcon"></i>
    </button>
</div>

<script type="module" src="firebase-config.js"></script>
<script>
    const ADMIN_UID = 'RWp5xxVVphaNI2uIl5hMBBC5Ar93';
    let currentTab  = 'login';

    // ===== Toast =====
    function showToast(msg, success = true) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.backgroundColor = success ? '#2b9348' : '#d90429';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 4000);
    }

    // ===== زر الدعم =====
    function toggleSupport() {
        const menu = document.getElementById('supportMenu');
        const icon = document.getElementById('fabIcon');
        menu.classList.toggle('show');
        icon.className = menu.classList.contains('show')
            ? 'fas fa-times' : 'fas fa-headset';
    }

    // ===== تبديل التبويب =====
    function switchTab(tab) {
        currentTab = tab;
        const signupFields  = document.querySelectorAll('.signup-only');
        const forgotSection = document.getElementById('forgotSection');
        const mainBtn       = document.getElementById('mainBtn');
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
        if (tab === 'signup') {
            signupFields.forEach(el => el.style.display = 'block');
            forgotSection.style.display = 'none';
            mainBtn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء حساب';
        } else {
            signupFields.forEach(el => el.style.display = 'none');
            forgotSection.style.display = 'block';
            mainBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
        }
    }

    // ===== إظهار/إخفاء كلمة المرور =====
    function togglePass() {
        const inp = document.getElementById('authPassword');
        const ico = document.querySelector('.eye-toggle');
        if (inp.type === 'password') {
            inp.type = 'text';
            ico.classList.replace('fa-eye','fa-eye-slash');
        } else {
            inp.type = 'password';
            ico.classList.replace('fa-eye-slash','fa-eye');
        }
    }

    function redirectUser(uid) {
        window.location.href = 'index.html';
    }

    // ===== الدخول / التسجيل =====
    async function handleAuth() {
        const email    = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        const btn      = document.getElementById('mainBtn');
        if (!email || !password) return showToast('يرجى إدخال البريد وكلمة المرور', false);
        if (password.length < 6) return showToast('كلمة المرور يجب أن تكون 6 أحرف على الأقل', false);
        btn.disabled = true;
        btn.innerHTML = `جاري التحقق <span class="spinner"></span>`;

        let tries = 0;
        while (!window.auth && tries < 20) {
            await new Promise(r => setTimeout(r, 200)); tries++;
        }
        if (!window.auth) {
            btn.disabled = false;
            btn.innerHTML = currentTab === 'login'
                ? '<i class="fas fa-sign-in-alt"></i> دخول'
                : '<i class="fas fa-user-plus"></i> إنشاء حساب';
            return showToast('تعذر الاتصال بالسيرفر، حاول مجدداً', false);
        }

        try {
            let result;
            if (currentTab === 'signup') {
                const { createUserWithEmailAndPassword, updateProfile } =
                    await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
                result = await createUserWithEmailAndPassword(window.auth, email, password);
                const bizName = document.getElementById('regName').value.trim();
                const country = document.getElementById('regCountry').value;
                if (bizName) await updateProfile(result.user, { displayName: bizName });
                await saveNewUserProfile(result.user, bizName, country);
                // إشعار الأدمن بالمستخدم الجديد
                await sendAdminNotification(email, bizName, country);
                showToast('✅ تم إنشاء حسابك بنجاح! مرحباً بك 🎉', true);
            } else {
                result = await window.signInWithEmailAndPassword(window.auth, email, password);
                showToast('✅ مرحباً بك!', true);
            }
            setTimeout(() => redirectUser(result.user.uid), 1000);
        } catch (err) {
            let msg = 'حدث خطأ، حاول مجدداً';
            if (err.code === 'auth/user-not-found')       msg = '❌ البريد غير مسجل';
            if (err.code === 'auth/wrong-password')       msg = '❌ كلمة المرور خاطئة';
            if (err.code === 'auth/email-already-in-use') msg = '❌ البريد مسجل مسبقاً';
            if (err.code === 'auth/invalid-email')        msg = '❌ البريد الإلكتروني غير صحيح';
            if (err.code === 'auth/too-many-requests')    msg = '⚠️ محاولات كثيرة، حاول لاحقاً';
            showToast(msg, false);
        } finally {
            btn.disabled = false;
            btn.innerHTML = currentTab === 'login'
                ? '<i class="fas fa-sign-in-alt"></i> دخول'
                : '<i class="fas fa-user-plus"></i> إنشاء حساب';
        }
    }

    // ===== إشعار الأدمن في Firestore =====
    async function sendAdminNotification(email, name, country) {
        try {
            const { doc, setDoc } =
                await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
            const db = window.__firebaseDb;
            if (!db) return;
            await setDoc(
                doc(db, 'admin', 'notifications', 'newUsers', Date.now().toString()),
                {
                    userEmail:    email   || 'غير محدد',
                    userName:     name    || 'غير محدد',
                    country:      country || 'غير محدد',
                    registeredAt: new Date().toISOString(),
                    seen: false
                }
            );
        } catch (e) {
            console.warn('Admin notification error:', e);
        }
    }

    // ===== Google =====
    async function handleGoogle() {
        let tries = 0;
        while (!window.auth && tries < 20) {
            await new Promise(r => setTimeout(r, 200)); tries++;
        }
        if (!window.auth || !window.provider)
            return showToast('تعذر الاتصال، حاول مجدداً', false);
        try {
            const result = await window.signInWithPopup(window.auth, window.provider);
            showToast('✅ تم الدخول بـ Google!', true);
            await saveNewUserProfile(result.user, result.user.displayName, '');
            await sendAdminNotification(result.user.email, result.user.displayName, '');
            setTimeout(() => redirectUser(result.user.uid), 1000);
        } catch (err) {
            if (err.code !== 'auth/popup-closed-by-user')
                showToast('❌ فشل الدخول بـ Google', false);
        }
    }

    // ===== نسيت كلمة المرور =====
    async function resetPassword() {
        const email = document.getElementById('authEmail').value.trim();
        if (!email) return showToast('أدخل بريدك الإلكتروني أولاً', false);
        let tries = 0;
        while (!window.auth && tries < 20) {
            await new Promise(r => setTimeout(r, 200)); tries++;
        }
        try {
            const { sendPasswordResetEmail } =
                await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
            await sendPasswordResetEmail(window.auth, email);
            showToast('✅ تم إرسال رابط إعادة التعيين لبريدك', true);
        } catch (err) {
            showToast('❌ البريد غير مسجل أو خطأ في الإرسال', false);
        }
    }

    // ===== حفظ ملف المستخدم الجديد =====
    async function saveNewUserProfile(user, bizName, country) {
        try {
            const { doc, setDoc, getDoc } =
                await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
            const db = window.__firebaseDb;
            if (!db) return;
            const ref  = doc(db, 'users', user.uid);
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                await setDoc(ref, {
                    uid:         user.uid,
                    email:       user.email,
                    displayName: bizName || user.displayName || '',
                    country:     country || '',
                    role:        user.uid === ADMIN_UID ? 'admin' : 'user',
                    taxEnabled:  false,
                    createdAt:   new Date().toISOString()
                });
            }
        } catch (e) {
            console.error('خطأ حفظ ملف المستخدم:', e);
        }
    }

    // ===== التحقق من الجلسة =====
    async function checkSession() {
        let tries = 0;
        while (!window.auth && tries < 20) {
            await new Promise(r => setTimeout(r, 200)); tries++;
        }
        if (!window.auth) return;
        const { onAuthStateChanged } =
            await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
        onAuthStateChanged(window.auth, user => {
            if (user) redirectUser(user.uid);
        });
    }
    checkSession();
</script>
</body>
</html>
