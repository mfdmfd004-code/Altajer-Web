<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تاجر برو — طباعة الفاتورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e3a5f); min-height: 100vh; padding: 20px 10px 40px; color: #fff; }

        /* شاشة الخيارات */
        .options-screen { max-width: 480px; margin: 0 auto; }
        .options-header { text-align: center; margin-bottom: 25px; }
        .icon-circle { width: 70px; height: 70px; background: linear-gradient(135deg, #2b9348, #38b000); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 0 30px rgba(43,147,72,0.4); font-size: 28px; color: white; }
        .options-header h2 { font-size: 18px; font-weight: 900; color: #38b000; }
        .options-header p { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
        .inv-summary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 14px 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .inv-num { font-size: 13px; color: #00b4d8; font-weight: 700; }
        .inv-total-s { font-size: 20px; font-weight: 900; color: #38b000; }
        .inv-date-s { font-size: 11px; color: rgba(255,255,255,0.4); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .opt-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 18px 12px; cursor: pointer; transition: 0.3s; color: white; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .opt-btn:hover { transform: translateY(-3px); border-color: var(--clr); background: rgba(255,255,255,0.1); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .opt-icon { width: 50px; height: 50px; border-radius: 14px; background: var(--clr); display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; }
        .opt-title { font-size: 13px; font-weight: 700; }
        .opt-sub { font-size: 10px; color: rgba(255,255,255,0.4); }
        .opt-btn-full { grid-column: 1 / -1; }
        .btn-back-home { width: 100%; padding: 13px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: rgba(255,255,255,0.6); font-size: 13px; font-family: 'Cairo', sans-serif; cursor: pointer; transition: 0.2s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-back-home:hover { color: white; background: rgba(255,255,255,0.1); }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 30px; color: white; font-weight: 700; font-size: 13px; display: none; z-index: 9999; max-width: 90%; text-align: center; font-family: 'Cairo', sans-serif; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        #invoicePrintArea { display: none; }

        /* فاتورة A4 */
        .invoice-a4 { width: 210mm; min-height: 297mm; background: white; color: #1a1a2e; padding: 10mm 12mm 12mm; font-family: 'Cairo', sans-serif; margin: 0 auto; }

        /* ترويسة مركزية */
        .inv-badge-row { text-align: center; margin-bottom: 6mm; }
        .inv-type-badge { display: inline-block; background: linear-gradient(135deg, #0077b6, #023e8a); color: white; font-size: 12px; font-weight: 900; padding: 4px 28px; border-radius: 20px; letter-spacing: 1px; }

        /* بيانات الطرفين */
        .inv-parties { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5mm; padding-bottom: 4mm; border-bottom: 2px solid #dbeafe; }
        .party-seller { width: 42%; }
        .party-logo { text-align: center; width: 14%; padding-top: 4px; }
        .party-logo img { width: 45px; opacity: 0.55; }
        .party-logo small { display: block; font-size: 7px; color: #ccc; margin-top: 2px; }
        .party-buyer { width: 42%; text-align: left; }
        .p-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; padding-bottom: 3px; margin-bottom: 5px; display: inline-block; }
        .p-label-blue { color: #0077b6; border-bottom: 2px solid #0077b6; }
        .p-label-green { color: #2b9348; border-bottom: 2px solid #2b9348; }
        .p-name { font-size: 14px; font-weight: 900; color: #1a1a2e; margin-bottom: 3px; }
        .p-line { font-size: 10px; color: #555; margin-top: 2px; display: flex; align-items: center; gap: 4px; }
        .p-line i { font-size: 9px; color: #0077b6; width: 11px; }

        /* شريط معلومات */
        .inv-infobar { display: flex; justify-content: space-between; align-items: center; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 6px 12px; margin-bottom: 4mm; }
        .infobar-item { text-align: center; }
        .infobar-lbl { font-size: 8px; color: #0077b6; font-weight: 700; display: block; }
        .infobar-val { font-size: 11px; font-weight: 900; color: #1e3a5f; }
        .infobar-item.green .infobar-val { color: #2b9348; font-size: 13px; }

        /* جدول الأصناف */
        .inv-tbl { width: 100%; border-collapse: collapse; margin-bottom: 4mm; }
        .inv-tbl thead tr { background: #0077b6; color: white; }
        .inv-tbl th { padding: 6px 5px; text-align: center; font-size: 9px; font-weight: 700; }
        .inv-tbl th.r { text-align: right; }
        .inv-tbl td { padding: 5px 5px; text-align: center; border-bottom: 1px solid #f0f0f0; font-size: 10px; color: #333; }
        .inv-tbl td.name-td { text-align: right; font-weight: 600; }
        .inv-tbl td.code-td { font-size: 9px; color: #888; }
        .inv-tbl tr:nth-child(even) td { background: #f8faff; }
        .inv-tbl tr:last-child td { border-bottom: 2px solid #0077b6; }
        .cur { font-size: 8px; color: #999; }

        /* قسم أسفل */
        .inv-bottom { display: flex; gap: 8mm; margin-bottom: 4mm; }
        .inv-notes { flex: 1; }
        .inv-notes-ttl { font-size: 9px; font-weight: 700; color: #0077b6; margin-bottom: 4px; display: flex; align-items: center; gap: 3px; }
        .inv-notes-body { font-size: 9px; color: #555; border: 1px dashed #bfdbfe; border-radius: 6px; padding: 6px; min-height: 42px; line-height: 1.7; }
        .inv-tots { width: 190px; }
        .tot-r { display: flex; justify-content: space-between; padding: 4px 8px; font-size: 10px; border-bottom: 1px solid #f0f0f0; }
        .tot-r.hl { background: #eff6ff; font-weight: 700; }
        .tot-r.disc { color: #dc2626; }
        .tot-r.fin { background: linear-gradient(135deg, #0077b6, #023e8a); color: white; font-weight: 900; font-size: 12px; padding: 6px 8px; border-radius: 0 0 8px 8px; }

        /* شروط الدفع */
        .inv-terms { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 7px; padding: 6px 10px; margin-bottom: 4mm; }
        .inv-terms-ttl { font-size: 9px; font-weight: 700; color: #92400e; margin-bottom: 3px; display: flex; align-items: center; gap: 3px; }
        .inv-terms-body { font-size: 8px; color: #78350f; line-height: 1.7; }

        /* تذييل */
        .inv-footer { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px dashed #bfdbfe; padding-top: 4mm; }
        .inv-qr { text-align: center; }
        .inv-qr-lbl { font-size: 7px; color: #0077b6; margin-top: 2px; display: flex; align-items: center; justify-content: center; gap: 2px; }
        .inv-footer-mid { flex: 1; text-align: center; padding: 0 6px; font-size: 8px; color: #888; line-height: 1.7; }
        .inv-stamp { width: 88px; height: 80px; border: 2px dashed #bfdbfe; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #93c5fd; font-size: 8px; gap: 3px; }
        .inv-stamp i { font-size: 18px; }

        /* حرارية */
        .inv-thermal80 { width: 80mm; background: white; color: #000; padding: 4mm 3mm; font-size: 11px; margin: 0 auto; }
        .inv-thermal58 { width: 58mm; background: white; color: #000; padding: 3mm 2mm; font-size: 9px; margin: 0 auto; }
        .th-center { text-align: center; }
        .th-div { border: none; border-top: 1px dashed #000; margin: 2mm 0; }
        .th-row { display: flex; justify-content: space-between; font-size: 10px; margin: 1mm 0; }
        .th-tot { display: flex; justify-content: space-between; font-size: 12px; font-weight: 900; margin: 1mm 0; }

        @media print {
            body { background: white !important; padding: 0 !important; }
            .options-screen { display: none !important; }
            #invoicePrintArea { display: block !important; }
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- شاشة الخيارات -->
<div class="options-screen" id="optionsScreen">
    <div class="options-header">
        <div class="icon-circle"><i class="fas fa-check"></i></div>
        <h2>تم اعتماد الفاتورة بنجاح</h2>
        <p>اختر طريقة الطباعة أو التصدير</p>
    </div>
    <div class="inv-summary">
        <div>
            <div class="inv-num" id="summaryNum">—</div>
            <div class="inv-date-s" id="summaryDate">—</div>
        </div>
        <div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4);text-align:left;">الإجمالي</div>
            <div class="inv-total-s" id="summaryTotal">0.00</div>
        </div>
    </div>
    <div class="options-grid">
        <div class="opt-btn" style="--clr:#0077b6;" onclick="printInvoice('thermal80')">
            <div class="opt-icon"><i class="fas fa-print"></i></div>
            <div><div class="opt-title">حرارية 80mm</div><div class="opt-sub">طابعة POS</div></div>
        </div>
        <div class="opt-btn" style="--clr:#7209b7;" onclick="printInvoice('thermal58')">
            <div class="opt-icon"><i class="fas fa-receipt"></i></div>
            <div><div class="opt-title">حرارية 58mm</div><div class="opt-sub">طابعة POS صغيرة</div></div>
        </div>
        <div class="opt-btn" style="--clr:#023e8a;" onclick="printInvoice('a4')">
            <div class="opt-icon"><i class="fas fa-file-alt"></i></div>
            <div><div class="opt-title">طباعة A4</div><div class="opt-sub">طابعة مكتبية</div></div>
        </div>
        <div class="opt-btn" style="--clr:#d90429;" onclick="exportPDF()">
            <div class="opt-icon"><i class="fas fa-file-pdf"></i></div>
            <div><div class="opt-title">حفظ PDF</div><div class="opt-sub">يحفظ في جهازك</div></div>
        </div>
        <div class="opt-btn opt-btn-full" style="--clr:#2b9348;" onclick="shareInvoice()">
            <div class="opt-icon" style="width:40px;height:40px;font-size:18px;"><i class="fas fa-share-alt"></i></div>
            <div><div class="opt-title">مشاركة الفاتورة</div><div class="opt-sub">واتساب — إيميل — أي تطبيق</div></div>
        </div>
    </div>
    <button class="btn-back-home" onclick="goHome()">
        <i class="fas fa-home"></i> العودة للرئيسية
    </button>
</div>

<div id="invoicePrintArea"></div>

<script type="module" src="firebase-config.js"></script>
<script>
    let inv = null;
try {
    const urlParams = new URLSearchParams(window.location.search);
    const invParam = urlParams.get('inv');
    if(invParam) inv = JSON.parse(decodeURIComponent(invParam));
    else inv = JSON.parse(sessionStorage.getItem('altajer_print_invoice') || localStorage.getItem('altajer_last_invoice') || 'null');
} catch(e) { inv = JSON.parse(localStorage.getItem('altajer_last_invoice') || 'null'); }
    const S = JSON.parse(localStorage.getItem('altajer_settings') || '{}');

    // خريطة العملات
    const CUR_MAP = {
        SAR:'ر.س', AED:'د.إ', KWD:'د.ك', QAR:'ر.ق', BHD:'د.ب', OMR:'ر.ع',
        EGP:'ج.م', MAD:'د.م', TND:'د.ت', DZD:'د.ج', LYD:'د.ل', SDG:'ج.س',
        USD:'$', GBP:'£', EUR:'€', NGN:'₦', KES:'KSh', TZS:'TSh',
        GHS:'₵', TRY:'₺', INR:'₹', PKR:'₨', OTHER:''
    };
    const C = CUR_MAP[S.currency] || S.currency || 'ر.س';
    const TAX = S.taxEnabled ? (S.taxRate || 15) : 0;

    function showToast(msg, ok=true) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.backgroundColor = ok ? '#2b9348' : '#d90429';
        t.style.display = 'block';
        setTimeout(() => t.style.display='none', 4000);
    }

    // ملء ملخص الشاشة
    function fillSummary() {
        if(!inv) return;
        document.getElementById('summaryNum').innerText  = inv.invoiceNumber || '—';
        document.getElementById('summaryDate').innerText = inv.date || '—';
        document.getElementById('summaryTotal').innerText =
            parseFloat(inv.total||0).toFixed(2) + ' ' + C;
    }
    fillSummary();

    // وقت منسق
    function fmtTime(ts) {
        try { return new Date(ts||Date.now()).toLocaleTimeString('en-GB'); }
        catch(e) { return ''; }
    }

    // بناء QR
    function buildQR(id, data) {
        const el = document.getElementById(id);
        if(!el) return;
        el.innerHTML = '';
        try {
            function tlv(tag, val) {
                const b = new TextEncoder().encode(val);
                return String.fromCharCode(tag, b.length, ...b);
            }
            const txt = btoa(
                tlv(1, data.sellerName || S.companyName || 'تاجر برو') +
                tlv(2, data.vatNumber  || S.vatNumber   || '') +
                tlv(3, data.timestamp  || new Date().toISOString()) +
                tlv(4, Number(data.total||0).toFixed(2)) +
                tlv(5, Number(data.tax||0).toFixed(2))
            );
            new QRCode(el, { text:txt, width:82, height:82,
                colorDark:'#000', colorLight:'#fff',
                correctLevel: QRCode.CorrectLevel.M });
        } catch(e) { console.error(e); }
    }

    // ===== بناء فاتورة A4 =====
    function buildA4() {
        const addr = S.address || {};
        const invType = TAX > 0 ? 'فاتورة ضريبية' : 'فاتورة ضريبية مبسطة';
        const thTax = TAX > 0
            ? `<th>الضريبة<br><span style="font-weight:400;font-size:8px;">${C}</span></th>` : '';

        const rows = (inv.items||[]).map((item, i) => {
            const exclPrice = TAX > 0
                ? (item.price / (1 + TAX/100)).toFixed(2)
                : parseFloat(item.price).toFixed(2);
            const taxAmt = TAX > 0
                ? (item.price - parseFloat(exclPrice)).toFixed(2) : null;
            const inclPrice = parseFloat(item.price).toFixed(2);
            const total    = parseFloat(item.total||0).toFixed(2);
            return `<tr>
                <td>${i+1}</td>
                <td class="code-td">${item.code||'—'}</td>
                <td class="name-td">${item.name}</td>
                <td>${item.qty}</td>
                <td>${exclPrice} <span class="cur">${C}</span></td>
                ${TAX>0?`<td>${taxAmt} <span class="cur">${C}</span></td>`:''}
                <td style="font-weight:700;">${inclPrice} <span class="cur">${C}</span></td>
                <td style="font-weight:900;color:#0077b6;">${total} <span class="cur">${C}</span></td>
            </tr>`;
        }).join('');

        const defTerms = `• الدفع عند الاستلام ما لم يُتفق على خلاف ذلك كتابياً.
• لا يُقبل الإرجاع بعد 7 أيام من تاريخ الفاتورة.
• الأسعار شاملة الضريبة ما لم يُذكر خلاف ذلك.
• عند النزاع يُرجع للجهة القضائية المختصة.`;

        return `<div class="invoice-a4" id="a4El">

            <div class="inv-badge-row">
                <span class="inv-type-badge">${invType}</span>
            </div>

            <div class="inv-parties">
                <div class="party-seller">
                    <span class="p-label p-label-blue">المورد / البائع</span>
                    <div class="p-name">${S.companyName||'تاجر برو'}</div>
                    ${S.vatNumber?`<div class="p-line"><i class="fas fa-hashtag"></i>ضريبي: ${S.vatNumber}</div>`:''}
                    ${S.cr?`<div class="p-line"><i class="fas fa-id-card"></i>س.ت: ${S.cr}</div>`:''}
                    ${S.phone?`<div class="p-line"><i class="fas fa-phone"></i>${S.phone}</div>`:''}
                    ${S.email?`<div class="p-line"><i class="fas fa-envelope"></i>${S.email}</div>`:''}
                    ${addr.city?`<div class="p-line"><i class="fas fa-map-marker-alt"></i>${addr.city}${addr.district?' — '+addr.district:''}${addr.street?' — '+addr.street:''}</div>`:''}
                </div>
                <div class="party-logo">
                    <img src="https://cdn-icons-png.flaticon.com/512/3222/3222675.png" alt="logo">
                    <small>Altajer Pro</small>
                </div>
                <div class="party-buyer">
                    <span class="p-label p-label-green">العميل / المشتري</span>
                    <div class="p-name">${inv.customer||'نقدي'}</div>
                    ${inv.customerVat&&inv.customerVat!=='غير ضريبي'?
                        `<div class="p-line"><i class="fas fa-hashtag"></i>ضريبي: ${inv.customerVat}</div>`:''}
                    <div class="p-line"><i class="fas fa-calendar"></i>${inv.date}</div>
                    <div class="p-line"><i class="fas fa-clock"></i>${fmtTime(inv.timestamp)}</div>
                </div>
            </div>

            <div class="inv-infobar">
                <div class="infobar-item">
                    <span class="infobar-lbl">رقم الفاتورة</span>
                    <span class="infobar-val" style="font-size:9px;">${inv.invoiceNumber}</span>
                </div>
                <div class="infobar-item">
                    <span class="infobar-lbl">التاريخ</span>
                    <span class="infobar-val">${inv.date}</span>
                </div>
                <div class="infobar-item">
                    <span class="infobar-lbl">العملة</span>
                    <span class="infobar-val">${C}</span>
                </div>
                ${TAX>0?`<div class="infobar-item"><span class="infobar-lbl">الضريبة</span><span class="infobar-val">${TAX}%</span></div>`:''}
                <div class="infobar-item green">
                    <span class="infobar-lbl">الإجمالي</span>
                    <span class="infobar-val">${parseFloat(inv.total||0).toFixed(2)} ${C}</span>
                </div>
            </div>

            <table class="inv-tbl">
                <thead><tr>
                    <th>#</th>
                    <th>الكود</th>
                    <th class="r">الصنف / الخدمة</th>
                    <th>الكمية</th>
                    <th>سعر الوحدة<br><span style="font-weight:400;font-size:8px;">${C}</span></th>
                    ${thTax}
                    <th>شامل الضريبة<br><span style="font-weight:400;font-size:8px;">${C}</span></th>
                    <th>الإجمالي<br><span style="font-weight:400;font-size:8px;">${C}</span></th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>

            <div class="inv-bottom">
                <div class="inv-notes">
                    <div class="inv-notes-ttl"><i class="fas fa-sticky-note"></i> ملاحظات</div>
                    <div class="inv-notes-body">${S.invoiceFooter||'شكراً لتعاملكم معنا'}</div>
                </div>
                <div class="inv-tots">
                    <div style="border:1px solid #dbeafe;border-radius:8px;overflow:hidden;">
                        <div class="tot-r">
                            <span>قبل الضريبة</span>
                            <span>${parseFloat(inv.subtotal||0).toFixed(2)} ${C}</span>
                        </div>
                        ${TAX>0?`<div class="tot-r hl"><span>ضريبة ${TAX}%</span><span>${parseFloat(inv.tax||0).toFixed(2)} ${C}</span></div>`:''}
                        ${parseFloat(inv.discount||0)>0?`<div class="tot-r disc"><span>الخصم</span><span>- ${parseFloat(inv.discount).toFixed(2)} ${C}</span></div>`:''}
                        <div class="tot-r fin">
                            <span>الإجمالي</span>
                            <span>${parseFloat(inv.total||0).toFixed(2)} ${C}</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="inv-terms">
                <div class="inv-terms-ttl"><i class="fas fa-file-contract"></i> شروط الدفع وسياسة التوريد</div>
                <div class="inv-terms-body">${S.paymentTerms||defTerms}</div>
            </div>

            <div class="inv-footer">
                <div class="inv-qr">
                    <div id="qrA4"></div>
                    <div class="inv-qr-lbl"><i class="fas fa-shield-alt"></i> ZATCA QR</div>
                </div>
                <div class="inv-footer-mid">
                    <div style="font-size:10px;font-weight:700;color:#333;margin-bottom:3px;">${S.companyName||'تاجر برو'}</div>
                    ${S.phone?`<div>${S.phone}</div>`:''}
                    ${S.email?`<div>${S.email}</div>`:''}
                    ${S.website?`<div>${S.website}</div>`:''}
                    <div style="font-size:7px;color:#bbb;margin-top:3px;">Powered by Altajer Pro</div>
                </div>
                <div class="inv-stamp">
                    <i class="fas fa-stamp"></i>
                    <span>ختم وتوقيع</span>
                    <span>المؤسسة</span>
                </div>
            </div>
        </div>`;
    }

    // ===== بناء فاتورة حرارية =====
    function buildThermal(width) {
        const cls = width===80 ? 'inv-thermal80' : 'inv-thermal58';
        const rows = (inv.items||[]).map(item => {
            const ex = TAX>0
                ? parseFloat(item.price/(1+TAX/100)).toFixed(2)
                : parseFloat(item.price).toFixed(2);
            return `<div class="th-row">
                <span style="max-width:55%;overflow:hidden;text-overflow:ellipsis;">${item.name}</span>
                <span>${parseFloat(item.total||0).toFixed(2)} ${C}</span>
            </div>
            <div style="font-size:9px;color:#666;padding-right:5px;margin-bottom:1mm;">
                ${item.qty} × ${ex} ${C}${TAX>0?' | ض: '+parseFloat(item.price-ex).toFixed(2)+' '+C:''}
            </div>`;
        }).join('');

        return `<div class="${cls}" id="thermalEl">
            <div class="th-center">
                <div style="font-size:14px;font-weight:900;">${S.companyName||'تاجر برو'}</div>
                ${S.vatNumber?`<div style="font-size:8px;">ضريبي: ${S.vatNumber}</div>`:''}
                ${S.phone?`<div style="font-size:9px;">${S.phone}</div>`:''}
                ${(S.address||{}).city?`<div style="font-size:9px;">${S.address.city}</div>`:''}
                <div style="font-size:9px;font-weight:700;border:1px solid #000;display:inline-block;padding:1px 8px;border-radius:8px;margin-top:2mm;">
                    ${TAX>0?'فاتورة ضريبية':'فاتورة مبسطة'}
                </div>
            </div>
            <hr class="th-div">
            <div class="th-row"><span>رقم الفاتورة:</span><span style="font-size:9px;">${inv.invoiceNumber}</span></div>
            <div class="th-row"><span>التاريخ:</span><span>${inv.date}</span></div>
            <div class="th-row"><span>العميل:</span><span>${inv.customer||'نقدي'}</span></div>
            ${inv.customerVat&&inv.customerVat!=='غير ضريبي'?`<div class="th-row"><span>ضريبي العميل:</span><span style="font-size:8px;">${inv.customerVat}</span></div>`:''}
            <hr class="th-div">
            ${rows}
            <hr class="th-div">
            <div class="th-row"><span>قبل الضريبة:</span><span>${parseFloat(inv.subtotal||0).toFixed(2)} ${C}</span></div>
            ${TAX>0?`<div class="th-row"><span>ضريبة ${TAX}%:</span><span>${parseFloat(inv.tax||0).toFixed(2)} ${C}</span></div>`:''}
            ${parseFloat(inv.discount||0)>0?`<div class="th-row"><span>خصم:</span><span>- ${parseFloat(inv.discount).toFixed(2)} ${C}</span></div>`:''}
            <hr class="th-div">
            <div class="th-tot">
                <span>الإجمالي:</span>
                <span>${parseFloat(inv.total||0).toFixed(2)} ${C}</span>
            </div>
            <hr class="th-div">
            <div class="th-center" style="margin-top:2mm;">
                <div id="qrThermal"></div>
                <div style="font-size:8px;margin-top:2mm;">${S.invoiceFooter||'شكراً لتعاملكم معنا'}</div>
                <div style="font-size:7px;color:#777;margin-top:1mm;">Altajer Pro</div>
            </div>
        </div>`;
    }

    // ===== طباعة =====
    function printInvoice(mode) {
        if(!inv) return showToast('لا توجد بيانات فاتورة', false);
        const area = document.getElementById('invoicePrintArea');
        if(mode==='a4')             area.innerHTML = buildA4();
        else if(mode==='thermal80') area.innerHTML = buildThermal(80);
        else if(mode==='thermal58') area.innerHTML = buildThermal(58);
        setTimeout(() => {
            buildQR(mode==='a4'?'qrA4':'qrThermal', inv);
            setTimeout(() => window.print(), 700);
        }, 300);
    }

    // ===== PDF =====
    async function exportPDF() {
        if(!inv) return showToast('لا توجد بيانات فاتورة', false);
        showToast('جاري إنشاء PDF...', true);
        const area = document.getElementById('invoicePrintArea');
        area.innerHTML = buildA4();
        area.style.display = 'block';
        setTimeout(() => {
            buildQR('qrA4', inv);
            setTimeout(async () => {
                try {
                    await html2pdf().set({
                        margin: [4,4,4,4],
                        filename: `فاتورة-${inv.invoiceNumber}.pdf`,
                        image: { type:'jpeg', quality:0.97 },
                        html2canvas: {
    scale: 2,
                    useCORS: true,
                    logging: false,
                    letterRendering: true,
                    allowTaint: false,
                    onclone: function(clonedDoc) {
                        const link = clonedDoc.createElement('link');
                        link.rel = 'stylesheet';
                        link.href = 'https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap';
                        clonedDoc.head.appendChild(link);
                        return new Promise(resolve => setTimeout(resolve, 1500));
                    }
},
                        jsPDF: { unit:'mm', format:'a4', orientation:'portrait' }
                    }).from(document.getElementById('a4El')).save();
                    showToast('✅ تم حفظ PDF في جهازك', true);
                } catch(e) {
                    showToast('❌ فشل إنشاء PDF', false);
                    console.error(e);
                }
                area.style.display = 'none';
            }, 700);
        }, 300);
    }

    // ===== مشاركة =====
    async function shareInvoice() {
        if(!inv) return showToast('لا توجد بيانات فاتورة', false);
        const lines = (inv.items||[]).map(i =>
            `• ${i.name} × ${i.qty} = ${parseFloat(i.total||0).toFixed(2)} ${C}`
        ).join('\n');
        const txt = `*فاتورة من: ${S.companyName||'تاجر برو'}*
رقم: ${inv.invoiceNumber}
التاريخ: ${inv.date}
العميل: ${inv.customer||'نقدي'}
─────────────────
${lines}
─────────────────
قبل الضريبة: ${parseFloat(inv.subtotal||0).toFixed(2)} ${C}
${TAX>0?`الضريبة ${TAX}%: ${parseFloat(inv.tax||0).toFixed(2)} ${C}`:''}
*الإجمالي: ${parseFloat(inv.total||0).toFixed(2)} ${C}*
${S.phone?`\nللتواصل: ${S.phone}`:''}`.trim();

        if(navigator.share) {
            try { await navigator.share({ title:`فاتورة ${inv.invoiceNumber}`, text:txt }); }
            catch(e) { if(e.name!=='AbortError') showToast('تعذرت المشاركة', false); }
        } else {
            navigator.clipboard?.writeText(txt).then(() =>
                showToast('✅ تم نسخ الفاتورة — الصقها في أي تطبيق', true));
        }
    }

    function goHome() { window.location.href = 'index.html'; }
</script>
</body>
</html>
