<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تاجر برو — طباعة الفاتورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a, #1e3a5f);
            min-height: 100vh; padding: 20px 10px 40px;
            color: #fff;
        }

        /* ===== شاشة الخيارات ===== */
        .options-screen {
            max-width: 480px; margin: 0 auto;
        }

        .options-header {
            text-align: center; margin-bottom: 25px;
        }

        .options-header .icon-circle {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #2b9348, #38b000);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px;
            box-shadow: 0 0 30px rgba(43,147,72,0.4);
            font-size: 28px; color: white;
        }

        .options-header h2 {
            font-size: 18px; font-weight: 900; color: #38b000;
        }

        .options-header p {
            font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px;
        }

        .inv-summary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 14px 16px;
            margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .inv-summary .inv-num {
            font-size: 13px; color: #00b4d8; font-weight: 700;
        }

        .inv-summary .inv-total {
            font-size: 20px; font-weight: 900; color: #38b000;
        }

        .inv-summary .inv-date {
            font-size: 11px; color: rgba(255,255,255,0.4);
        }

        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; margin-bottom: 16px;
        }

        .opt-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 18px 12px;
            text-align: center; cursor: pointer;
            transition: 0.3s; color: white;
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
        }

        .opt-btn:hover, .opt-btn:active {
            transform: translateY(-3px);
            border-color: var(--clr);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .opt-btn .opt-icon {
            width: 50px; height: 50px; border-radius: 14px;
            background: var(--clr);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .opt-btn .opt-title {
            font-size: 13px; font-weight: 700;
        }

        .opt-btn .opt-sub {
            font-size: 10px; color: rgba(255,255,255,0.4);
        }

        .opt-btn-full {
            grid-column: 1 / -1;
        }

        .btn-back-home {
            width: 100%; padding: 13px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: rgba(255,255,255,0.6);
            font-size: 13px; font-family: 'Cairo', sans-serif;
            cursor: pointer; transition: 0.2s; margin-top: 8px;
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }

        .btn-back-home:hover { color: white; background: rgba(255,255,255,0.1); }

        /* ===== الفاتورة للطباعة ===== */
        #invoicePrintArea { display: none; }

        /* الفاتورة A4 */
        .invoice-a4 {
            width: 210mm; min-height: 297mm;
            background: white; color: #000;
            padding: 15mm 12mm;
            font-family: 'Cairo', sans-serif;
            margin: 0 auto;
        }

        /* الفاتورة حرارية 80mm */
        .invoice-thermal80 {
            width: 80mm;
            background: white; color: #000;
            padding: 4mm 3mm;
            font-family: 'Cairo', sans-serif;
            font-size: 11px;
            margin: 0 auto;
        }

        /* الفاتورة حرارية 58mm */
        .invoice-thermal58 {
            width: 58mm;
            background: white; color: #000;
            padding: 3mm 2mm;
            font-family: 'Cairo', sans-serif;
            font-size: 9px;
            margin: 0 auto;
        }

        .inv-header-row {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 8mm;
            border-bottom: 2px solid #0077b6; padding-bottom: 5mm;
        }

        .inv-seller { text-align: right; }
        .inv-customer { text-align: left; }

        .inv-company-name {
            font-size: 18px; font-weight: 900; color: #0077b6;
        }

        .inv-detail-line {
            font-size: 11px; color: #555; margin-top: 2px;
        }

        .inv-title-center {
            text-align: center; margin-bottom: 6mm;
        }

        .inv-title-center h2 {
            font-size: 20px; font-weight: 900; color: #0077b6;
        }

        .inv-title-center .inv-number {
            font-size: 13px; color: #333; font-weight: 700;
        }

        .inv-title-center .inv-date {
            font-size: 11px; color: #777;
        }

        .inv-table {
            width: 100%; border-collapse: collapse; margin-bottom: 6mm;
        }

        .inv-table th {
            background: #0077b6; color: white;
            padding: 6px 8px; font-size: 11px;
            text-align: center;
        }

        .inv-table td {
            padding: 5px 8px; font-size: 11px;
            border-bottom: 1px solid #eee; text-align: center;
        }

        .inv-table tr:nth-child(even) td { background: #f8f9fa; }

        .inv-totals {
            width: 220px; margin-right: auto;
            border: 1px solid #eee; border-radius: 8px;
            overflow: hidden; margin-bottom: 6mm;
        }

        .inv-totals .tot-row {
            display: flex; justify-content: space-between;
            padding: 5px 10px; font-size: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .inv-totals .tot-row.total {
            background: #0077b6; color: white;
            font-weight: 900; font-size: 14px;
        }

        .inv-footer-row {
            display: flex; justify-content: space-between;
            align-items: flex-end; margin-top: 8mm;
            border-top: 1px dashed #ccc; padding-top: 5mm;
        }

        .inv-qr { text-align: center; }
        .inv-qr p { font-size: 9px; color: #777; margin-top: 3px; }

        .inv-footer-note {
            font-size: 10px; color: #777;
            text-align: center; flex: 1; padding: 0 10px;
        }

        .zatca-label {
            font-size: 9px; color: #0077b6;
            display: flex; align-items: center; gap: 3px;
        }

        /* ===== طباعة حرارية ===== */
        .thermal-center { text-align: center; }
        .thermal-divider {
            border: none; border-top: 1px dashed #000;
            margin: 3mm 0;
        }
        .thermal-row {
            display: flex; justify-content: space-between;
            font-size: 10px; margin: 1mm 0;
        }
        .thermal-total-row {
            display: flex; justify-content: space-between;
            font-size: 12px; font-weight: 900; margin: 1mm 0;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px; border-radius: 30px;
            color: white; font-weight: 700; font-size: 13px;
            display: none; z-index: 9999; max-width: 90%;
            text-align: center; font-family: 'Cairo', sans-serif;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-left: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== طباعة ===== */
        @media print {
            body { background: white !important; padding: 0 !important; }
            .options-screen { display: none !important; }
            #invoicePrintArea { display: block !important; }
            .invoice-a4, .invoice-thermal80, .invoice-thermal58 {
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- ===== شاشة الخيارات ===== -->
<div class="options-screen" id="optionsScreen">
    <div class="options-header">
        <div class="icon-circle"><i class="fas fa-check"></i></div>
        <h2>تم اعتماد الفاتورة بنجاح</h2>
        <p>اختر طريقة الطباعة أو التصدير</p>
    </div>

    <!-- ملخص الفاتورة -->
    <div class="inv-summary">
        <div>
            <div class="inv-num" id="summaryNum">—</div>
            <div class="inv-date" id="summaryDate">—</div>
        </div>
        <div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4);text-align:left;">الإجمالي</div>
            <div class="inv-total" id="summaryTotal">0.00</div>
        </div>
    </div>

    <!-- خيارات الطباعة -->
    <div class="options-grid">

        <div class="opt-btn" style="--clr:#0077b6;" onclick="printInvoice('thermal80')">
            <div class="opt-icon"><i class="fas fa-print"></i></div>
            <div>
                <div class="opt-title">حرارية 80mm</div>
                <div class="opt-sub">طابعة POS عادية</div>
            </div>
        </div>

        <div class="opt-btn" style="--clr:#7209b7;" onclick="printInvoice('thermal58')">
            <div class="opt-icon"><i class="fas fa-receipt"></i></div>
            <div>
                <div class="opt-title">حرارية 58mm</div>
                <div class="opt-sub">طابعة POS صغيرة</div>
            </div>
        </div>

        <div class="opt-btn" style="--clr:#0077b6;" onclick="printInvoice('a4')">
            <div class="opt-icon"><i class="fas fa-file-alt"></i></div>
            <div>
                <div class="opt-title">طباعة A4</div>
                <div class="opt-sub">طابعة مكتبية عادية</div>
            </div>
        </div>

        <div class="opt-btn" style="--clr:#d90429;" onclick="exportPDF()">
            <div class="opt-icon"><i class="fas fa-file-pdf"></i></div>
            <div>
                <div class="opt-title">حفظ PDF</div>
                <div class="opt-sub">يحفظ في جهازك</div>
            </div>
        </div>

        <div class="opt-btn opt-btn-full" style="--clr:#2b9348;" onclick="shareInvoice()">
            <div class="opt-icon" style="width:40px;height:40px;font-size:18px;">
                <i class="fas fa-share-alt"></i>
            </div>
            <div>
                <div class="opt-title">مشاركة الفاتورة</div>
                <div class="opt-sub">واتساب — إيميل — أي تطبيق</div>
            </div>
        </div>

    </div>

    <button class="btn-back-home" onclick="goHome()">
        <i class="fas fa-home"></i> العودة للرئيسية
    </button>
</div>

<!-- ===== منطقة الفاتورة للطباعة/PDF ===== -->
<div id="invoicePrintArea"></div>

<script type="module" src="firebase-config.js"></script>
<script>
    // ===== تحميل بيانات الفاتورة =====
    const invoiceData = JSON.parse(sessionStorage.getItem('altajer_print_invoice') || localStorage.getItem('altajer_last_invoice') || 'null');
    const settings    = JSON.parse(localStorage.getItem('altajer_settings') || '{}');
    let currentMode   = 'a4';

    // ===== Toast =====
    function showToast(msg, ok = true) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.backgroundColor = ok ? '#2b9348' : '#d90429';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 4000);
    }

    // ===== ملء ملخص الفاتورة =====
    function fillSummary() {
        if(!invoiceData) return;
        document.getElementById('summaryNum').innerText   = invoiceData.invoiceNumber || '—';
        document.getElementById('summaryDate').innerText  = invoiceData.date || '—';
        document.getElementById('summaryTotal').innerText =
            (parseFloat(invoiceData.total)||0).toFixed(2) + ' ' + (settings.currency || 'SAR');
    }
    fillSummary();

    // ===== توليد QR ZATCA =====
    function buildQR(containerId, inv) {
        const container = document.getElementById(containerId);
        if(!container) return;
        container.innerHTML = '';
        try {
            function toTLV(tag, value) {
                const bytes = new TextEncoder().encode(value);
                return String.fromCharCode(tag) +
                       String.fromCharCode(bytes.length) +
                       String.fromCharCode(...bytes);
            }
            const qrText = btoa(
                toTLV(1, inv.sellerName || settings.companyName || 'تاجر برو') +
                toTLV(2, inv.vatNumber  || settings.vatNumber   || '300000000000003') +
                toTLV(3, inv.timestamp  || new Date().toISOString()) +
                toTLV(4, Number(inv.total||0).toFixed(2)) +
                toTLV(5, Number(inv.tax ||0).toFixed(2))
            );
            new QRCode(container, {
                text: qrText, width: 80, height: 80,
                colorDark: '#000000', colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });
        } catch(e) { console.error('QR Error:', e); }
    }

    // ===== بناء فاتورة A4 =====
    function buildA4(inv, s) {
        const taxRate  = s.taxEnabled ? (s.taxRate || 15) : 0;
        const currency = s.currency || 'SAR';
        const addr     = s.address  || {};

        const itemsHTML = (inv.items || []).map((item, i) => `
            <tr>
                <td>${i+1}</td>
                <td style="text-align:right;">${item.name}</td>
                <td>${item.code || '—'}</td>
                <td>${item.qty}</td>
                <td>${parseFloat(item.price / 1.15 || 0).toFixed(2)}</td>
                <td>${parseFloat(item.total || 0).toFixed(2)}</td>
            </tr>
        `).join('');

        return `
        <div class="invoice-a4" id="a4Content">
            <!-- رأس الفاتورة -->
            <div class="inv-header-row">
                <div class="inv-seller">
                    <div class="inv-company-name">${s.companyName || 'تاجر برو'}</div>
                    ${s.vatNumber ? `<div class="inv-detail-line">الرقم الضريبي: ${s.vatNumber}</div>` : ''}
                    ${s.cr ? `<div class="inv-detail-line">السجل التجاري: ${s.cr}</div>` : ''}
                    ${s.phone ? `<div class="inv-detail-line">هاتف: ${s.phone}</div>` : ''}
                    ${s.email ? `<div class="inv-detail-line">بريد: ${s.email}</div>` : ''}
                    ${addr.city ? `<div class="inv-detail-line">${addr.city}${addr.district ? ' — ' + addr.district : ''}${addr.street ? ' — ' + addr.street : ''}</div>` : ''}
                </div>
                <div style="text-align:center;">
                    <img src="https://cdn-icons-png.flaticon.com/512/3222/3222675.png" width="60" alt="logo">
                </div>
                <div class="inv-customer">
                    <div style="font-size:13px;font-weight:700;color:#333;">بيانات العميل</div>
                    <div class="inv-detail-line">${inv.customer || 'نقدي'}</div>
                    ${inv.customerVat && inv.customerVat !== 'غير ضريبي' ? `<div class="inv-detail-line">الرقم الضريبي: ${inv.customerVat}</div>` : ''}
                </div>
            </div>

            <!-- عنوان الفاتورة -->
            <div class="inv-title-center">
                <h2>فاتورة ضريبية ${taxRate > 0 ? '' : 'مبسطة'}</h2>
                <div class="inv-number">رقم: ${inv.invoiceNumber}</div>
                <div class="inv-date">التاريخ: ${inv.date}</div>
            </div>

            <!-- جدول الأصناف -->
            <table class="inv-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الصنف</th>
                        <th>الكود</th>
                        <th>الكمية</th>
                        <th>السعر قبل الضريبة</th>
                        <th>المجموع</th>
                    </tr>
                </thead>
                <tbody>${itemsHTML}</tbody>
            </table>

            <!-- الإجماليات -->
            <div style="display:flex;justify-content:flex-end;">
                <div class="inv-totals">
                    <div class="tot-row">
                        <span>المجموع قبل الضريبة</span>
                        <span>${parseFloat(inv.subtotal||0).toFixed(2)} ${currency}</span>
                    </div>
                    ${taxRate > 0 ? `
                    <div class="tot-row">
                        <span>ضريبة القيمة المضافة ${taxRate}%</span>
                        <span>${parseFloat(inv.tax||0).toFixed(2)} ${currency}</span>
                    </div>` : ''}
                    ${parseFloat(inv.discount||0) > 0 ? `
                    <div class="tot-row">
                        <span>الخصم</span>
                        <span>- ${parseFloat(inv.discount).toFixed(2)} ${currency}</span>
                    </div>` : ''}
                    <div class="tot-row total">
                        <span>الإجمالي</span>
                        <span>${parseFloat(inv.total||0).toFixed(2)} ${currency}</span>
                    </div>
                </div>
            </div>

            <!-- تذييل الفاتورة -->
            <div class="inv-footer-row">
                <div class="inv-qr">
                    <div id="qrA4"></div>
                    <p class="zatca-label"><i class="fas fa-shield-alt"></i> ZATCA QR</p>
                </div>
                <div class="inv-footer-note">
                    ${s.invoiceFooter || 'شكراً لتعاملكم معنا'}
                    <br><br>
                    <small style="color:#aaa;">تم إصدار هذه الفاتورة بواسطة تاجر برو المحاسبي</small>
                </div>
                <div style="text-align:left;font-size:11px;color:#777;">
                    ${s.website ? `<div>${s.website}</div>` : ''}
                </div>
            </div>
        </div>`;
    }

    // ===== بناء فاتورة حرارية =====
    function buildThermal(inv, s, width) {
        const currency = s.currency || 'SAR';
        const taxRate  = s.taxEnabled ? (s.taxRate || 15) : 0;
        const cls      = width === 80 ? 'invoice-thermal80' : 'invoice-thermal58';

        const itemsHTML = (inv.items || []).map(item => `
            <div class="thermal-row">
                <span>${item.name}</span>
                <span>${parseFloat(item.total||0).toFixed(2)}</span>
            </div>
            <div style="font-size:9px;color:#555;padding-right:5px;">
                ${item.qty} × ${parseFloat(item.price/1.15||0).toFixed(2)}
            </div>
        `).join('');

        return `
        <div class="${cls}" id="thermalContent">
            <div class="thermal-center">
                <div style="font-size:14px;font-weight:900;">${s.companyName || 'تاجر برو'}</div>
                ${s.phone ? `<div style="font-size:9px;">${s.phone}</div>` : ''}
                ${s.address?.city ? `<div style="font-size:9px;">${s.address.city}</div>` : ''}
                <div style="font-size:9px;margin-top:2px;">فاتورة ضريبية</div>
            </div>
            <hr class="thermal-divider">
            <div class="thermal-row">
                <span>رقم الفاتورة:</span>
                <span style="font-size:9px;">${inv.invoiceNumber}</span>
            </div>
            <div class="thermal-row">
                <span>التاريخ:</span>
                <span>${inv.date}</span>
            </div>
            <div class="thermal-row">
                <span>العميل:</span>
                <span>${inv.customer || 'نقدي'}</span>
            </div>
            <hr class="thermal-divider">
            ${itemsHTML}
            <hr class="thermal-divider">
            <div class="thermal-row">
                <span>قبل الضريبة:</span>
                <span>${parseFloat(inv.subtotal||0).toFixed(2)} ${currency}</span>
            </div>
            ${taxRate > 0 ? `
            <div class="thermal-row">
                <span>ضريبة ${taxRate}%:</span>
                <span>${parseFloat(inv.tax||0).toFixed(2)} ${currency}</span>
            </div>` : ''}
            ${parseFloat(inv.discount||0) > 0 ? `
            <div class="thermal-row">
                <span>خصم:</span>
                <span>- ${parseFloat(inv.discount).toFixed(2)} ${currency}</span>
            </div>` : ''}
            <hr class="thermal-divider">
            <div class="thermal-total-row">
                <span>الإجمالي:</span>
                <span>${parseFloat(inv.total||0).toFixed(2)} ${currency}</span>
            </div>
            <hr class="thermal-divider">
            <div class="thermal-center" style="margin-top:3mm;">
                <div id="qrThermal"></div>
                <div style="font-size:8px;margin-top:2mm;">${s.invoiceFooter || 'شكراً لتعاملكم معنا'}</div>
                <div style="font-size:8px;color:#777;margin-top:1mm;">تاجر برو المحاسبي</div>
            </div>
        </div>`;
    }

    // ===== طباعة الفاتورة =====
    function printInvoice(mode) {
        if(!invoiceData) return showToast('لا توجد بيانات فاتورة', false);
        currentMode = mode;

        const area = document.getElementById('invoicePrintArea');

        if(mode === 'a4') {
            area.innerHTML = buildA4(invoiceData, settings);
        } else if(mode === 'thermal80') {
            area.innerHTML = buildThermal(invoiceData, settings, 80);
        } else if(mode === 'thermal58') {
            area.innerHTML = buildThermal(invoiceData, settings, 58);
        }

        // بناء QR
        setTimeout(() => {
            const qrId = mode === 'a4' ? 'qrA4' : 'qrThermal';
            buildQR(qrId, invoiceData);
            setTimeout(() => window.print(), 600);
        }, 300);
    }

    // ===== تصدير PDF =====
    async function exportPDF() {
        if(!invoiceData) return showToast('لا توجد بيانات فاتورة', false);
        showToast('جاري إنشاء PDF... <span class="spinner"></span>', true);

        const area = document.getElementById('invoicePrintArea');
        area.innerHTML = buildA4(invoiceData, settings);
        area.style.display = 'block';

        setTimeout(async () => {
            buildQR('qrA4', invoiceData);
            setTimeout(async () => {
                const element = document.getElementById('a4Content');
                const opt = {
                    margin:      [5, 5, 5, 5],
                    filename:    `فاتورة-${invoiceData.invoiceNumber}.pdf`,
                    image:       { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                try {
                    await html2pdf().set(opt).from(element).save();
                    showToast('✅ تم حفظ PDF في جهازك', true);
                } catch(e) {
                    showToast('❌ فشل إنشاء PDF', false);
                }
                area.style.display = 'none';
            }, 500);
        }, 300);
    }

    // ===== مشاركة الفاتورة =====
    async function shareInvoice() {
        if(!invoiceData) return showToast('لا توجد بيانات فاتورة', false);

        const shareText = `
فاتورة من: ${settings.companyName || 'تاجر برو'}
رقم الفاتورة: ${invoiceData.invoiceNumber}
التاريخ: ${invoiceData.date}
العميل: ${invoiceData.customer || 'نقدي'}
الإجمالي: ${parseFloat(invoiceData.total||0).toFixed(2)} ${settings.currency || 'SAR'}
${settings.phone ? 'للتواصل: ' + settings.phone : ''}
        `.trim();

        if(navigator.share) {
            try {
                await navigator.share({
                    title: `فاتورة ${invoiceData.invoiceNumber}`,
                    text:  shareText
                });
            } catch(e) {
                if(e.name !== 'AbortError') showToast('تعذرت المشاركة', false);
            }
        } else {
            // نسخ للحافظة
            navigator.clipboard?.writeText(shareText).then(() => {
                showToast('✅ تم نسخ بيانات الفاتورة — الصقها في أي تطبيق', true);
            });
        }
    }

    // ===== العودة للرئيسية =====
    function goHome() {
        window.location.href = 'index.html';
    }
</script>
