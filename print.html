<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تاجر برو — طباعة الفاتورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e3a5f); min-height: 100vh; padding: 20px 10px 40px; color: #fff; }

        /* ===== شاشة الخيارات ===== */
        .options-screen { max-width: 480px; margin: 0 auto; }
        .options-header { text-align: center; margin-bottom: 25px; }
        .icon-circle { width: 70px; height: 70px; background: linear-gradient(135deg, #2b9348, #38b000); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 0 30px rgba(43,147,72,0.4); font-size: 28px; color: white; }
        .options-header h2 { font-size: 18px; font-weight: 900; color: #38b000; }
        .options-header p { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
        .inv-summary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 14px 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .inv-num { font-size: 13px; color: #00b4d8; font-weight: 700; }
        .inv-total { font-size: 20px; font-weight: 900; color: #38b000; }
        .inv-date-s { font-size: 11px; color: rgba(255,255,255,0.4); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .opt-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 18px 12px; text-align: center; cursor: pointer; transition: 0.3s; color: white; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .opt-btn:hover, .opt-btn:active { transform: translateY(-3px); border-color: var(--clr); background: rgba(255,255,255,0.1); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .opt-icon { width: 50px; height: 50px; border-radius: 14px; background: var(--clr); display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .opt-title { font-size: 13px; font-weight: 700; }
        .opt-sub { font-size: 10px; color: rgba(255,255,255,0.4); }
        .opt-btn-full { grid-column: 1 / -1; }
        .btn-back-home { width: 100%; padding: 13px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: rgba(255,255,255,0.6); font-size: 13px; font-family: 'Cairo', sans-serif; cursor: pointer; transition: 0.2s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-back-home:hover { color: white; background: rgba(255,255,255,0.1); }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 30px; color: white; font-weight: 700; font-size: 13px; display: none; z-index: 9999; max-width: 90%; text-align: center; font-family: 'Cairo', sans-serif; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        #invoicePrintArea { display: none; }

        /* ===== فاتورة A4 ===== */
        .invoice-a4 { width: 210mm; min-height: 297mm; background: white; color: #1a1a2e; padding: 12mm 14mm; font-family: 'Cairo', sans-serif; margin: 0 auto; position: relative; }

        /* شريط العنوان العلوي */
        .inv-top-bar { background: linear-gradient(135deg, #0077b6, #023e8a); color: white; padding: 10px 15px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0; }
        .inv-top-bar .brand { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
        .inv-top-bar .inv-type { font-size: 13px; opacity: 0.85; }

        /* رأس الفاتورة */
        .inv-parties { display: flex; justify-content: space-between; background: #f8f9ff; border: 1px solid #e0e7ff; border-top: none; padding: 14px 15px; margin-bottom: 6mm; }
        .party-box { width: 45%; }
        .party-label { font-size: 10px; font-weight: 700; color: #0077b6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; border-bottom: 2px solid #0077b6; padding-bottom: 3px; display: inline-block; }
        .party-name { font-size: 15px; font-weight: 900; color: #1a1a2e; margin-bottom: 3px; }
        .party-detail { font-size: 10px; color: #555; margin-top: 2px; display: flex; align-items: center; gap: 4px; }
        .party-detail i { color: #0077b6; font-size: 9px; }

        /* معلومات الفاتورة */
        .inv-meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5mm; }
        .inv-meta-box { background: #f0f7ff; border: 1px solid #cce3f5; border-radius: 8px; padding: 8px 14px; text-align: center; min-width: 90px; }
        .inv-meta-label { font-size: 9px; color: #0077b6; font-weight: 700; display: block; }
        .inv-meta-value { font-size: 13px; font-weight: 900; color: #1a1a2e; }

        /* جدول الأصناف */
        .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 5mm; font-size: 11px; }
        .inv-table thead tr { background: linear-gradient(135deg, #0077b6, #023e8a); color: white; }
        .inv-table th { padding: 8px 7px; text-align: center; font-weight: 700; font-size: 10px; }
        .inv-table td { padding: 6px 7px; text-align: center; border-bottom: 1px solid #f0f0f0; color: #333; }
        .inv-table td.name-cell { text-align: right; font-weight: 600; }
        .inv-table td.notes-cell { text-align: right; font-size: 9px; color: #777; }
        .inv-table tr:nth-child(even) td { background: #fafbff; }
        .inv-table tr:last-child td { border-bottom: 2px solid #0077b6; }

        /* الإجماليات */
        .inv-bottom-section { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5mm; }
        .inv-notes-box { width: 52%; }
        .inv-notes-title { font-size: 10px; font-weight: 700; color: #0077b6; margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
        .inv-notes-content { font-size: 10px; color: #555; border: 1px dashed #cce3f5; border-radius: 6px; padding: 8px; min-height: 50px; line-height: 1.6; }
        .inv-totals-box { width: 44%; }
        .tot-row { display: flex; justify-content: space-between; padding: 5px 10px; font-size: 11px; border-bottom: 1px solid #f0f0f0; }
        .tot-row.highlight { background: #f0f7ff; font-weight: 700; }
        .tot-row.total-final { background: linear-gradient(135deg, #0077b6, #023e8a); color: white; font-weight: 900; font-size: 14px; border-radius: 0 0 8px 8px; padding: 8px 10px; }

        /* شروط الدفع */
        .inv-terms-box { background: #fffbf0; border: 1px solid #ffd166; border-radius: 8px; padding: 8px 12px; margin-bottom: 5mm; }
        .inv-terms-title { font-size: 10px; font-weight: 700; color: #b56a00; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
        .inv-terms-content { font-size: 9px; color: #7a4f00; line-height: 1.7; }

        /* تذييل الفاتورة */
        .inv-footer-section { display: flex; justify-content: space-between; align-items: flex-end; border-top: 2px dashed #cce3f5; padding-top: 5mm; }
        .inv-qr-box { text-align: center; }
        .inv-qr-label { font-size: 8px; color: #0077b6; margin-top: 3px; display: flex; align-items: center; justify-content: center; gap: 3px; }
        .inv-stamp-box { width: 100px; height: 90px; border: 2px dashed #cce3f5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aac4de; font-size: 9px; text-align: center; gap: 4px; }
        .inv-stamp-box i { font-size: 22px; }
        .inv-footer-note { flex: 1; text-align: center; padding: 0 10px; font-size: 9px; color: #777; line-height: 1.6; }
        .inv-powered { font-size: 8px; color: #bbb; margin-top: 3px; }

        /* ===== فاتورة حرارية ===== */
        .invoice-thermal80 { width: 80mm; background: white; color: #000; padding: 4mm 3mm; font-family: 'Cairo', sans-serif; font-size: 11px; margin: 0 auto; }
        .invoice-thermal58 { width: 58mm; background: white; color: #000; padding: 3mm 2mm; font-family: 'Cairo', sans-serif; font-size: 9px; margin: 0 auto; }
        .thermal-center { text-align: center; }
        .thermal-divider { border: none; border-top: 1px dashed #000; margin: 3mm 0; }
        .thermal-row { display: flex; justify-content: space-between; font-size: 10px; margin: 1mm 0; }
        .thermal-total-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: 900; margin: 1mm 0; }

        /* ===== طباعة ===== */
        @media print {
            body { background: white !important; padding: 0 !important; }
            .options-screen { display: none !important; }
            #invoicePrintArea { display: block !important; }
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- ===== شاشة الخيارات ===== -->
<div class="options-screen" id="optionsScreen">
    <div class="options-header">
        <div class="icon-circle"><i class="fas fa-check"></i></div>
        <h2>تم اعتماد الفاتورة بنجاح</h2>
        <p>اختر طريقة الطباعة أو التصدير</p>
    </div>

    <div class="inv-summary">
        <div>
            <div class="inv-num" id="summaryNum">—</div>
            <div class="inv-date-s" id="summaryDate">—</div>
        </div>
        <div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4);text-align:left;">الإجمالي</div>
            <div class="inv-total" id="summaryTotal">0.00</div>
        </div>
    </div>

    <div class="options-grid">
        <div class="opt-btn" style="--clr:#0077b6;" onclick="printInvoice('thermal80')">
            <div class="opt-icon"><i class="fas fa-print"></i></div>
            <div><div class="opt-title">حرارية 80mm</div><div class="opt-sub">طابعة POS عادية</div></div>
        </div>
        <div class="opt-btn" style="--clr:#7209b7;" onclick="printInvoice('thermal58')">
            <div class="opt-icon"><i class="fas fa-receipt"></i></div>
            <div><div class="opt-title">حرارية 58mm</div><div class="opt-sub">طابعة POS صغيرة</div></div>
        </div>
        <div class="opt-btn" style="--clr:#023e8a;" onclick="printInvoice('a4')">
            <div class="opt-icon"><i class="fas fa-file-alt"></i></div>
            <div><div class="opt-title">طباعة A4</div><div class="opt-sub">طابعة مكتبية</div></div>
        </div>
        <div class="opt-btn" style="--clr:#d90429;" onclick="exportPDF()">
            <div class="opt-icon"><i class="fas fa-file-pdf"></i></div>
            <div><div class="opt-title">حفظ PDF</div><div class="opt-sub">يحفظ في جهازك</div></div>
        </div>
        <div class="opt-btn opt-btn-full" style="--clr:#2b9348;" onclick="shareInvoice()">
            <div class="opt-icon" style="width:40px;height:40px;font-size:18px;"><i class="fas fa-share-alt"></i></div>
            <div><div class="opt-title">مشاركة الفاتورة</div><div class="opt-sub">واتساب — إيميل — أي تطبيق</div></div>
        </div>
    </div>

    <button class="btn-back-home" onclick="goHome()">
        <i class="fas fa-home"></i> العودة للرئيسية
    </button>
</div>

<!-- ===== منطقة الطباعة ===== -->
<div id="invoicePrintArea"></div>

<script type="module" src="firebase-config.js"></script>
<script>
    const invoiceData = JSON.parse(sessionStorage.getItem('altajer_print_invoice') || localStorage.getItem('altajer_last_invoice') || 'null');
    const settings    = JSON.parse(localStorage.getItem('altajer_settings') || '{}');

    // إصلاح العملة
    const CURRENCY_LABELS = {
        SAR:'ر.س', AED:'د.إ', KWD:'د.ك', QAR:'ر.ق', BHD:'د.ب', OMR:'ر.ع',
        EGP:'ج.م', MAD:'د.م', USD:'$', GBP:'£', EUR:'€', NGN:'₦', KES:'KSh',
        TRY:'₺', INR:'₹', OTHER:''
    };
    const CUR = CURRENCY_LABELS[settings.currency] || settings.currency || 'ر.س';

    function showToast(msg, ok=true) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.backgroundColor = ok ? '#2b9348' : '#d90429';
        t.style.display = 'block';
        setTimeout(() => t.style.display='none', 4000);
    }

    function fillSummary() {
        if(!invoiceData) return;
        document.getElementById('summaryNum').innerText  = invoiceData.invoiceNumber || '—';
        document.getElementById('summaryDate').innerText = invoiceData.date || '—';
        document.getElementById('summaryTotal').innerText =
            (parseFloat(invoiceData.total)||0).toFixed(2) + ' ' + CUR;
    }
    fillSummary();

    function buildQR(containerId, inv) {
        const container = document.getElementById(containerId);
        if(!container) return;
        container.innerHTML = '';
        try {
            function toTLV(tag, value) {
                const bytes = new TextEncoder().encode(value);
                return String.fromCharCode(tag) +
                       String.fromCharCode(bytes.length) +
                       String.fromCharCode(...bytes);
            }
            const qrText = btoa(
                toTLV(1, inv.sellerName || settings.companyName || 'تاجر برو') +
                toTLV(2, inv.vatNumber  || settings.vatNumber   || '') +
                toTLV(3, inv.timestamp  || new Date().toISOString()) +
                toTLV(4, Number(inv.total||0).toFixed(2)) +
                toTLV(5, Number(inv.tax||0).toFixed(2))
            );
            new QRCode(container, {
                text: qrText, width: 90, height: 90,
                colorDark: '#000000', colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });
        } catch(e) { console.error('QR:', e); }
    }

    // ===== بناء فاتورة A4 احترافية =====
    function buildA4(inv, s) {
        const taxRate  = s.taxEnabled ? (s.taxRate || 15) : 0;
        const addr     = s.address || {};
        const invType  = taxRate > 0 ? 'فاتورة ضريبية' : 'فاتورة ضريبية مبسطة';

        const itemsHTML = (inv.items || []).map((item, i) => {
            const priceExcl = taxRate > 0
                ? parseFloat(item.price / (1 + taxRate/100)).toFixed(2)
                : parseFloat(item.price).toFixed(2);
            const priceIncl = parseFloat(item.price).toFixed(2);
            const taxAmt    = taxRate > 0
                ? (parseFloat(item.price) - parseFloat(priceExcl)).toFixed(2)
                : '0.00';
            return `<tr>
                <td>${i+1}</td>
                <td class="name-cell">${item.name}</td>
                <td style="font-size:9px;color:#777;">${item.code || '—'}</td>
                <td>${item.qty}</td>
                <td>${priceExcl}</td>
                ${taxRate > 0 ? `<td>${taxAmt}</td>` : ''}
                <td style="font-weight:700;">${priceIncl}</td>
                <td style="font-weight:700;color:#0077b6;">${parseFloat(item.total||0).toFixed(2)}</td>
            </tr>`;
        }).join('');

        const thTax = taxRate > 0 ? `<th>الضريبة</th>` : '';

        return `
        <div class="invoice-a4" id="a4Content">

            <!-- شريط العنوان -->
            <div class="inv-top-bar">
                <div>
                    <div class="brand">${s.companyName || 'تاجر برو'}</div>
                    ${s.vatNumber ? `<div style="font-size:10px;opacity:0.8;">الرقم الضريبي: ${s.vatNumber}</div>` : ''}
                    ${s.cr ? `<div style="font-size:10px;opacity:0.8;">س.ت: ${s.cr}</div>` : ''}
                </div>
                <div style="text-align:left;">
                    <div class="inv-type">${invType}</div>
                    <div style="font-size:22px;font-weight:900;letter-spacing:2px;margin-top:2px;">
                        ${inv.invoiceNumber}
                    </div>
                </div>
            </div>

            <!-- بيانات الطرفين -->
            <div class="inv-parties">
                <div class="party-box">
                    <div class="party-label">المورد / البائع</div>
                    <div class="party-name">${s.companyName || 'تاجر برو'}</div>
                    ${s.phone ? `<div class="party-detail"><i class="fas fa-phone"></i>${s.phone}</div>` : ''}
                    ${s.email ? `<div class="party-detail"><i class="fas fa-envelope"></i>${s.email}</div>` : ''}
                    ${s.website ? `<div class="party-detail"><i class="fas fa-globe"></i>${s.website}</div>` : ''}
                    ${addr.city ? `<div class="party-detail"><i class="fas fa-map-marker-alt"></i>${addr.city}${addr.district?' — '+addr.district:''}${addr.street?' — '+addr.street:''}</div>` : ''}
                    ${addr.building ? `<div class="party-detail"><i class="fas fa-building"></i>م.${addr.building} | ب.${addr.postal||''} | إ.${addr.addNo||''}</div>` : ''}
                </div>
                <div style="text-align:center;padding-top:5px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/3222/3222675.png" width="55" alt="logo" style="opacity:0.7;">
                    <div style="font-size:8px;color:#aaa;margin-top:3px;">تاجر برو المحاسبي</div>
                </div>
                <div class="party-box" style="text-align:left;">
                    <div class="party-label" style="border-color:#38b000;color:#38b000;">العميل / المشتري</div>
                    <div class="party-name">${inv.customer || 'نقدي / عميل عام'}</div>
                    ${inv.customerVat && inv.customerVat !== 'غير ضريبي' ?
                        `<div class="party-detail"><i class="fas fa-hashtag"></i>الرقم الضريبي: ${inv.customerVat}</div>` : ''}
                    <div class="party-detail"><i class="fas fa-calendar"></i>التاريخ: ${inv.date}</div>
                    <div class="party-detail"><i class="fas fa-clock"></i>${new Date(inv.timestamp||Date.now()).toLocaleTimeString('ar-SA')}</div>
                </div>
            </div>

            <!-- معلومات الفاتورة -->
            <div class="inv-meta-row">
                <div class="inv-meta-box">
                    <span class="inv-meta-label">رقم الفاتورة</span>
                    <span class="inv-meta-value" style="font-size:11px;">${inv.invoiceNumber}</span>
                </div>
                <div class="inv-meta-box">
                    <span class="inv-meta-label">التاريخ</span>
                    <span class="inv-meta-value" style="font-size:11px;">${inv.date}</span>
                </div>
                <div class="inv-meta-box">
                    <span class="inv-meta-label">العملة</span>
                    <span class="inv-meta-value">${CUR}</span>
                </div>
                ${taxRate > 0 ? `
                <div class="inv-meta-box">
                    <span class="inv-meta-label">نسبة الضريبة</span>
                    <span class="inv-meta-value">${taxRate}%</span>
                </div>` : ''}
                <div class="inv-meta-box" style="background:#f0fff4;border-color:#c3f0ca;">
                    <span class="inv-meta-label" style="color:#2b9348;">الإجمالي</span>
                    <span class="inv-meta-value" style="color:#2b9348;">${parseFloat(inv.total||0).toFixed(2)}</span>
                </div>
            </div>

            <!-- جدول الأصناف -->
            <table class="inv-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align:right;">الصنف / الخدمة</th>
                        <th>الكود</th>
                        <th>الكمية</th>
                        <th>سعر الوحدة</th>
                        ${thTax}
                        <th>السعر شامل الضريبة</th>
                        <th>الإجمالي</th>
                    </tr>
                </thead>
                <tbody>${itemsHTML}</tbody>
            </table>

            <!-- القسم السفلي: ملاحظات + إجماليات -->
            <div class="inv-bottom-section">
                <div class="inv-notes-box">
                    <div class="inv-notes-title">
                        <i class="fas fa-sticky-note" style="color:#0077b6;"></i> ملاحظات
                    </div>
                    <div class="inv-notes-content">
                        ${s.invoiceFooter || 'شكراً لتعاملكم معنا — نسعد بخدمتكم دائماً'}
                    </div>
                </div>
                <div class="inv-totals-box">
                    <div style="border:1px solid #e0e7ff;border-radius:8px;overflow:hidden;">
                        <div class="tot-row">
                            <span>المجموع قبل الضريبة</span>
                            <span>${parseFloat(inv.subtotal||0).toFixed(2)} ${CUR}</span>
                        </div>
                        ${taxRate > 0 ? `
                        <div class="tot-row highlight">
                            <span>ضريبة القيمة المضافة ${taxRate}%</span>
                            <span>${parseFloat(inv.tax||0).toFixed(2)} ${CUR}</span>
                        </div>` : ''}
                        ${parseFloat(inv.discount||0) > 0 ? `
                        <div class="tot-row" style="color:#d90429;">
                            <span>الخصم</span>
                            <span>- ${parseFloat(inv.discount).toFixed(2)} ${CUR}</span>
                        </div>` : ''}
                        <div class="tot-row total-final">
                            <span>الإجمالي النهائي</span>
                            <span>${parseFloat(inv.total||0).toFixed(2)} ${CUR}</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- شروط الدفع -->
            ${s.paymentTerms ? `
            <div class="inv-terms-box">
                <div class="inv-terms-title">
                    <i class="fas fa-file-contract"></i> شروط الدفع وسياسة التوريد
                </div>
                <div class="inv-terms-content">${s.paymentTerms}</div>
            </div>` : `
            <div class="inv-terms-box">
                <div class="inv-terms-title">
                    <i class="fas fa-file-contract"></i> شروط الدفع وسياسة التوريد
                </div>
                <div class="inv-terms-content">
                    • الدفع عند الاستلام ما لم يُتفق على غير ذلك كتابياً.
                    • لا يُقبل الإرجاع أو الاستبدال بعد 7 أيام من تاريخ الفاتورة.
                    • الأسعار شاملة ضريبة القيمة المضافة ما لم يُذكر خلاف ذلك.
                    • في حالة النزاع، يُرجع إلى الجهة القضائية المختصة.
                </div>
            </div>`}

            <!-- التذييل -->
            <div class="inv-footer-section">
                <div class="inv-qr-box">
                    <div id="qrA4"></div>
                    <div class="inv-qr-label">
                        <i class="fas fa-shield-alt"></i> ZATCA QR Code
                    </div>
                </div>
                <div class="inv-footer-note">
                    <div style="font-size:11px;font-weight:700;color:#333;margin-bottom:4px;">
                        ${s.companyName || 'تاجر برو'}
                    </div>
                    ${s.phone ? `<div>${s.phone}</div>` : ''}
                    ${s.email ? `<div>${s.email}</div>` : ''}
                    ${s.website ? `<div>${s.website}</div>` : ''}
                    <div class="inv-powered">Powered by Altajer Pro — altajer.app</div>
                </div>
                <div class="inv-stamp-box">
                    <i class="fas fa-stamp"></i>
                    <span>ختم وتوقيع</span>
                    <span>المؤسسة</span>
                </div>
            </div>

        </div>`;
    }

    // ===== بناء فاتورة حرارية =====
    function buildThermal(inv, s, width) {
        const taxRate = s.taxEnabled ? (s.taxRate||15) : 0;
        const cls     = width === 80 ? 'invoice-thermal80' : 'invoice-thermal58';

        const itemsHTML = (inv.items||[]).map(item => {
            const priceExcl = taxRate > 0
                ? parseFloat(item.price/(1+taxRate/100)).toFixed(2)
                : parseFloat(item.price).toFixed(2);
            return `
            <div class="thermal-row">
                <span style="max-width:55%;overflow:hidden;">${item.name}</span>
                <span>${parseFloat(item.total||0).toFixed(2)} ${CUR}</span>
            </div>
            <div style="font-size:9px;color:#555;padding-right:5px;margin-bottom:1mm;">
                ${item.qty} × ${priceExcl} ${taxRate>0?'| ض: '+parseFloat(item.price-priceExcl).toFixed(2):''}
            </div>`;
        }).join('');

        return `
        <div class="${cls}" id="thermalContent">
            <div class="thermal-center">
                <div style="font-size:15px;font-weight:900;">${s.companyName||'تاجر برو'}</div>
                ${s.vatNumber?`<div style="font-size:8px;">الرقم الضريبي: ${s.vatNumber}</div>`:''}
                ${s.phone?`<div style="font-size:9px;">${s.phone}</div>`:''}
                ${s.address?.city?`<div style="font-size:9px;">${s.address.city}</div>`:''}
                <div style="font-size:10px;font-weight:700;margin-top:2mm;">
                    ${taxRate>0?'فاتورة ضريبية':'فاتورة مبسطة'}
                </div>
            </div>
            <hr class="thermal-divider">
            <div class="thermal-row"><span>رقم الفاتورة:</span><span style="font-size:9px;">${inv.invoiceNumber}</span></div>
            <div class="thermal-row"><span>التاريخ:</span><span>${inv.date}</span></div>
            <div class="thermal-row"><span>العميل:</span><span>${inv.customer||'نقدي'}</span></div>
            ${inv.customerVat&&inv.customerVat!=='غير ضريبي'?`<div class="thermal-row"><span>الرقم الضريبي:</span><span style="font-size:8px;">${inv.customerVat}</span></div>`:''}
            <hr class="thermal-divider">
            <div style="font-size:9px;font-weight:700;margin-bottom:1mm;">الأصناف:</div>
            ${itemsHTML}
            <hr class="thermal-divider">
            <div class="thermal-row"><span>قبل الضريبة:</span><span>${parseFloat(inv.subtotal||0).toFixed(2)} ${CUR}</span></div>
            ${taxRate>0?`<div class="thermal-row"><span>ضريبة ${taxRate}%:</span><span>${parseFloat(inv.tax||0).toFixed(2)} ${CUR}</span></div>`:''}
            ${parseFloat(inv.discount||0)>0?`<div class="thermal-row"><span>خصم:</span><span>- ${parseFloat(inv.discount).toFixed(2)} ${CUR}</span></div>`:''}
            <hr class="thermal-divider">
            <div class="thermal-total-row">
                <span>الإجمالي:</span>
                <span>${parseFloat(inv.total||0).toFixed(2)} ${CUR}</span>
            </div>
            <hr class="thermal-divider">
            <div class="thermal-center" style="margin-top:3mm;">
                <div id="qrThermal"></div>
                <div style="font-size:8px;margin-top:2mm;">${s.invoiceFooter||'شكراً لتعاملكم معنا'}</div>
                <div style="font-size:7px;color:#777;margin-top:1mm;">Altajer Pro</div>
            </div>
        </div>`;
    }

    // ===== طباعة =====
    function printInvoice(mode) {
        if(!invoiceData) return showToast('لا توجد بيانات فاتورة', false);
        const area = document.getElementById('invoicePrintArea');
        if(mode==='a4')          area.innerHTML = buildA4(invoiceData, settings);
        else if(mode==='thermal80') area.innerHTML = buildThermal(invoiceData, settings, 80);
        else if(mode==='thermal58') area.innerHTML = buildThermal(invoiceData, settings, 58);
        setTimeout(() => {
            const qrId = mode==='a4' ? 'qrA4' : 'qrThermal';
            buildQR(qrId, invoiceData);
            setTimeout(() => window.print(), 600);
        }, 300);
    }

    // ===== PDF =====
    async function exportPDF() {
        if(!invoiceData) return showToast('لا توجد بيانات فاتورة', false);
        showToast('جاري إنشاء PDF...', true);
        const area = document.getElementById('invoicePrintArea');
        area.innerHTML = buildA4(invoiceData, settings);
        area.style.display = 'block';
        setTimeout(() => {
            buildQR('qrA4', invoiceData);
            setTimeout(async () => {
                const el = document.getElementById('a4Content');
                const opt = {
                    margin: [5,5,5,5],
                    filename: `فاتورة-${invoiceData.invoiceNumber}.pdf`,
                    image: { type:'jpeg', quality:0.98 },
                    html2canvas: { scale:2, useCORS:true, logging:false },
                    jsPDF: { unit:'mm', format:'a4', orientation:'portrait' }
                };
                try {
                    await html2pdf().set(opt).from(el).save();
                    showToast('✅ تم حفظ PDF في جهازك', true);
                } catch(e) { showToast('❌ فشل إنشاء PDF', false); }
                area.style.display = 'none';
            }, 600);
        }, 300);
    }

    // ===== مشاركة =====
    async function shareInvoice() {
        if(!invoiceData) return showToast('لا توجد بيانات فاتورة', false);
        const shareText = `
*فاتورة من: ${settings.companyName||'تاجر برو'}*
رقم: ${invoiceData.invoiceNumber}
التاريخ: ${invoiceData.date}
العميل: ${invoiceData.customer||'نقدي'}
─────────────────
${(invoiceData.items||[]).map(i=>`• ${i.name} × ${i.qty} = ${parseFloat(i.total||0).toFixed(2)} ${CUR}`).join('\n')}
─────────────────
المجموع: ${parseFloat(invoiceData.subtotal||0).toFixed(2)} ${CUR}
${settings.taxEnabled?`الضريبة: ${parseFloat(invoiceData.tax||0).toFixed(2)} ${CUR}`:''}
*الإجمالي: ${parseFloat(invoiceData.total||0).toFixed(2)} ${CUR}*
${settings.phone?`\nللتواصل: ${settings.phone}`:''}
        `.trim();

        if(navigator.share) {
            try {
                await navigator.share({ title:`فاتورة ${invoiceData.invoiceNumber}`, text: shareText });
            } catch(e) { if(e.name!=='AbortError') showToast('تعذرت المشاركة', false); }
        } else {
            navigator.clipboard?.writeText(shareText).then(() => {
                showToast('✅ تم نسخ الفاتورة — الصقها في أي تطبيق', true);
            });
        }
    }

    function goHome() { window.location.href = 'index.html'; }
</script>
</body>
</html>
