<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مستودع التاجر - إدارة الأصناف</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-boxes"></i> جداول البيانات (المخزن)</h2>
        <!-- نموذج إدخال صنف جديد -->
        <div class="form-group">
            <input type="text" id="p-name" class="form-control" placeholder="اسم المنتج">
            <input type="number" id="p-price" class="form-control" placeholder="السعر (شامل الضريبة)">
            <input type="number" id="p-stock" class="form-control" placeholder="الكمية المتوفرة">
            <button class="btn-main" onclick="App.saveProduct()">إضافة إلى الجدول</button>
        </div>

        <hr>
        
        <!-- جدول عرض البيانات (بديل الإكسل) -->
        <div style="overflow-x:auto;">
            <table class="accounting-table" id="excel-table">
                <thead>
                    <tr>
                        <th>المنتج</th>
                        <th>السعر (15%)</th>
                        <th>الكمية</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="product-list">
                    <!-- البيانات تسحب من Firebase وتظهر هنا تلقائياً -->
                </tbody>
            </table>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
