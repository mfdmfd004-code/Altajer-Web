<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>إدارة المخزن والأصناف المطور - التاجر برو</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0c3f65">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root, [data-theme="winter"] {
            --dark-bg: #0d1b2a;
            --card-bg: #1b263b;
            --sea-blue: #0077b6;
            --light-green: #38b000;
            --neon-cyan: #00b4d8;
            --neon-pink: #e81cff;
            --text-white: #ffffff;
            --danger-red: #e63946;
            --warning-orange: #ffb703;
            --glow-soft: 0 0 6px rgba(0, 180, 216, 0.35);
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            margin: 0;
            padding: 20px 10px 80px 10px; /* مسافة إضافية في الأسفل لمنع تداخل أزرار الموبايل */
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .products-container {
            max-width: 850px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 2px solid var(--sea-blue);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0, 180, 216, 0.15);
            position: relative;
        }

        .products-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--sea-blue), var(--neon-pink));
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
        }

        .products-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px dashed rgba(0, 180, 216, 0.25);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .products-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: var(--glow-soft);
        }

        .section-subtitle {
            font-size: 15px;
            color: var(--neon-cyan);
            margin-top: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 180, 216, 0.15);
            padding-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-container {
            position: relative;
            margin-bottom: 25px;
        }

        .input-container input, .input-container select {
            border: 0;
            border-bottom: 2px solid #4a5568;
            background: transparent;
            width: 100%;
            padding: 8px 5px 4px 5px;
            font-size: 15px;
            color: #fff;
            transition: border-color 0.3s;
        }

        .input-container input:focus, .input-container select:focus {
            outline: none;
            border-bottom: 2px solid var(--neon-cyan);
        }

        .input-container label {
            position: absolute;
            top: -12px;
            right: 5px;
            font-size: 13px;
            color: #a0aec0;
            pointer-events: none;
        }

        .btn-neon-action {
            background: #2d3748;
            color: #fff;
            border: none;
            padding: 12px 20px;
            font-weight: 600;
            font-size: 15px;
            transition: 0.3s;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-neon-action:hover {
            background: var(--clr);
            box-shadow: 0 0 12px var(--clr);
            color: #fff;
            transform: translateY(-2px);
        }

        .table-responsive-custom {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-top: 25px;
            border: 1px solid rgba(0, 180, 216, 0.2);
        }

        .table-custom {
            background-color: rgba(0, 0, 0, 0.15) !important;
            color: white !important;
            margin-bottom: 0;
            font-size: 14px;
        }

        .table-custom th {
            background-color: rgba(0, 0, 0, 0.3) !important;
            color: var(--neon-cyan) !important;
        }

        /* شريط التنقل السفلي الاحترافي للهواتف الذكية */
        .mobile-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1b263b;
            border-top: 2px solid #0077b6;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
        }

        .mobile-nav-item {
            color: #a0aec0;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            transition: 0.3s;
        }

        .mobile-nav-item i {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .mobile-nav-item.active, .mobile-nav-item:hover {
            color: #00b4d8;
            text-shadow: 0 0 8px #00b4d8;
        }

        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body>

<div class="products-container">
    <div class="products-header">
        <div class="products-title">
            <i class="fas fa-boxes-stacked bx-flashing"></i>
            <span>إدارة المخزن والأصناف السحابية</span>
        </div>
    </div>

    <form id="productForm" onsubmit="return false;">
        <div class="section-subtitle">
            <i class="fas fa-box-open"></i> <span>بيانات الصنف والامتثال الضريبي</span>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="input-container">
                    <input id="itemCode" type="text" required placeholder=" ">
                    <label>كود الصنف (Barcode)</label>
                </div>
            </div>
            <div class="col-md-6">
                <div class="input-container">
                    <input id="itemName" type="text" required placeholder=" ">
                    <label>اسم المنتج / الصنف</label>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-6 col-md-4">
                <div class="input-container">
                    <input id="itemPrice" type="number" step="0.01" required placeholder=" ">
                    <label>السعر شامل الضريبة (SAR)</label>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="input-container">
                    <input id="itemQty" type="number" required placeholder=" " value="0">
                    <label>الكمية الحالية بالمخزن</label>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="input-container">
                    <select id="itemVatType" required>
                        <option value="15">خاضع للضريبة الأساسية (15%)</option>
                        <option value="0">خاضع لنسبة الصفر (0%)</option>
                        <option value="exempt">معفى من الضريبة</option>
                    </select>
                    <label>الحالة الضريبية</label>
                </div>
            </div>
        </div>

        <div class="d-flex flex-wrap gap-2 justify-content-between mt-2">
            <div class="d-flex gap-2 w-100 justify-content-between justify-content-md-start">
                <button type="button" id="btnItemAdd" class="btn-neon-action" style="--clr:var(--light-green)">
                    <i class="fas fa-plus-circle"></i> <span>تسجيل / تحديث صنف</span>
                </button>
                <button type="button" id="btnItemSearch" class="btn-neon-action" style="--clr:var(--neon-cyan)">
                    <i class="fas fa-search"></i> <span>بحث بالكود</span>
                </button>
                <button type="button" id="btnItemDelete" class="btn-neon-action" style="--clr:var(--danger-red)">
                    <i class="fas fa-trash-alt"></i> <span>حذف صنف</span>
                </button>
            </div>
        </div>
    </form>

    <div class="section-subtitle mt-4">
        <i class="fas fa-warehouse"></i> <span>جدول جرد المخزن الموحد الفوري السحابي</span>
    </div>

    <div class="table-responsive-custom">
        <table class="table table-dark table-striped table-custom text-center">
            <thead>
                <tr>
                    <th>الباركود</th>
                    <th>اسم الصنف</th>
                    <th>السعر (شامل)</th>
                    <th>المخزون الحالي</th>
                </tr>
            </thead>
            <tbody id="itemTableBody">
                <tr><td colspan="4" class="text-muted p-3">جاري جلب بيانات المخزن الحية من السحاب...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="mobile-navbar">
    <a href="index.html" class="mobile-nav-item">
        <i class="fas fa-home"></i>
        <span>الرئيسية</span>
    </a>
    <a href="products.html" class="mobile-nav-item active">
        <i class="fas fa-boxes-stacked"></i>
        <span>المخزن</span>
    </a>
    <a href="customers.html" class="mobile-nav-item">
        <i class="fas fa-users"></i>
        <span>العملاء</span>
    </a>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
