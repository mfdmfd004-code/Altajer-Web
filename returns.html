<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مرتجعات المبيعات - التاجر برو</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-undo"></i> إدارة المرتجعات</h2>
        <div class="form-group">
            <label>رقم الفاتورة الأصلية</label>
            <input type="text" id="return-ref" class="form-control" placeholder="أدخل رقم المرجع">
        </div>
        <button class="btn-main" style="background: #e74c3c;" onclick="App.processReturn()">بحث ومعالجة المرتجع</button>
        
        <div id="return-details" style="margin-top:20px;">
            <!-- تظهر تفاصيل الفاتورة هنا ليتم اختيار الأصناف المرتجعة -->
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
