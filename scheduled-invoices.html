<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>تاجر برو - الفواتير المجدولة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-bg: #0d1b2a; --card-bg: #1b263b;
            --sea-blue: #0077b6; --light-green: #38b000;
            --neon-cyan: #00b4d8; --text-white: #ffffff;
            --danger-red: #e63946; --warning-orange: #ffb703;
        }
        * { box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        body { background:var(--dark-bg); color:var(--text-white); margin:0; padding:20px 10px 60px; }
        .wrap { max-width:900px; margin:0 auto; background:var(--card-bg); border:2px solid var(--sea-blue); border-radius:16px; padding:20px; position:relative; }
        .wrap::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--neon-cyan),var(--sea-blue),var(--light-green)); border-radius:14px 14px 0 0; }
        .top-row { display:flex; justify-content:space-between; align-items:center; border-bottom:2px dashed rgba(0,180,216,0.3); padding-bottom:12px; margin-bottom:18px; }
        .title { font-size:18px; font-weight:bold; color:var(--neon-cyan); display:flex; align-items:center; gap:8px; }
        .btn-neon { background:#2d3748; color:#fff; border:none; padding:9px 16px; font-weight:600; font-size:13px; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; text-decoration:none; }
        .btn-neon:hover { background:var(--clr); box-shadow:0 0 12px var(--clr); color:#fff; }
        .field-group { margin-bottom:12px; }
        .field-group label { font-size:12px; color:var(--neon-cyan); display:block; margin-bottom:4px; }
        .field-group input, .field-group select {
            width:100%; padding:9px 10px; border:1px solid #4a5568; border-radius:8px;
            background:transparent; color:#fff; font-size:13px;
        }
        .row-g { display:flex; gap:10px; }
        .row-g > div { flex:1; }
        .items-table { width:100%; font-size:12px; margin:14px 0; border-collapse:collapse; }
        .items-table th { background:#0c3f65; color:var(--neon-cyan); padding:8px; }
        .items-table td { padding:8px; border-bottom:1px solid rgba(255,255,255,0.06); text-align:center; }
        .tpl-card { background:rgba(0,0,0,0.2); border-radius:12px; padding:14px; margin-bottom:12px; border:1px solid rgba(0,180,216,0.15); }
        .tpl-due { border-color:var(--warning-orange); box-shadow:0 0 10px rgba(255,183,3,0.2); }
        .badge-due { background:var(--warning-orange); color:#222; font-size:11px; padding:2px 8px; border-radius:8px; font-weight:700; }
        .badge-active { background:var(--light-green); color:#fff; font-size:11px; padding:2px 8px; border-radius:8px; }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:11px 22px; border-radius:30px; color:#fff; font-weight:700; font-size:13px; z-index:9999; display:none; max-width:90%; }
        .empty-state { text-align:center; color:#a0aec0; padding:30px; }
    </style>
</head>
<body>

<div id="toastBox" class="toast"></div>

<div class="wrap">
    <div class="top-row">
        <div class="title"><i class="fas fa-calendar-check"></i> الفواتير المجدولة (المتكررة)</div>
        <a href="index.html" class="btn-neon" style="--clr:var(--sea-blue)"><i class="fas fa-home"></i> الرئيسية</a>
    </div>

    <!-- نموذج إضافة قالب -->
    <div class="row-g">
        <div class="field-group">
            <label>اسم العميل *</label>
            <input type="text" id="tplCustName" placeholder="اسم العميل / الشركة">
        </div>
        <div class="field-group">
            <label>الرقم الضريبي (اختياري)</label>
            <input type="text" id="tplCustVat" maxlength="15" placeholder="---">
        </div>
    </div>
    <div class="field-group">
        <label>عنوان العميل (اختياري)</label>
        <input type="text" id="tplCustAddr" placeholder="---">
    </div>

    <div class="row-g">
        <div class="field-group">
            <label>التكرار</label>
            <select id="tplFreq">
                <option value="weekly">أسبوعي</option>
                <option value="monthly" selected>شهري</option>
                <option value="yearly">سنوي</option>
            </select>
        </div>
        <div class="field-group">
            <label>تاريخ أول استحقاق</label>
            <input type="date" id="tplNextDate">
        </div>
    </div>

    <!-- إضافة بنود -->
    <div class="row-g">
        <div class="field-group"><label>كود الصنف</label><input type="text" id="itCode" placeholder="كود"></div>
        <div class="field-group"><label>اسم المنتج</label><input type="text" id="itName" placeholder="اسم المنتج"></div>
        <div class="field-group"><label>السعر (قبل الضريبة)</label><input type="number" step="0.01" id="itPrice" placeholder="0.00"></div>
        <div class="field-group"><label>الكمية</label><input type="number" id="itQty" value="1" min="1"></div>
    </div>
    <button class="btn-neon" style="--clr:var(--sea-blue)" onclick="addTplItem()"><i class="fas fa-plus"></i> إضافة بند</button>

    <table class="items-table" id="tplItemsTable">
        <thead><tr><th>الكود</th><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الضريبة</th><th>الإجمالي</th><th></th></tr></thead>
        <tbody id="tplItemsBody"></tbody>
    </table>

    <button class="btn-neon" style="--clr:var(--light-green);width:100%;justify-content:center;padding:12px;" onclick="saveTemplate()">
        <i class="fas fa-save"></i> حفظ القالب المجدول
    </button>

    <hr style="border-color:rgba(0,180,216,0.2);margin:24px 0;">

    <div class="title" style="font-size:15px;"><i class="fas fa-list"></i> القوالب المسجلة</div>
    <div id="templatesList" style="margin-top:12px;"></div>
</div>

<script type="module">
import { db } from "./firebase-config.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { collection, doc, setDoc, getDocs, getDoc, deleteDoc, updateDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const auth = getAuth();
let currentUser = null;
let tplItems = [];
let allTemplates = [];

onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;
    document.getElementById('tplNextDate').value = new Date().toISOString().split('T')[0];
    await loadTemplates();
});

window.showToast = function(msg, ok=true) {
    const t = document.getElementById('toastBox');
    t.innerText = msg;
    t.style.backgroundColor = ok ? '#38b000' : '#e63946';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
};

// ===== إضافة بند للقالب =====
window.addTplItem = function() {
    const code = document.getElementById('itCode').value.trim();
    const name = document.getElementById('itName').value.trim();
    const price = parseFloat(document.getElementById('itPrice').value);
    const qty = parseInt(document.getElementById('itQty').value);

    if (!code || !name || isNaN(price) || price <= 0 || isNaN(qty) || qty <= 0) {
        showToast('يرجى إدخال بيانات الصنف بشكل صحيح', false);
        return;
    }

    const priceExclTax = price;
    const taxAmount = parseFloat((priceExclTax * qty * 0.15).toFixed(4));
    const totalInclTax = parseFloat(((priceExclTax * qty) + taxAmount).toFixed(4));

    tplItems.push({ code, name, priceExclTax, qty, taxAmount, totalInclTax });
    renderTplItems();

    document.getElementById('itCode').value = '';
    document.getElementById('itName').value = '';
    document.getElementById('itPrice').value = '';
    document.getElementById('itQty').value = '1';
};

function renderTplItems() {
    const body = document.getElementById('tplItemsBody');
    if (tplItems.length === 0) {
        body.innerHTML = `<tr><td colspan="7" class="text-muted">لا توجد بنود بعد</td></tr>`;
        return;
    }
    body.innerHTML = tplItems.map((it, i) => `
        <tr>
            <td>${it.code}</td>
            <td>${it.name}</td>
            <td>${it.priceExclTax.toFixed(2)}</td>
            <td>${it.qty}</td>
            <td>${it.taxAmount.toFixed(2)}</td>
            <td>${it.totalInclTax.toFixed(2)}</td>
            <td><i class="fas fa-trash-alt" style="color:var(--danger-red);cursor:pointer;" onclick="removeTplItem(${i})"></i></td>
        </tr>`).join('');
}

window.removeTplItem = function(i) {
    tplItems.splice(i, 1);
    renderTplItems();
};

// ===== حفظ القالب =====
window.saveTemplate = async function() {
    const custName = document.getElementById('tplCustName').value.trim();
    const custVat = document.getElementById('tplCustVat').value.trim();
    const custAddr = document.getElementById('tplCustAddr').value.trim();
    const freq = document.getElementById('tplFreq').value;
    const nextDate = document.getElementById('tplNextDate').value;

    if (!custName || !nextDate || tplItems.length === 0) {
        showToast('يرجى إدخال اسم العميل، التاريخ، وإضافة بند واحد على الأقل', false);
        return;
    }

    try {
        await addDoc(collection(db, 'users', currentUser.uid, 'scheduledInvoices'), {
            customer_name: custName,
            customer_vat: custVat || '---',
            customer_address: custAddr || '---',
            frequency: freq,
            nextDate: nextDate,
            items: tplItems,
            active: true,
            createdAt: serverTimestamp()
        });
        showToast('✅ تم حفظ القالب المجدول');
        tplItems = [];
        renderTplItems();
        document.getElementById('tplCustName').value = '';
        document.getElementById('tplCustVat').value = '';
        document.getElementById('tplCustAddr').value = '';
        await loadTemplates();
    } catch(e) {
        showToast('❌ خطأ: ' + e.message, false);
    }
};

// ===== تحميل القوالب =====
async function loadTemplates() {
    const snap = await getDocs(collection(db, 'users', currentUser.uid, 'scheduledInvoices'));
    allTemplates = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
    renderTemplates();
}

function renderTemplates() {
    const container = document.getElementById('templatesList');
    if (allTemplates.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-times" style="font-size:36px;opacity:0.2;display:block;margin-bottom:8px;"></i>لا توجد قوالب مجدولة بعد</div>`;
        return;
    }

    const today = new Date().toISOString().split('T')[0];
    const freqAr = { weekly:'أسبوعي', monthly:'شهري', yearly:'سنوي' };

    container.innerHTML = allTemplates.map(t => {
        const isDue = t.nextDate <= today && t.active;
        const total = (t.items || []).reduce((s,i) => s + (i.totalInclTax||0), 0);
        return `
        <div class="tpl-card ${isDue ? 'tpl-due' : ''}">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                <div>
                    <strong style="color:var(--neon-cyan);">${t.customer_name}</strong>
                    <span class="${isDue ? 'badge-due' : 'badge-active'}">${isDue ? 'مستحقة الآن' : 'نشطة'}</span>
                </div>
                <div style="font-size:12px;color:#a0aec0;">
                    التكرار: ${freqAr[t.frequency]||t.frequency} | الاستحقاق القادم: ${t.nextDate}
                </div>
            </div>
            <div style="font-size:12px;color:#a0aec0;margin-top:6px;">
                عدد البنود: ${(t.items||[]).length} — الإجمالي التقديري: ${total.toFixed(2)} ر.س
            </div>
            <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
                ${isDue ? `<button class="btn-neon" style="--clr:var(--light-green)" onclick="generateNow('${t.docId}')"><i class="fas fa-file-invoice-dollar"></i> إنشاء الفاتورة الآن</button>` : ''}
                <button class="btn-neon" style="--clr:var(--danger-red)" onclick="deleteTemplate('${t.docId}')"><i class="fas fa-trash-alt"></i> حذف القالب</button>
            </div>
        </div>`;
    }).join('');
}

window.deleteTemplate = async function(docId) {
    if (!confirm('هل تريد حذف هذا القالب نهائياً؟')) return;
    await deleteDoc(doc(db, 'users', currentUser.uid, 'scheduledInvoices', docId));
    showToast('🗑️ تم حذف القالب');
    await loadTemplates();
};

// ===== توليد فاتورة فعلية من القالب =====
window.generateNow = async function(docId) {
    const tpl = allTemplates.find(t => t.docId === docId);
    if (!tpl) return;

    const subtotal = tpl.items.reduce((s,i) => s + (i.priceExclTax * i.qty), 0);
    const tax = tpl.items.reduce((s,i) => s + (i.taxAmount||0), 0);
    const total_net = subtotal + tax;

    const invoicePayload = {
        invoice_id: 'INV-' + Date.now(),
        invoice_date: new Date().toISOString(),
        customer_id: 'CUST-' + Math.floor(Math.random()*9000+1000),
        customer_name: tpl.customer_name,
        customer_vat: tpl.customer_vat || '---',
        customer_address: tpl.customer_address || '---',
        subtotal: subtotal.toFixed(2),
        tax: tax.toFixed(2),
        discount: '0.00',
        total_net: total_net.toFixed(2),
        items: tpl.items,
        currency: 'SAR',
        source: 'scheduled'
    };

    try {
        const invoiceRef = await addDoc(collection(db, 'users', currentUser.uid, 'invoices'), {
            ...invoicePayload,
            createdAt: serverTimestamp(),
            syncedAt: new Date().toISOString()
        });

        // تحديث المخزون
        for (const soldItem of tpl.items) {
            try {
                const productRef = doc(db, 'users', currentUser.uid, 'products', soldItem.code);
                const productSnap = await getDoc(productRef);
                if (productSnap.exists()) {
                    const currentQty = productSnap.data().quantity || 0;
                    const newQty = Math.max(0, currentQty - soldItem.qty);
                    await updateDoc(productRef, { quantity: newQty, lastUpdated: serverTimestamp() });
                }
            } catch(e) { console.warn('Stock update error:', soldItem.code, e); }
        }

        // حساب تاريخ الاستحقاق القادم
        const cur = new Date(tpl.nextDate);
        if (tpl.frequency === 'weekly') cur.setDate(cur.getDate() + 7);
        else if (tpl.frequency === 'yearly') cur.setFullYear(cur.getFullYear() + 1);
        else cur.setMonth(cur.getMonth() + 1);
        const newNextDate = cur.toISOString().split('T')[0];

        await updateDoc(doc(db, 'users', currentUser.uid, 'scheduledInvoices', docId), { nextDate: newNextDate });

        showToast('✅ تم إنشاء الفاتورة وتحديث المخزون');
        await loadTemplates();

        setTimeout(() => { window.location.href = `invoice.html?id=${invoicePayload.invoice_id}`; }, 1200);
    } catch(e) {
        showToast('❌ خطأ: ' + e.message, false);
    }
};
</script>
</body>
</html>
