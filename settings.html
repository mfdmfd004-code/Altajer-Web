<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تاجر برو — إعدادات المؤسسة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            min-height: 100vh; color: #fff;
            padding: 20px 10px 40px 10px;
        }

        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            max-width: 800px; margin: 0 auto 20px auto;
            padding: 0 5px;
        }

        .page-title {
            font-size: 18px; font-weight: 900; color: #00b4d8;
            display: flex; align-items: center; gap: 8px;
        }

        .btn-back {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white; padding: 8px 16px;
            border-radius: 10px; font-size: 13px;
            cursor: pointer; font-family: 'Cairo', sans-serif;
            transition: 0.2s; text-decoration: none;
            display: flex; align-items: center; gap: 6px;
        }

        .btn-back:hover { background: rgba(0,180,216,0.2); color: #00b4d8; }

        .settings-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 25px 20px;
            margin-bottom: 16px;
            max-width: 800px; margin-left: auto; margin-right: auto;
        }

        .section-title {
            font-size: 14px; font-weight: 700; color: #00b4d8;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 20px; padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,180,216,0.2);
        }

        .field-group { margin-bottom: 18px; }

        .field-group label {
            display: block; font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 6px; font-weight: 600;
        }

        .field-group input,
        .field-group select,
        .field-group textarea {
            width: 100%; padding: 11px 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white;
            font-size: 14px; font-family: 'Cairo', sans-serif;
            transition: 0.3s;
        }

        .field-group input:focus,
        .field-group select:focus,
        .field-group textarea:focus {
            outline: none; border-color: #00b4d8;
            background: rgba(0,180,216,0.08);
            box-shadow: 0 0 0 3px rgba(0,180,216,0.12);
        }

        .field-group input::placeholder { color: rgba(255,255,255,0.2); }
        .field-group select option { background: #1e3a5f; color: white; }

        .vat-hint {
            font-size: 11px; margin-top: 5px;
            color: rgba(255,255,255,0.4);
            display: flex; align-items: center; gap: 5px;
        }

        /* مفتاح الضريبة */
        .tax-toggle-row {
            display: flex; align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 14px 16px;
            margin-bottom: 16px;
        }

        .tax-toggle-label {
            font-size: 13px; font-weight: 600;
        }

        .tax-toggle-label small {
            display: block; font-size: 11px;
            color: rgba(255,255,255,0.4); font-weight: 400;
        }

        .switch {
            position: relative; width: 52px; height: 28px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.15);
            border-radius: 28px; transition: 0.3s;
        }

        .slider:before {
            content: ''; position: absolute;
            width: 22px; height: 22px;
            left: 3px; bottom: 3px;
            background: white; border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .slider { background: #2b9348; }
        input:checked + .slider:before { transform: translateX(24px); }

        /* بادج الدولة */
        .country-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(0,180,216,0.1);
            border: 1px solid rgba(0,180,216,0.3);
            border-radius: 20px; padding: 4px 12px;
            font-size: 12px; color: #00b4d8;
            margin-bottom: 16px;
        }
<!-- ===== بطاقة: الاشتراك والفوترة ===== -->
<div class="settings-card">
    <div class="section-title">
        <i class="fas fa-crown"></i> الاشتراك والفوترة
    </div>
    <div id="subStatusInSettings" style="

        <i class="fas fa-crown"></i> تجديد الاشتراك
    </a>
    <a href="admin-billing.html" id="adminLink" style="
        display:none;background:rgba(179,146,172,0.15);

        /* أزرار الحفظ */
        .btn-save {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #2b9348, #38b000);
            color: white; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 20px rgba(43,147,72,0.3);

            text-align: center; max-width: 90%;
        }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .national-box {
            background: rgba(0,0,0,0.2);
            border: 1px dashed rgba(0,180,216,0.2);
            border-radius: 12px; padding: 16px 12px 4px 12px;
            margin-bottom: 8px;
        }

        /* مؤشر قوة كلمة المرور */
        .vat-valid { color: #38b000; }
        .vat-invalid { color: #d90429; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- رأس الصفحة -->
<div class="page-header">
    <div class="page-title">
        <i class="fas fa-cogs"></i> إعدادات المؤسسة

    <a href="index.html" class="btn-back">

<!-- ===== بطاقة: بيانات المؤسسة ===== -->
<div class="settings-card">

    <div class="field-group">

    <div class="field-group">

        <select id="setCountry" onchange="onCountryChange()">
            <option value="">-- اختر البلد --</option>
            <optgroup label="الخليج العربي">

                <option value="AE">🇦🇪 الإمارات العربية المتحدة</option>

                <option value="OM">🇴🇲 سلطنة عُمان</option>
            </optgroup>
            <optgroup label="أفريقيا">
                <option value="EG">🇪🇬 مصر</option>
                <option value="MA">🇲🇦 المغرب</option>
                <option value="TN">🇹🇳 تونس</option>
                <option value="DZ">🇩🇿 الجزائر</option>
                <option value="LY">🇱🇾 ليبيا</option>
                <option value="SD">🇸🇩 السودان</option>
                <option value="NG">🇳🇬 نيجيريا</option>
                <option value="KE">🇰🇪 كينيا</option>
                <option value="ET">🇪🇹 إثيوبيا</option>
                <option value="GH">🇬🇭 غانا</option>
                <option value="TZ">🇹🇿 تنزانيا</option>
                <option value="SN">🇸🇳 السنغال</option>
            </optgroup>
            <optgroup label="باقي العالم">
                <option value="TR">🇹🇷 تركيا</option>
                <option value="PK">🇵🇰 باكستان</option>
                <option value="IN">🇮🇳 الهند</option>
                <option value="US">🇺🇸 الولايات المتحدة</option>
                <option value="GB">🇬🇧 المملكة المتحدة</option>
                <option value="DE">🇩🇪 ألمانيا</option>
                <option value="FR">🇫🇷 فرنسا</option>

    <div class="field-group">
        <label>رقم الهاتف / التواصل</label>

    <div class="field-group">
        <label>البريد الإلكتروني للمؤسسة</label>
        <input type="email" id="setEmail" placeholder="info@company.com">
    </div>

    <div class="field-group">
        <label>الموقع الإلكتروني (اختياري)</label>
        <input type="text" id="setWebsite" placeholder="www.company.com">

    <div class="field-group">
        <label>العملة المستخدمة</label>
        <select id="setCurrency">
            <option value="SAR">ريال سعودي (SAR)</option>
            <option value="AED">درهم إماراتي (AED)</option>
            <option value="KWD">دينار كويتي (KWD)</option>
            <option value="QAR">ريال قطري (QAR)</option>
            <option value="EGP">جنيه مصري (EGP)</option>
            <option value="USD">دولار أمريكي (USD)</option>
            <option value="GBP">جنيه إسترليني (GBP)</option>
            <option value="EUR">يورو (EUR)</option>
            <option value="NGN">نيرا نيجيرية (NGN)</option>
            <option value="KES">شلن كيني (KES)</option>
            <option value="OTHER">أخرى</option>
        </select>
    </div>
</div>

<!-- ===== بطاقة: نظام الضريبة ===== -->
<div class="settings-card">
    <div class="section-title">
        <i class="fas fa-percent"></i> نظام الضريبة
    </div>

    <!-- مفتاح تفعيل الضريبة -->
    <div class="tax-toggle-row">
        <div class="tax-toggle-label">
            تفعيل نظام الضريبة
            <small>الفواتير ستتضمن حساب الضريبة تلقائياً</small>
        </div>
        <label class="switch">
            <input type="checkbox" id="taxEnabled" onchange="onTaxToggle()">
            <span class="slider"></span>
        </label>
    </div>

    <!-- حقول الضريبة — تظهر عند التفعيل -->
    <div id="taxFields" style="display:none;">
        <div class="field-group">
            <label>نسبة الضريبة %</label>
            <select id="taxRate">
                <option value="15">15% — ضريبة القيمة المضافة السعودية (ZATCA)</option>
                <option value="14">14% — ضريبة القيمة المضافة المصرية</option>
                <option value="10">10% — نسبة مخصصة</option>
                <option value="7.5">7.5% — نيجيريا (VAT)</option>
                <option value="16">16% — كينيا (VAT)</option>
                <option value="20">20% — المملكة المتحدة / فرنسا / ألمانيا</option>
                <option value="custom">نسبة مخصصة</option>
            </select>
        </div>

        <div class="field-group" id="customTaxField" style="display:none;">
            <label>أدخل نسبة الضريبة المخصصة %</label>
            <input type="number" id="customTaxRate" placeholder="مثال: 12" min="0" max="100">
        </div>

        <div class="field-group">
            <label>الرقم الضريبي للمؤسسة</label>
            <input type="text" id="setVatNumber" placeholder="أدخل الرقم الضريبي"
                   oninput="validateVat(this)">
            <div id="vatHint" class="vat-hint">
                <i class="fas fa-info-circle"></i>
                <span>للسعودية: 15 خانة تبدأ وتنتهي بـ 3</span>

        <!-- السجل التجاري -->
        <div class="field-group">

            <input type="text" id="setCR" placeholder="1010000000">
        </div>

</div>

<!-- ===== بطاقة: العنوان ===== -->

            </div>

</div>

<!-- ===== بطاقة: الفاتورة والطباعة ===== -->
<div class="settings-card">
    <div class="section-title">
        <i class="fas fa-file-invoice"></i> إعدادات الفاتورة والطباعة
    </div>

    <div class="field-group">
        <label>خيار الطباعة الافتراضي</label>

<!-- ===== زر الحفظ ===== -->
<div style="max-width:800px;margin:0 auto;padding:0 5px;">
    <button class="btn-save" onclick="saveSettings()">
        <i class="fas fa-save"></i> حفظ الإعدادات ومزامنتها
    </button>
</div>

<script type="module" src="firebase-config.js"></script>
<script>
    const ADMIN_UID = 'RWp5xxVVphaNI2uIl5hMBBC5Ar93';

    // ===== Toast =====
    function showToast(msg, ok = true) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.backgroundColor = ok ? '#2b9348' : '#d90429';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 4000);
    }

    // ===== تغيير البلد =====
    function onCountryChange() {
        const country = document.getElementById('setCountry').value;
        const taxEnabled = document.getElementById('taxEnabled');
        const taxRate = document.getElementById('taxRate');

        // ضبط العملة تلقائياً حسب البلد
        const currencyMap = {
            SA:'SAR', AE:'AED', KW:'KWD', QA:'QAR', BH:'BHD', OM:'OMR',
            EG:'EGP', MA:'MAD', TN:'TND', NG:'NGN', KE:'KES',
            US:'USD', GB:'GBP', DE:'EUR', FR:'EUR', TR:'TRY', IN:'INR'
        };
        const currency = document.getElementById('setCurrency');
        if(currencyMap[country]) currency.value = currencyMap[country];

        // ضبط نسبة الضريبة تلقائياً
        const taxMap = {
            SA:'15', AE:'5', EG:'14', NG:'7.5', KE:'16', GB:'20', DE:'20', FR:'20'
        };
        if(taxMap[country]) {
            taxRate.value = taxMap[country];
            taxEnabled.checked = true;
            onTaxToggle();
        }
    }

    // ===== تفعيل/إيقاف الضريبة =====
    function onTaxToggle() {
        const enabled = document.getElementById('taxEnabled').checked;
        document.getElementById('taxFields').style.display = enabled ? 'block' : 'none';
    }

    // ===== نسبة ضريبة مخصصة =====
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('taxRate').addEventListener('change', function() {
            document.getElementById('customTaxField').style.display =
                this.value === 'custom' ? 'block' : 'none';
        });
        loadSettings();
        checkAuth();
    });

    // ===== تحقق الرقم الضريبي =====
    function validateVat(input) {
        const val = input.value.trim();
        const hint = document.getElementById('vatHint');
        const country = document.getElementById('setCountry').value;
        if(country === 'SA') {
            if(val.length === 15 && val.startsWith('3') && val.endsWith('3') && !isNaN(val)) {
                hint.innerHTML = '<i class="fas fa-check-circle vat-valid"></i> <span class="vat-valid">رقم ضريبي صحيح — متوافق مع ZATCA</span>';
            } else if(val.length > 0) {
                hint.innerHTML = '<i class="fas fa-times-circle vat-invalid"></i> <span class="vat-invalid">يجب أن يكون 15 خانة يبدأ وينتهي بـ 3</span>';
            } else {
                hint.innerHTML = '<i class="fas fa-info-circle"></i> <span>للسعودية: 15 خانة تبدأ وتنتهي بـ 3</span>';
            }
        }
    }

    // ===== حفظ الإعدادات =====
    async function saveSettings() {
        const companyName = document.getElementById('setCompanyName').value.trim();
        const country     = document.getElementById('setCountry').value;
        if(!companyName) return showToast('يرجى إدخال اسم المؤسسة', false);
        if(!country)     return showToast('يرجى اختيار البلد', false);

        const taxEnabled  = document.getElementById('taxEnabled').checked;
        const taxRateEl   = document.getElementById('taxRate').value;
        const finalTax    = taxRateEl === 'custom'
            ? parseFloat(document.getElementById('customTaxRate').value)||0
            : parseFloat(taxRateEl)||0;

        const settings = {
            companyName,
            country,
            phone:        document.getElementById('setPhone').value.trim(),
            email:        document.getElementById('setEmail').value.trim(),
            website:      document.getElementById('setWebsite').value.trim(),
            currency:     document.getElementById('setCurrency').value,
            taxEnabled,
            taxRate:      finalTax,
            vatNumber:    document.getElementById('setVatNumber').value.trim(),
            cr:           document.getElementById('setCR').value.trim(),
            address: {
                city:     document.getElementById('addrCity').value.trim(),
                district: document.getElementById('addrDistrict').value.trim(),
                street:   document.getElementById('addrStreet').value.trim(),
                building: document.getElementById('addrBuilding').value.trim(),
                postal:   document.getElementById('addrPostal').value.trim(),
                addNo:    document.getElementById('addrAddNo').value.trim()
            },
            printOption:    document.getElementById('setPrintOption').value,
            invoiceFooter:  document.getElementById('invoiceFooter').value.trim(),
            paymentTerms: document.getElementById('paymentTerms').value.trim(),
            autoBarcode:    document.getElementById('autoBarcodeToggle').checked,
            barcodePrefix:  document.getElementById('barcodePrefix').value.trim(),
            barcodeStart:   parseInt(document.getElementById('barcodeStart').value)||1001,
            updatedAt:      new Date().toISOString()
        };

        // حفظ محلي فوري
        localStorage.setItem('altajer_settings', JSON.stringify(settings));

        // حفظ في Firebase تحت UID المستخدم
        try {
            let tries = 0;
            while(!window.__firebaseDb && tries < 20) {
                await new Promise(r => setTimeout(r, 200));
                tries++;
            }

            if(window.__firebaseDb && window.__firebaseAuth?.currentUser) {
                const uid = window.__firebaseAuth.currentUser.uid;
                const { doc, setDoc } =
                    await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
                await setDoc(
                    doc(window.__firebaseDb, 'users', uid, 'settings', 'profile'),
                    settings,
                    { merge: true }
                );
                showToast('✅ تم حفظ الإعدادات ومزامنتها بنجاح', true);
            } else {
                showToast('✅ تم الحفظ محلياً — سيتم المزامنة عند الاتصال', true);
            }
        } catch(e) {
            console.error(e);
            showToast('✅ تم الحفظ محلياً', true);
        }
    }

    // ===== تحميل الإعدادات =====
    function loadSettings() {
        const s = JSON.parse(localStorage.getItem('altajer_settings'));
        if(!s) return;

        if(s.companyName) document.getElementById('setCompanyName').value = s.companyName;
        if(s.country)     { document.getElementById('setCountry').value = s.country; }
        if(s.phone)       document.getElementById('setPhone').value = s.phone;
        if(s.email)       document.getElementById('setEmail').value = s.email;
        if(s.website)     document.getElementById('setWebsite').value = s.website;
        if(s.currency)    document.getElementById('setCurrency').value = s.currency;
        if(s.taxEnabled)  {
            document.getElementById('taxEnabled').checked = true;
            onTaxToggle();
        }
        if(s.taxRate)     document.getElementById('taxRate').value = s.taxRate;
        if(s.vatNumber)   document.getElementById('setVatNumber').value = s.vatNumber;
        if(s.cr)          document.getElementById('setCR').value = s.cr;
        if(s.address) {
            document.getElementById('addrCity').value     = s.address.city||'';
            document.getElementById('addrDistrict').value = s.address.district||'';
            document.getElementById('addrStreet').value   = s.address.street||'';
            document.getElementById('addrBuilding').value = s.address.building||'';
            document.getElementById('addrPostal').value   = s.address.postal||'';
            document.getElementById('addrAddNo').value    = s.address.addNo||'';
        }
        if(s.printOption)   document.getElementById('setPrintOption').value = s.printOption;
        if(s.invoiceFooter) document.getElementById('invoiceFooter').value = s.invoiceFooter;
        if(s.paymentTerms) document.getElementById('paymentTerms').value = s.paymentTerms;
        if(s.barcodePrefix) document.getElementById('barcodePrefix').value = s.barcodePrefix;
        if(s.barcodeStart)  document.getElementById('barcodeStart').value  = s.barcodeStart;
        if(s.autoBarcode !== undefined)
            document.getElementById('autoBarcodeToggle').checked = s.autoBarcode;
    }

    // ===== التحقق من تسجيل الدخول =====
    async function checkAuth() {
        let tries = 0;
        while(!window.__firebaseAuth && tries < 20) {
            await new Promise(r => setTimeout(r, 200));
            tries++;
        }
        if(!window.__firebaseAuth) return;
        const { onAuthStateChanged } =
            await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
        onAuthStateChanged(window.__firebaseAuth, (user) => {
            if(!user) window.location.href = 'login.html';
        });
    }
</script>
</body>
</html>
