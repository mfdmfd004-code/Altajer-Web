<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات النظام - التاجر برو</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-cogs"></i> إعدادات المؤسسة</h2>
        <div class="form-group">
            <label>اسم المنشأة</label>
            <input type="text" id="biz-name" class="form-control" placeholder="مثال: مخابز فايز">
        </div>
        <div class="form-group">
            <label>الرقم الضريبي (15 خانة)</label>
            <input type="number" id="biz-vat" class="form-control" placeholder="3xxxxxxxxxxxxxx">
        </div>
        <div class="form-group">
            <label>خيار الطباعة الافتراضي</label>
            <select id="print-pref" class="form-control">
                <option value="thermal">طابعة حرارية (80mm)</option>
                <option value="a4">طابعة عادية (A4)</option>
            </select>
        </div>
        <button class="btn-main" onclick="App.saveSettings()">حفظ الإعدادات</button>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
