<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>تاجر برو المحاسبي - إعدادات المؤسسة والمطابقة الضريبية</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0c3f65">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --dark-bg: #0d1b2a;
            --card-bg: #1b263b;
            --sea-blue: #0077b6;
            --light-green: #38b000;
            --neon-cyan: #00b4d8;
            --neon-pink: #e81cff;
            --text-white: #ffffff;
            --danger-red: #e63946;
            --warning-orange: #ffb703;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            margin: 0;
            padding: 20px 10px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .settings-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 2px solid var(--sea-blue);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0, 180, 216, 0.2);
            position: relative;
        }

        .settings-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--sea-blue), var(--neon-pink));
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
        }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px dashed rgba(0, 180, 216, 0.3);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .settings-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(0, 180, 216, 0.4);
        }

        .section-subtitle {
            font-size: 16px;
            color: var(--neon-cyan);
            margin-top: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 180, 216, 0.15);
            padding-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-container {
            position: relative;
            margin-bottom: 30px;
        }

        .input-container input, .input-container select {
            border: 0;
            border-bottom: 2px solid #4a5568;
            background: transparent;
            width: 100%;
            padding: 10px 5px 5px 5px;
            font-size: 16px;
            color: #fff;
            transition: border-color 0.3s;
        }

        .input-container input:focus, .input-container select:focus {
            outline: none;
            border-bottom: 2px solid var(--neon-cyan);
        }

        .input-container select option {
            background-color: var(--dark-bg);
            color: white;
        }

        .input-container label {
            position: absolute;
            top: -12px;
            right: 5px;
            font-size: 13px;
            color: #a0aec0;
            pointer-events: none;
            transition: all 0.3s ease-in-out;
        }

        html[dir="ltr"] .input-container label {
            left: 5px;
            right: auto;
        }

        .lang-selector {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--neon-cyan);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            outline: none;
        }

        .btn-neon {
            position: relative;
            background: #2d3748;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-neon:hover {
            background: var(--clr);
            box-shadow: 0 0 15px var(--clr);
            color: #fff;
            transform: translateY(-2px);
        }

        .api-toast {
            position: fixed;
            top: 30px;
            right: 20px;
            z-index: 2000;
            padding: 12px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
            animation: slideInToast 0.3s ease-out;
        }
        html[dir="ltr"] .api-toast { right: auto; left: 20px; }
        @keyframes slideInToast { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .helper-text {
            font-size: 11px;
            color: var(--warning-orange);
            margin-top: 5px;
            display: block;
        }

        .national-address-box {
            background: rgba(13, 27, 42, 0.4);
            border: 1px dashed rgba(0, 180, 216, 0.2);
            border-radius: 12px;
            padding: 20px 15px 5px 15px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

<div id="apiToast" class="api-toast"></div>

<div class="settings-container">
    <div class="settings-header">
        <div class="settings-title">
            <i class='bx bx-cog bx-spin'></i>
            <span data-i18n="set-title">إعدادات المؤسسة والمطابقة الضريبية</span>
        </div>
        <div>
            <select class="lang-selector" onchange="changeLanguage(this.value)" id="langSelect">
                <option value="ar">العربية (AR)</option>
                <option value="en">English (EN)</option>
            </select>
        </div>
    </div>

    <form id="settingsForm" onsubmit="handleSettingsSubmit(event)">
        
        <div class="section-subtitle">
            <i class="fas fa-building"></i> <span data-i18n="sub-basic-info">البيانات الأساسية للمنشأة</span>
        </div>

        <div class="input-container">
            <input id="setCompanyName" type="text" required placeholder=" ">
            <label data-i18n="lbl-set-name">اسم المنشأة / المؤسسة التجاري الرسمي</label>
        </div>

        <div class="input-container">
            <input id="setVatNumber" type="text" required pattern="3[0-9]{14}" maxlength="15" placeholder=" ">
            <label data-i18n="lbl-set-vat">الرقم الضريبي للمنشأة (15 خانة يبدأ بـ 3)</label>
            <span class="helper-text" data-i18n="lbl-set-vat-hint">إلزامي لهيئة الزكاة والضريبة والجمارك السعودية ZATCA</span>
        </div>

        <div class="input-container">
            <input id="setPhone" type="text" required placeholder=" ">
            <label data-i18n="lbl-set-phone">رقم الهاتف / الاتصال المعتمد في الفاتورة</label>
        </div>

        <div class="section-subtitle">
            <i class="fas fa-map-marked-alt"></i> <span data-i18n="sub-national-address">تفاصيل العنوان الوطني المعتمد (الامتثال الضريبي)</span>
        </div>

        <div class="national-address-box">
            <div class="row">
                <div class="col-md-6">
                    <div class="input-container">
                        <input id="addrCity" type="text" required placeholder=" ">
                        <label data-i18n="lbl-addr-city">المدينة</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="input-container">
                        <input id="addrDistrict" type="text" required placeholder=" ">
                        <label data-i18n="lbl-addr-district">الحي</label>
                    </div>
                </div>
                <div class="col-md-12">
                    <div class="input-container">
                        <input id="addrStreet" type="text" required placeholder=" ">
                        <label data-i18n="lbl-addr-street">اسم الشارع رئيسي/فرعي</label>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="input-container">
                        <input id="addrBuildingNo" type="text" required placeholder=" ">
                        <label data-i18n="lbl-addr-building">رقم المبنى</label>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="input-container">
                        <input id="addrPostalCode" type="text" required placeholder=" ">
                        <label data-i18n="lbl-addr-postal">الرمز البريدي</label>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="input-container">
                        <input id="addrAdditionalNo" type="text" placeholder=" ">
                        <label data-i18n="lbl-addr-additional">الرقم الإضافي (إن وجد)</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-subtitle">
            <i class="fas fa-print"></i> <span data-i18n="sub-print-settings">خيارات الطباعة والتصدير</span>
        </div>

        <div class="input-container">
            <select id="setPrintOption" required>
                <option value="80mm" selected data-i18n="opt-80">طابعة فواتير حرارية (80mm)</option>
                <option value="58mm" data-i18n="opt-58">طابعة فواتير حرارية صغيرة (58mm)</option>
                <option value="A4" data-i18n="opt-a4">طابعة مكتبية عادية (A4)</option>
                <option value="PDF" data-i18n="opt-pdf">حفظ وتصدير كملف رقمي إلكتروني (PDF)</option>
            </select>
            <label data-i18n="lbl-set-print">خيار الطباعة والتصدير الافتراضي للفواتير</label>
        </div>

        <div class="d-flex flex-wrap gap-3 mt-4 justify-content-between">
            <button type="submit" class="btn-neon" style="--clr:var(--light-green)">
                <i class="fas fa-save"></i> <span data-i18n="btn-save-settings">حفظ الإعدادات ومزامنتها</span>
            </button>
            <button type="button" onclick="window.location.href='index.html'" class="btn-neon" style="--clr:var(--neon-cyan)">
                <i class="fas fa-home"></i> <span data-i18n="btn-dashboard">العودة للرئيسية</span>
            </button>
        </div>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

<script>
    const API_ENDPOINT = 'api/save_settings.php';

    const translations = {
        ar: {
            "set-title": "إعدادات المؤسسة والمطابقة الضريبية", 
            "sub-basic-info": "البيانات الأساسية للمنشأة",
            "lbl-set-name": "اسم المنشأة / المؤسسة التجاري الرسمي",
            "lbl-set-vat": "الرقم الضريبي للمنشأة (15 خانة يبدأ بـ 3)", 
            "lbl-set-vat-hint": "إلزامي لهيئة الزكاة والضريبة والجمارك السعودية ZATCA",
            "lbl-set-phone": "رقم الهاتف / الاتصال المعتمد في الفاتورة",
            "sub-national-address": "تفاصيل العنوان الوطني المعتمد (الامتثال الضريبي)",
            "lbl-addr-city": "المدينة", "lbl-addr-district": "الحي", "lbl-addr-street": "اسم الشارع رئيسي/فرعي",
            "lbl-addr-building": "رقم المبنى", "lbl-addr-postal": "الرمز البريدي", "lbl-addr-additional": "الرقم الإضافي (إن وجد)",
            "sub-print-settings": "خيارات الطباعة والتصدير",
            "opt-80": "طابعة فواتير حرارية (80mm)", "opt-58": "طابعة فواتير حرارية صغيرة (58mm)", 
            "opt-a4": "طابعة مكتبية عادية (A4)", "opt-pdf": "حفظ وتصدير كملف رقمي إلكتروني (PDF)",
            "lbl-set-print": "خيار الطباعة والتصدير الافتراضي للفواتير", 
            "btn-save-settings": "حفظ الإعدادات ومزامنتها", "btn-dashboard": "العودة للرئيسية"
        },
        en: {
            "set-title": "Enterprise Settings & Tax Compliance", 
            "sub-basic-info": "Basic Enterprise Information",
            "lbl-set-name": "Official Trade / Company Name",
            "lbl-set-vat": "Enterprise VAT Number (15 Digits starts with 3)", 
            "lbl-set-vat-hint": "Mandatory for Saudi ZATCA & Tax Regulations",
            "lbl-set-phone": "Certified Contact Number for Invoices",
            "sub-national-address": "National Address Details (Tax Compliance)",
            "lbl-addr-city": "City", "lbl-addr-district": "District", "lbl-addr-street": "Street Name",
            "lbl-addr-building": "Building No", "lbl-addr-postal": "Postal Code", "lbl-addr-additional": "Additional No",
            "sub-print-settings": "Printing & Export Options",
            "opt-80": "Thermal Receipt Printer (80mm)", "opt-58": "Small Thermal Printer (58mm)", 
            "opt-a4": "Standard Office Printer (A4)", "opt-pdf": "Save & Export as Digital Document (PDF)",
            "lbl-set-print": "Default Invoice Print/Export Option", 
            "btn-save-settings": "Save & Sync Settings", "btn-dashboard": "Back to Dashboard"
        }
    };

    document.addEventListener("DOMContentLoaded", function() {
        // تحميل الإعدادات المحلية التراكمية وتأمين تعبئة الحقول فورياً
        const savedSettings = JSON.parse(localStorage.getItem('altajer_enterprise_settings'));
        if (savedSettings) {
            document.getElementById('setCompanyName').value = savedSettings.company_name || '';
            document.getElementById('setVatNumber').value = savedSettings.vat_number || '';
            document.getElementById('setPhone').value = savedSettings.phone || '';
            document.getElementById('setPrintOption').value = savedSettings.print_option || '80mm';
            
            // تعبئة حقول العنوان المجزأة المحدثة
            document.getElementById('addrCity').value = savedSettings.city || '';
            document.getElementById('addrDistrict').value = savedSettings.district || '';
            document.getElementById('addrStreet').value = savedSettings.street || '';
            document.getElementById('addrBuildingNo').value = savedSettings.building_no || '';
            document.getElementById('addrPostalCode').value = savedSettings.postal_code || '';
            document.getElementById('addrAdditionalNo').value = savedSettings.additional_no || '';
        }

        const currentLang = localStorage.getItem('altajer_lang') || 'ar';
        document.getElementById('langSelect').value = currentLang;
        changeLanguage(currentLang);
    });

    function changeLanguage(lang) {
        localStorage.setItem('altajer_lang', lang);
        const htmlTag = document.documentElement; 
        htmlTag.lang = lang; 
        htmlTag.dir = lang === 'ar' ? 'rtl' : 'ltr';
        
        $('[data-i18n]').each(function() { 
            const key = $(this).data('i18n'); 
            if (translations[lang] && translations[lang][key]) { 
                $(this).text(translations[lang][key]); 
            } 
        });
    }

    function showToast(message, isSuccess = true) {
        const toast = document.getElementById('apiToast'); 
        toast.innerText = message;
        toast.style.backgroundColor = isSuccess ? 'var(--light-green)' : 'var(--danger-red)';
        toast.style.display = 'block'; 
        setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    function handleSettingsSubmit(e) {
        e.preventDefault();
        
        const settingsPayload = {
            company_name: document.getElementById('setCompanyName').value,
            vat_number: document.getElementById('setVatNumber').value,
            phone: document.getElementById('setPhone').value,
            print_option: document.getElementById('setPrintOption').value,
            
            // تجميع تفاصيل العنوان المحدثة لإرسالها كـ JSON متكامل
            city: document.getElementById('addrCity').value,
            district: document.getElementById('addrDistrict').value,
            street: document.getElementById('addrStreet').value,
            building_no: document.getElementById('addrBuildingNo').value,
            postal_code: document.getElementById('addrPostalCode').value,
            additional_no: document.getElementById('addrAdditionalNo').value
        };

        // التخزين المحلي الفوري لخدمة ملف الفاتورة
        localStorage.setItem('altajer_enterprise_settings', JSON.stringify(settingsPayload));
        
        // ترحيل وإرسال البيانات للـ API على سيرفر InfinityFree
        fetch(API_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(settingsPayload)
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                showToast("تم مزامنة وحفظ إعدادات المنشأة الممتثلة ضريبياً بنجاح");
            } else {
                showToast("تم الحفظ محلياً وجاري الترحيل تلقائياً عند استقرار السيرفر", true);
            }
        })
        .catch(() => {
            showToast("تم تأمين وحفظ الإعدادات على الجوال في وضع العمل دون اتصال", true);
        });
    }
</script>
</body>
</html>
