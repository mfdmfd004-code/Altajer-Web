<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل الموردين - التاجر برو</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-truck-field"></i> إدارة الموردين</h2>
        <div class="form-group">
            <input type="text" id="s-name" class="form-control" placeholder="اسم المورد">
            <input type="text" id="s-vat" class="form-control" placeholder="الرقم الضريبي للمورد">
            <button class="btn-main" onclick="App.saveSupplier()">إضافة للمستندات</button>
        </div>
        <hr>
        <table class="accounting-table">
            <thead>
                <tr>
                    <th>اسم المورد</th>
                    <th>الرقم الضريبي</th>
                    <th>تاريخ الإضافة</th>
                </tr>
            </thead>
            <tbody id="supplier-list"></tbody>
        </table>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
