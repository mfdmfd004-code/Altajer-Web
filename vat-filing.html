<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التاجر برو - الإقرار الضريبي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="card">
        <h2><i class="fas fa-percent"></i> ملخص الإقرار الضريبي (VAT 15%)</h2>
        
        <!-- فلتر الفترة الزمنية -->
        <div class="form-group">
            <input type="month" id="vatPeriod" class="form-control">
            <button class="btn-main" onclick="calculateVAT()">تحديث البيانات</button>
        </div>

        <div class="accounting-table">
            <table>
                <thead>
                    <tr>
                        <th>البيان</th>
                        <th>المبلغ (قبل الضريبة)</th>
                        <th>مبلغ الضريبة (15%)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>إجمالي المبيعات الخاضعة للضريبة</td>
                        <td id="salesAmount">0.00</td>
                        <td id="salesVat">0.00</td>
                    </tr>
                    <tr>
                        <td>إجمالي المشتريات الخاضعة للضريبة</td>
                        <td id="purchasesAmount">0.00</td>
                        <td id="purchasesVat">0.00</td>
                    </tr>
                    <tr style="background-color: #e3f2fd; font-weight: bold;">
                        <td>صافي الضريبة المستحقة للدولة</td>
                        <td colspan="2" id="netVat" style="text-align: center; color: #d32f2f;">0.00 ر.س</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn-main" onclick="window.print()">
                <i class="fas fa-print"></i> طباعة التقرير للتدقيق
            </button>
            <button class="btn-main" style="background-color: var(--light-green);" onclick="location.href='index.html'">
                <i class="fas fa-home"></i> العودة للرئيسية
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
