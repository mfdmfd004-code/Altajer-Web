<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تاجر برو - ملخص الإقرار الضريبي</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --dark-bg: #0d1b2a;
            --card-bg: #1b263b;
            --sea-blue: #0077b6;
            --light-green: #38b000;
            --neon-cyan: #00b4d8;
            --neon-pink: #e81cff;
            --text-white: #ffffff;
            --danger-red: #e63946;
            --warning-orange: #ffb703;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            margin: 0;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .tax-card {
            max-width: 650px;
            margin: 20px auto;
            background-color: var(--card-bg);
            border: 2px solid var(--sea-blue);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0, 180, 216, 0.2);
        }

        .tax-card h2 {
            font-size: 18px;
            color: var(--neon-cyan);
            border-bottom: 2px dashed rgba(0, 180, 216, 0.3);
            padding-bottom: 12px;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group-custom {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        .form-group-custom select {
            flex: 1;
            background: var(--dark-bg);
            border: 1px solid var(--sea-blue);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-group-custom select option {
            background: #1b263b;
            color: white;
        }

        .accounting-table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid rgba(0, 180, 216, 0.2);
            margin-bottom: 20px;
        }

        .table-custom {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: center;
            background: var(--dark-bg);
        }

        .table-custom th {
            background-color: #0c3f65;
            color: var(--neon-cyan);
            padding: 12px;
            font-weight: 600;
            border-bottom: 2px solid var(--sea-blue);
        }

        .table-custom td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .row-highlight {
            background-color: rgba(56, 176, 0, 0.1);
            font-weight: bold;
        }

        .btn-neon-action {
            background: #2d3748;
            color: #fff;
            border: none;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-neon-action:hover {
            background: var(--clr);
            box-shadow: 0 0 12px var(--clr);
            color: #fff;
        }

        .actions-wrapper {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .status-msg {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            margin-bottom: 10px;
        }

        @media print {
            body { background: white !important; color: black !important; }
            .tax-card { border: none !important; box-shadow: none !important; background: white !important; width: 100%; }
            .table-custom th { background-color: #f1f5f9 !important; color: black !important; border-bottom: 1px solid #000; }
            .table-custom td { color: black !important; border-color: #cbd5e1 !important; }
            .actions-wrapper, .form-group-custom, .status-msg { display: none !important; }
        }
    </style>
</head>
<body>

<div class="tax-card">
    <h2><i class="fas fa-percent"></i> ملخص الإقرار الضريبي (VAT 15%)</h2>

    <div class="form-group-custom">
        <select id="vatPeriod" onchange="calculateVAT()">
            <!-- تُعبأ تلقائياً بالسكريبت -->
        </select>
        <button class="btn-neon-action" style="--clr: var(--neon-cyan)" onclick="calculateVAT()">
            <i class="fas fa-sync-alt"></i> تحديث البيانات
        </button>
    </div>

    <div class="status-msg" id="statusMsg">جاري تحميل البيانات...</div>

    <div class="accounting-table-responsive">
        <table class="table-custom">
            <thead>
                <tr>
                    <th style="text-align: right;">البيان</th>
                    <th>المبلغ (قبل الضريبة)</th>
                    <th>مبلغ الضريبة (15%)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="text-align: right;">إجمالي المبيعات الخاضعة للضريبة</td>
                    <td><span id="salesAmount">0.00</span></td>
                    <td style="color: var(--neon-cyan); font-weight: bold;"><span id="salesVat">0.00</span></td>
                </tr>
                <tr>
                    <td style="text-align: right;">إجمالي المشتريات الخاضعة للضريبة</td>
                    <td><span id="purchasesAmount">0.00</span></td>
                    <td style="color: var(--warning-orange); font-weight: bold;"><span id="purchasesVat">0.00</span></td>
                </tr>
                <tr class="row-highlight">
                    <td style="text-align: right;">صافي الضريبة المستحقة للدولة</td>
                    <td colspan="2" id="netVat" style="color: var(--light-green); font-size: 16px; text-align: center;">0.00 ر.س</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="actions-wrapper">
        <button class="btn-neon-action" style="--clr: var(--neon-pink)" onclick="window.print()">
            <i class="fas fa-print"></i> طباعة التقرير للتدقيق
        </button>
        <button class="btn-neon-action" style="--clr: var(--warning-orange)" onclick="location.href='index.html'">
            <i class="fas fa-home"></i> العودة للرئيسية
        </button>
    </div>
</div>

<!-- Firebase -->
<script type="module">
import { db } from './firebase-config.js';
import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

// ===== بناء قائمة الأشهر (12 شهراً للخلف) =====
function buildMonthOptions() {
    const sel = document.getElementById('vatPeriod');
    const now = new Date();
    const monthNames = [
        'يناير','فبراير','مارس','أبريل','مايو','يونيو',
        'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'
    ];
    sel.innerHTML = '';
    for (let i = 0; i < 12; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const val = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        const label = `${monthNames[d.getMonth()]} ${d.getFullYear()}`;
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = label;
        if (i === 0) opt.selected = true;
        sel.appendChild(opt);
    }
}

// ===== الحساب الرئيسي =====
async function calculateVAT() {
    const statusMsg = document.getElementById('statusMsg');
    statusMsg.innerText = 'جاري تحميل البيانات من Firebase...';

    const auth = getAuth();

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        const uid = user.uid;
        const period = document.getElementById('vatPeriod').value; // مثال: "2026-05"
        const [year, month] = period.split('-').map(Number);

        // نطاق الفترة
        const startDate = new Date(year, month - 1, 1);
        const endDate   = new Date(year, month, 1);

        let totalSalesExcl  = 0;
        let totalSalesTax   = 0;
        let invoiceCount    = 0;

        try {
            // جلب كل الفواتير من Firebase
            const snap = await getDocs(collection(db, 'users', uid, 'orders'));

            snap.forEach(docSnap => {
                const inv = docSnap.data();

                // تحديد تاريخ الفاتورة
                let invDate = null;
                if (inv.timestamp) {
                    invDate = inv.timestamp.toDate ? inv.timestamp.toDate() : new Date(inv.timestamp);
                } else if (inv.date) {
                    invDate = new Date(inv.date);
                }

                // فلترة حسب الشهر المختار
                if (!invDate || invDate < startDate || invDate >= endDate) return;

                const subtotal = parseFloat(inv.subtotal || 0);
                const tax      = parseFloat(inv.tax || 0);
                const total    = parseFloat(inv.total || 0);

                // إذا كانت الضريبة صفر نحسبها من الإجمالي
                if (tax > 0) {
                    totalSalesExcl += subtotal;
                    totalSalesTax  += tax;
                } else if (total > 0) {
                    const calcTax  = total * 0.15 / 1.15;
                    const calcExcl = total - calcTax;
                    totalSalesExcl += calcExcl;
                    totalSalesTax  += calcTax;
                }
                invoiceCount++;
            });

            // تحديث الجدول
            document.getElementById('salesAmount').innerText    = totalSalesExcl.toFixed(2);
            document.getElementById('salesVat').innerText       = totalSalesTax.toFixed(2);
            document.getElementById('purchasesAmount').innerText = '0.00';
            document.getElementById('purchasesVat').innerText   = '0.00';

            const netTax = totalSalesTax;
            const netVatEl = document.getElementById('netVat');
            netVatEl.innerText = netTax.toFixed(2) + ' ر.س';
            netVatEl.style.color = netTax >= 0 ? 'var(--light-green)' : 'var(--warning-orange)';

            statusMsg.innerText = `✅ تم تحميل ${invoiceCount} فاتورة للفترة المحددة`;

        } catch (e) {
            statusMsg.innerText = '❌ خطأ في جلب البيانات: ' + e.message;
            console.error('VAT calc error:', e);
        }
    });
}

// ===== تشغيل عند فتح الصفحة =====
buildMonthOptions();
calculateVAT();

// تعريف الدالة عالمياً لزر تحديث البيانات
window.calculateVAT = calculateVAT;
</script>

</body>
</html>
